<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Executive Decision Book — Lucira</title>
<style>
  :root{
    --bg:#f2efe8; --paper:#ffffff; --ink:#1d1a14; --muted:#615a4c; --faint:#948c7b;
    --line:#e5ded0; --line2:#efe9dd; --gold:#a9822f; --gold2:#c9a24b; --emerald:#0b6e4f;
    --green:#2c9e63; --amber:#c07d1c; --red:#c4463b; --blue:#2f6fd0;
    --shadow:0 12px 40px -26px rgba(80,60,10,.5);
  }
  :root[data-theme="dark"]{
    --bg:#100f0b; --paper:#17150f; --ink:#efe9dc; --muted:#a89f8b; --faint:#766e5b;
    --line:#2a251a; --line2:#211d14; --gold:#c9a24b; --gold2:#e6c976; --emerald:#3fb389;
    --green:#3fc07f; --amber:#e0a13c; --red:#e6675b; --blue:#6f9ff0; --shadow:0 18px 50px -30px #000;
  }
  @media (prefers-color-scheme:dark){:root:not([data-theme]){--bg:#100f0b;--paper:#17150f;--ink:#efe9dc;--muted:#a89f8b;--line:#2a251a;--line2:#211d14;--gold:#c9a24b;--gold2:#e6c976}}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:ui-sans-serif,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.6}
  .serif{font-family:"Iowan Old Style","Palatino Linotype",Georgia,serif}
  .mono{font-family:ui-monospace,"Cascadia Code",Consolas,monospace}
  .book{max-width:1080px;margin:0 auto;padding:26px}

  .toolbar{position:sticky;top:0;z-index:9;display:flex;gap:10px;align-items:center;
    background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(8px);
    padding:12px 0;border-bottom:1px solid var(--line);margin-bottom:8px}
  .toolbar .sp{flex:1}
  .btn{cursor:pointer;background:var(--paper);border:1px solid var(--line);color:var(--ink);
    border-radius:9px;padding:8px 13px;font-size:12.5px;font-weight:600}
  .btn:hover{border-color:var(--gold)} .btn.primary{background:var(--gold);color:#17150f;border:none}
  .src{font-size:12px;color:var(--faint)}

  /* cover */
  .cover{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:40px;box-shadow:var(--shadow);
    margin-bottom:20px;position:relative;overflow:hidden}
  .cover::before{content:"";position:absolute;inset:0;background:
    radial-gradient(600px 200px at 90% -10%,color-mix(in srgb,var(--gold2) 22%,transparent),transparent)}
  .cover .eyebrow{letter-spacing:.34em;text-transform:uppercase;font-size:11.5px;color:var(--gold);font-weight:700}
  .cover h1{font-size:clamp(30px,5vw,46px);margin:12px 0 6px;font-weight:600;letter-spacing:-.02em}
  .cover .sub{color:var(--muted);font-size:15px}
  .cover .meta{display:flex;gap:22px;flex-wrap:wrap;margin-top:18px;font-size:13px;color:var(--faint)}
  .cover .meta b{color:var(--ink)}
  .hscore{position:absolute;right:40px;top:38px;text-align:center}
  .hscore .n{font-size:52px;font-weight:800;line-height:1}
  .hscore .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}

  .toc{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 24px}
  .toc a{font-size:12.5px;text-decoration:none;color:var(--muted);border:1px solid var(--line);
    background:var(--paper);border-radius:16px;padding:6px 12px}
  .toc a:hover{border-color:var(--gold);color:var(--ink)}

  section.sec{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:28px;
    box-shadow:var(--shadow);margin-bottom:20px}
  .sechead{display:flex;align-items:center;gap:12px;border-bottom:2px solid var(--line);padding-bottom:14px;margin-bottom:18px}
  .secno{font-family:Georgia,serif;font-size:13px;color:var(--gold);font-weight:700;letter-spacing:.1em}
  .sechead h2{font-size:24px;margin:0;font-weight:600;letter-spacing:-.01em;flex:1}
  .sechead .ic{font-size:22px}

  table.kpi{width:100%;border-collapse:collapse;font-size:12.5px}
  .kpiscroll{overflow-x:auto}
  table.kpi th,table.kpi td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line2);vertical-align:top}
  table.kpi th{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--faint);font-weight:700;white-space:nowrap}
  table.kpi td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .kname{font-weight:600}
  .chg{font-weight:700} .chg.up{color:var(--green)} .chg.down{color:var(--red)} .chg.flat{color:var(--faint)}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .s-green{background:var(--green)} .s-amber{background:var(--amber)} .s-red{background:var(--red)} .s-off{background:var(--faint)}
  .kins{color:var(--muted);max-width:280px} .kact{color:var(--ink);max-width:240px}
  .gated{color:var(--faint);font-style:italic}

  .blocks{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:20px}
  @media(max-width:760px){.blocks{grid-template-columns:1fr}}
  .block h4{margin:0 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--gold);font-weight:700}
  .block.full{grid-column:1/-1}
  .block ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:7px}
  .block li{font-size:13.5px;padding-left:18px;position:relative;color:var(--ink)}
  .block li::before{content:"–";position:absolute;left:0;color:var(--gold)}
  .block.risk li::before{content:"▲";color:var(--red);font-size:10px;top:3px}
  .block.opp li::before{content:"↑";color:var(--green)}
  .block.leak li::before{content:"↓";color:var(--red)}
  .esum{font-size:14.5px;line-height:1.65;color:var(--ink);background:color-mix(in srgb,var(--gold2) 8%,transparent);
    border-left:3px solid var(--gold);padding:12px 16px;border-radius:0 10px 10px 0}
  .bdgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-top:18px}
  .bd h4{margin:0 0 7px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700}
  .bd .r{display:flex;justify-content:space-between;font-size:12.5px;padding:4px 0;border-bottom:1px solid var(--line2)}
  .bd .r:last-child{border-bottom:none} .bd .r b{font-variant-numeric:tabular-nums}

  /* final CEO summary */
  .final{background:linear-gradient(160deg,color-mix(in srgb,var(--gold2) 12%,var(--paper)),var(--paper));
    border:1px solid var(--gold);border-radius:18px;padding:30px;box-shadow:var(--shadow);margin-bottom:24px}
  .final h2{font-size:28px;margin:0 0 4px;font-weight:600}
  .final .lead{color:var(--muted);margin:0 0 22px}
  table.dec{width:100%;border-collapse:collapse;font-size:12.5px}
  table.dec th,table.dec td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  table.dec th{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--faint);font-weight:700}
  .prio{font-weight:800;font-size:10.5px;padding:2px 7px;border-radius:5px;white-space:nowrap}
  .p1{background:color-mix(in srgb,var(--red) 20%,transparent);color:var(--red)}
  .p2{background:color-mix(in srgb,var(--amber) 22%,transparent);color:var(--amber)}
  .p3{background:color-mix(in srgb,var(--green) 22%,transparent);color:var(--green)}
  .lists{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-top:26px}
  .lcard h4{margin:0 0 9px;font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:7px}
  .lcard ol{margin:0;padding-left:20px;display:flex;flex-direction:column;gap:5px}
  .lcard li{font-size:13px;color:var(--ink)}
  .rankgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:24px}
  .rank h4{margin:0 0 6px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .rank .r{display:flex;justify-content:space-between;font-size:12.5px;padding:3px 0}
  .gainbar{margin-top:26px;padding:20px;border-radius:14px;background:color-mix(in srgb,var(--emerald) 12%,var(--paper));
    border:1px solid color-mix(in srgb,var(--emerald) 40%,transparent);text-align:center}
  .gainbar .n{font-size:38px;font-weight:800;color:var(--emerald)}
  .gainbar .l{font-size:13px;color:var(--muted)}

  footer{color:var(--faint);font-size:11.5px;text-align:center;padding:20px 0 40px}

  @media print{
    body{background:#fff} .toolbar,.toc{display:none} .book{max-width:none;padding:0}
    section.sec,.final,.cover{box-shadow:none;border:1px solid #ddd;break-inside:avoid;page-break-inside:avoid}
    section.sec{page-break-before:always}
    @page{size:A4;margin:14mm}
  }
</style>
</head>
<body>
<div class="book">
  <div class="toolbar">
    <span class="src" id="src">Loading…</span>
    <span class="sp"></span>
    <button class="btn" id="theme">◐ Theme</button>
    <button class="btn primary" id="print">⎙ Print / Save PDF</button>
  </div>
  <div id="content"></div>
  <footer id="foot"></footer>
</div>

<script>
const CONFIG = {
  BOOK_URL: "https://storage.googleapis.com/lucira-dashboards/bi/decision-book.json",  // LIVE

if (window.__BOOK_CONFIG__) Object.assign(CONFIG, window.__BOOK_CONFIG__);

const esc = s => (s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const fmtINR = v => v==null?"—":(Math.abs(v)>=1e7?"₹"+(v/1e7).toFixed(2)+" Cr":Math.abs(v)>=1e5?"₹"+(v/1e5).toFixed(2)+" L":Math.abs(v)>=1e3?"₹"+(v/1e3).toFixed(1)+"K":"₹"+Math.round(v).toLocaleString("en-IN"));
function fmt(v,unit){
  if(v==null||v==="") return `<span class="gated">n/a</span>`;
  if(unit==="INR") return fmtINR(v);
  if(unit==="pct") return (+v).toFixed(1)+"%";
  if(unit==="sec") return (+v).toFixed(0)+"s";
  if(unit==="ratio") return (+v).toFixed(2)+"×";
  return typeof v==="number"? Math.round(v).toLocaleString("en-IN") : esc(v);
}
const chgCls = c => c==null?"flat":c>0.5?"up":c<-0.5?"down":"flat";
const chgTxt = c => c==null?"—":(c>0?"▲ +":c<0?"▼ ":"")+c.toFixed(1)+"%";

let B=null;
async function load(){
  for(const u of [CONFIG.LOCAL_URL, CONFIG.BOOK_URL].filter(Boolean)){
    try{ const r=await fetch(u,{cache:"no-store"}); if(r.ok){ B=await r.json(); B.meta=B.meta||{}; B.meta.source=B.meta.source||"live"; return; } }catch(e){}
  }
  B=sample();
}

function kpiRow(k){
  const st = k.status||"off";
  return `<tr>
    <td class="kname">${esc(k.name)}</td>
    <td class="num">${fmt(k.yesterday,k.unit)}</td>
    <td class="num">${fmt(k.avg7,k.unit)}</td>
    <td class="num">${k.target==null?'<span class="gated">—</span>':fmt(k.target,k.unit)}</td>
    <td class="num chg ${chgCls(k.change_pct)}">${chgTxt(k.change_pct)}</td>
    <td><span class="dot s-${st}"></span></td>
    <td class="kins">${k.insight?esc(k.insight):'<span class="gated">—</span>'}</td>
    <td class="kact">${k.action?esc(k.action):'<span class="gated">—</span>'}</td>
  </tr>`;
}
function blockList(title,cls,items){
  if(!items||!items.length) return "";
  return `<div class="block ${cls}"><h4>${title}</h4><ul>${items.map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div>`;
}
function breakdowns(bds){
  if(!bds||!bds.length) return "";
  return `<div class="bdgrid">${bds.map(b=>`<div class="bd"><h4>${esc(b.title)}</h4>${
    b.rows.map(r=>`<div class="r"><span>${esc(r.label)}</span><b>${fmt(r.value,r.unit)}</b></div>`).join("")}</div>`).join("")}</div>`;
}
function renderSection(s,i){
  return `<section class="sec" id="sec-${s.id}">
    <div class="sechead"><span class="secno">SECTION ${i+1}</span><span class="ic">${s.icon||""}</span><h2>${esc(s.title)}</h2></div>
    <div class="kpiscroll"><table class="kpi">
      <tr><th>KPI</th><th class="num">Yesterday</th><th class="num">7-Day Avg</th><th class="num">Target</th><th class="num">Change</th><th>Status</th><th>AI Insight</th><th>Recommended Action</th></tr>
      ${(s.kpis||[]).map(kpiRow).join("")}
    </table></div>
    ${breakdowns(s.breakdowns)}
    <div class="esum" style="margin-top:20px">${esc(s.executive_summary||"")}</div>
    <div class="blocks">
      ${blockList("AI Insights","",s.insights)}
      ${blockList("Root Cause Analysis","",s.root_cause)}
      ${blockList("Top Opportunities","opp",s.opportunities)}
      ${blockList("Revenue Leakage","leak",s.leakage)}
      ${blockList("Risks","risk",s.risks)}
      ${blockList("Recommended Actions","full",s.actions)}
    </div>
  </section>`;
}
function rankCard(title,rows){
  if(!rows||!rows.length) return "";
  return `<div class="rank"><h4>${title}</h4>${rows.map(r=>`<div class="r"><span>${esc(r.label)}</span><b>${fmt(r.value,r.unit)}</b></div>`).join("")}</div>`;
}
function listCard(title,items){
  return `<div class="lcard"><h4>${title}</h4><ol>${(items||[]).map(x=>`<li>${esc(x)}</li>`).join("")}</ol></div>`;
}
function renderFinal(f){
  const h=f.health||{}; const os=h.overall>=80?"green":h.overall>=60?"amber":"red";
  const dec=(f.decision_table||[]).map(d=>`<tr>
    <td><span class="prio ${d.priority?.toLowerCase()}">${esc(d.priority)}</span></td>
    <td>${esc(d.department)}</td><td>${esc(d.issue)}</td><td>${esc(d.why)}</td>
    <td class="num" style="text-align:right">${d.impact_inr?fmtINR(d.impact_inr):"—"}</td>
    <td>${esc(d.action)}</td><td>${esc(d.owner)}</td><td>${esc(d.deadline)}</td></tr>`).join("");
  const R=f.rankings||{}; const L=f.lists||{};
  return `<div class="final" id="ceo">
    <h2 class="serif">Final CEO Decision Summary</h2>
    <p class="lead">The only section you need to read first — what to do today to grow revenue and cut losses.</p>
    <div style="overflow-x:auto"><table class="dec">
      <tr><th>Priority</th><th>Dept</th><th>Issue / Opportunity</th><th>Why It Matters</th><th class="num" style="text-align:right">Est. Impact</th><th>Recommended Action</th><th>Owner</th><th>Deadline</th></tr>
      ${dec}
    </table></div>
    <div class="lists">
      ${listCard("↑ Top 10 Revenue Growth",L.growth)}
      ${listCard("↓ Top 10 Revenue Leakages",L.leakage)}
      ${listCard("▲ Top 10 Critical Risks",L.risks)}
      ${listCard("⚡ Top 10 Quick Wins (today)",L.quick_wins)}
    </div>
    <div class="rankgrid">
      ${rankCard("Best Cities",R.best_cities)}${rankCard("Worst Cities",R.worst_cities)}
      ${rankCard("Best Stores",R.best_stores)}${rankCard("Worst Stores",R.worst_stores)}
      ${rankCard("Best Agents",R.best_agents)}${rankCard("Lowest Agents",R.worst_agents)}
      ${rankCard("Best Campaigns",R.best_campaigns)}${rankCard("Worst Campaigns",R.worst_campaigns)}
      ${rankCard("Best-Selling Products",R.best_products)}${rankCard("Products Needing Attention",R.attention_products)}
    </div>
    <div class="gainbar">
      <div class="n">${fmtINR(f.estimated_gain_inr)}</div>
      <div class="l">Estimated revenue gain if all recommendations are implemented · Overall Business Health <b style="color:var(--${os==='green'?'green':os==='amber'?'amber':'red'})">${h.overall}/100</b></div>
    </div>
  </div>`;
}

function render(){
  const m=B.meta||{};
  const h=(B.final&&B.final.health)||{};
  const cover=`<div class="cover">
    <div class="hscore"><div class="n" style="color:var(--gold)">${h.overall!=null?h.overall:"—"}</div><div class="l">Health /100</div></div>
    <div class="eyebrow">Lucira Jewelry · AI Chief Business Officer</div>
    <h1 class="serif">Executive Decision Book</h1>
    <div class="sub">One daily report. Seven departments. One decision list.</div>
    <div class="meta"><span>Run date: <b>${esc(m.run_date||"—")}</b></span>
      <span>${esc(m.period||"Yesterday vs 7-day average")}</span>
      <span>Generated <b>${m.generated_at?new Date(m.generated_at).toLocaleString("en-IN",{dateStyle:"medium",timeStyle:"short"}):"—"} IST</b></span>
      <span>Source: <b>${esc(m.source||"—")}</b></span></div>
  </div>`;
  const toc=`<div class="toc"><a href="#ceo">★ CEO Summary</a>${(B.sections||[]).map((s,i)=>`<a href="#sec-${s.id}">${i+1}. ${esc(s.title.split("—")[0].trim())}</a>`).join("")}</div>`;
  document.getElementById("content").innerHTML =
    cover + toc + renderFinal(B.final||{}) + (B.sections||[]).map(renderSection).join("");
  document.getElementById("src").textContent =
    (m.source==="sample"?"Sample data — the live book generates on the next authenticated run":"Live · "+(m.run_date||""));
  document.getElementById("foot").innerHTML =
    `Lucira Executive Decision Book · generated daily 10:00 IST by the AI CBO · ${m.source==="sample"?"sample preview":"live"}`;
}

async function boot(){
  const t=localStorage.getItem("book_theme"); if(t) document.documentElement.dataset.theme=t;
  document.getElementById("theme").onclick=()=>{const n=document.documentElement.dataset.theme==="dark"?"light":"dark";
    document.documentElement.dataset.theme=n;localStorage.setItem("book_theme",n);};
  document.getElementById("print").onclick=()=>window.print();
  await load(); render();
}
boot();
</script>
