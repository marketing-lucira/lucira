name: Deploy Dashboards to Pages

# Publishes the Lucira dashboards to GitHub Pages as ONE site (a repo can host
# only one Pages site, so both dashboards share it under subpaths):
#   /                 → hub landing page (deploy/hub/index.html)
#   /gcp-cost/        → dashboard/gcp-cost-dashboard.html
#   /ga4/             → dashboard/ga4-dashboard.html
#
# Only these specific files are published — never the repo root — so the rest of
# this monorepo (CRM data, backend functions, any secrets) is NOT exposed.
#
# Per-dashboard config is injected inline at deploy time from GitHub repo
# Variables (Settings → Secrets and variables → Actions → Variables):
#   GCP cost : GCP_COST_API_BASE, GCP_MONTHLY_BUDGET, GCP_BILLING_CURRENCY, GCP_USD_FX
#   GA4      : GA4_SNAPSHOT_URL (daily static snapshot the dashboard reads), GA4_API_BASE
#              (optional, for the AI assistant), GA4_CURRENCY
# Unset → the dashboard uses its built-in defaults (sample data / manual CSV).

on:
  push:
    branches: [main]
    paths:
      - "dashboard/gcp-cost-dashboard.html"
      - "dashboard/ga4-dashboard.html"
      - "deploy/hub/index.html"
      - ".github/workflows/deploy-dashboards.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble Pages site (hub + both dashboards, config injected)
        env:
          # GCP cost dashboard
          GCP_COST_API_BASE:    ${{ vars.GCP_COST_API_BASE }}
          GCP_MONTHLY_BUDGET:   ${{ vars.GCP_MONTHLY_BUDGET }}
          GCP_BILLING_CURRENCY: ${{ vars.GCP_BILLING_CURRENCY }}
          GCP_USD_FX:           ${{ vars.GCP_USD_FX }}
          # GA4 dashboard (daily-snapshot model)
          GA4_SNAPSHOT_URL:     ${{ vars.GA4_SNAPSHOT_URL }}
          GA4_API_BASE:         ${{ vars.GA4_API_BASE }}
          GA4_CURRENCY:         ${{ vars.GA4_CURRENCY }}
        run: |
          set -euo pipefail
          mkdir -p _site/gcp-cost _site/ga4
          touch _site/.nojekyll

          # Copy a dashboard file to dest, replacing its config-marker line with an
          # inline <script> that sets a config global (or nothing). Line loop — not
          # sed/awk — so URLs with & / \ can't corrupt output.
          inject () {
            local src="$1" dest="$2" marker="$3" global="$4" cfg="$5"
            test -f "$src" || { echo "::error::$src not found"; exit 1; }
            local snippet=""
            if [ -n "$cfg" ] && [ "$cfg" != "{}" ]; then
              snippet="<script>window.${global} = ${cfg};</script>"
            fi
            # Match ONLY the HTML-comment marker line ("<!-- TOKEN ..."), never a
            # JS line that merely mentions the token — else we'd blank real code.
            while IFS= read -r line || [ -n "$line" ]; do
              case "$line" in
                *"<!-- $marker"*) printf '%s\n' "$snippet" ;;
                *)                printf '%s\n' "$line" ;;
              esac
            done < "$src" > "$dest"
          }

          # ---- GCP cost config ----
          GCP_CFG="$(jq -nc \
            --arg api "${GCP_COST_API_BASE:-}" --arg cur "${GCP_BILLING_CURRENCY:-}" \
            --arg bud "${GCP_MONTHLY_BUDGET:-}" --arg fx "${GCP_USD_FX:-}" '
            {} | (if $api!="" then .API_BASE=$api else . end)
               | (if $cur!="" then .BILLING_CURRENCY=$cur else . end)
               | (if $bud!="" then .MONTHLY_BUDGET=($bud|tonumber) else . end)
               | (if $fx !="" then .USD_FX=($fx|tonumber) else . end)')"
          inject dashboard/gcp-cost-dashboard.html _site/gcp-cost/index.html \
                 GCP_COST_CONFIG_INJECT __GCP_COST_CONFIG__ "$GCP_CFG"

          # ---- GA4 config (daily-snapshot model) ----
          GA4_CFG="$(jq -nc \
            --arg snap "${GA4_SNAPSHOT_URL:-}" --arg api "${GA4_API_BASE:-}" --arg cur "${GA4_CURRENCY:-}" '
            {} | (if $snap!="" then .SNAPSHOT_URL=$snap else . end)
               | (if $api !="" then .API_BASE=$api else . end)
               | (if $cur !="" then .CURRENCY=$cur else . end)')"
          inject dashboard/ga4-dashboard.html _site/ga4/index.html \
                 GA4_CONFIG_INJECT __GA4_CONFIG__ "$GA4_CFG"

          # ---- hub landing page ----
          if [ -f deploy/hub/index.html ]; then cp deploy/hub/index.html _site/index.html; fi

          echo "GCP cfg: ${GCP_CFG}"; echo "GA4 cfg: ${GA4_CFG}"
          ls -R _site
          grep -q "GCP Cost Command Center" _site/gcp-cost/index.html || { echo "::error::cost dashboard content missing"; exit 1; }
          grep -q "GA4" _site/ga4/index.html || { echo "::error::ga4 dashboard content missing"; exit 1; }

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
