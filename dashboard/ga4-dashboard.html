<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lucira · GA4 Analytics Command Center</title>
<style>
/* ══════════════════════════════════════════════════════════════════
   THEME TOKENS  (validated data-viz palette — light + dark)
   ══════════════════════════════════════════════════════════════════ */
:root{
  --surface:#fcfcfb; --plane:#f4f4f1; --panel:#ffffff;
  --ink:#0b0b0b; --ink2:#52514e; --muted:#898781;
  --grid:#e1e0d9; --axis:#c3c2b7; --border:rgba(11,11,11,.10);
  --good:#0ca30c; --warn:#fab219; --serious:#ec835a; --crit:#d03b3b;
  --accent:#2a78d6; --accent-soft:rgba(42,120,214,.10);
  --glass:rgba(255,255,255,.72); --glass-brd:rgba(11,11,11,.08);
  --shadow:0 1px 2px rgba(11,11,11,.05),0 8px 24px rgba(11,11,11,.06);
  --radius:18px; --radius-sm:12px;
  --s1:#2a78d6;--s2:#008300;--s3:#e87ba4;--s4:#eda100;--s5:#1baf7a;--s6:#eb6834;--s7:#4a3aa7;--s8:#e34948;
  color-scheme:light;
}
:root[data-theme="dark"]{
  --surface:#1a1a19; --plane:#0d0d0d; --panel:#161615;
  --ink:#ffffff; --ink2:#c3c2b7; --muted:#898781;
  --grid:#2c2c2a; --axis:#383835; --border:rgba(255,255,255,.10);
  --accent:#3987e5; --accent-soft:rgba(57,135,229,.14);
  --glass:rgba(28,28,26,.62); --glass-brd:rgba(255,255,255,.09);
  --shadow:0 1px 2px rgba(0,0,0,.4),0 12px 32px rgba(0,0,0,.5);
  --s1:#3987e5;--s2:#008300;--s3:#d55181;--s4:#c98500;--s5:#199e70;--s6:#d95926;--s7:#9085e9;--s8:#e66767;
  color-scheme:dark;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  background:
    radial-gradient(1200px 600px at 100% -5%,var(--accent-soft),transparent 55%),
    radial-gradient(900px 500px at -10% 110%,rgba(216,89,38,.06),transparent 55%),
    var(--plane);
  color:var(--ink); font-size:14px; line-height:1.45;
  -webkit-font-smoothing:antialiased; overflow-x:hidden;
}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--axis);border-radius:8px}
::-webkit-scrollbar-track{background:transparent}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:var(--accent);text-decoration:none}
.tnum{font-variant-numeric:tabular-nums}

/* ── Top bar ─────────────────────────────────────────────── */
.topbar{
  position:sticky;top:0;z-index:60;display:flex;align-items:center;gap:14px;
  padding:12px 22px; backdrop-filter:blur(18px) saturate(1.4);
  background:var(--glass); border-bottom:1px solid var(--glass-brd);
}
.brand{display:flex;align-items:center;gap:11px;min-width:0}
.brand .mark{
  width:38px;height:38px;border-radius:11px;flex:none;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--s1),var(--s7)); color:#fff;font-weight:800;font-size:18px;
  box-shadow:0 6px 18px rgba(42,120,214,.35);
}
.brand h1{font-size:15px;font-weight:700;letter-spacing:.2px;white-space:nowrap}
.brand small{display:block;font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.3px}
.spacer{flex:1}
.livechip{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--ink2);
  padding:6px 11px;border:1px solid var(--border);border-radius:20px;background:var(--glass)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--warn);box-shadow:0 0 0 4px rgba(250,178,25,.18)}
.dot.live{background:var(--good);box-shadow:0 0 0 4px rgba(12,163,12,.18)}
.iconbtn{
  width:38px;height:38px;border-radius:11px;display:grid;place-items:center;
  border:1px solid var(--border);background:var(--glass);color:var(--ink2);
  transition:.18s; font-size:16px;
}
.iconbtn:hover{color:var(--ink);border-color:var(--accent);transform:translateY(-1px)}
.btn{
  display:inline-flex;align-items:center;gap:8px;padding:9px 15px;border-radius:11px;
  border:1px solid var(--border);background:var(--glass);color:var(--ink);font-weight:600;font-size:13px;
  transition:.18s;
}
.btn:hover{border-color:var(--accent);transform:translateY(-1px)}
.btn.primary{background:linear-gradient(135deg,var(--s1),var(--s7));color:#fff;border:none;box-shadow:0 6px 18px rgba(42,120,214,.32)}
.btn.primary:hover{filter:brightness(1.06)}
.filtcount{background:var(--crit);color:#fff;font-size:10px;font-weight:800;border-radius:20px;
  min-width:17px;height:17px;display:grid;place-items:center;padding:0 5px}

/* ── Tab rail ────────────────────────────────────────────── */
.tabrail{
  position:sticky;top:63px;z-index:50;display:flex;gap:4px;padding:8px 18px;overflow-x:auto;
  background:var(--glass);backdrop-filter:blur(18px);border-bottom:1px solid var(--glass-brd);scrollbar-width:none;
}
.tabrail::-webkit-scrollbar{display:none}
.tab{
  white-space:nowrap;padding:8px 15px;border-radius:10px;font-weight:600;font-size:13px;color:var(--ink2);
  display:flex;align-items:center;gap:7px;transition:.16s;border:1px solid transparent;
}
.tab:hover{background:var(--accent-soft);color:var(--ink)}
.tab.active{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(42,120,214,.3)}
.tab .ic{font-size:14px}

/* ── Layout ──────────────────────────────────────────────── */
.wrap{max-width:1560px;margin:0 auto;padding:20px 22px 60px}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.span2{grid-column:span 2}
.span3{grid-column:span 3}
@media(max-width:1150px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}.span3{grid-column:span 2}}
@media(max-width:720px){.g2,.g3,.g4{grid-template-columns:1fr}.span2,.span3{grid-column:span 1}}

/* ── Cards ───────────────────────────────────────────────── */
.card{
  background:var(--glass);backdrop-filter:blur(14px);border:1px solid var(--glass-brd);
  border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);position:relative;
  animation:rise .5s cubic-bezier(.2,.7,.3,1) both;
}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.card h3{font-size:13.5px;font-weight:700;letter-spacing:.2px;display:flex;align-items:center;gap:8px}
.card .sub{font-size:11.5px;color:var(--muted);font-weight:500;margin-top:2px}
.card .hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:10px}
.card .tools{display:flex;gap:6px;flex:none}
.minibtn{font-size:11px;color:var(--muted);padding:4px 8px;border-radius:8px;border:1px solid var(--border);transition:.15s}
.minibtn:hover{color:var(--ink);border-color:var(--accent)}
.minibtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:9px;overflow:hidden}
.seg button{font-size:11px;padding:5px 9px;color:var(--muted);transition:.14s}
.seg button.on{background:var(--accent);color:#fff}

/* ── KPI cards ───────────────────────────────────────────── */
.kpi{
  background:var(--glass);backdrop-filter:blur(14px);border:1px solid var(--glass-brd);
  border-radius:var(--radius-sm);padding:14px 15px;box-shadow:var(--shadow);position:relative;overflow:hidden;
  animation:rise .5s cubic-bezier(.2,.7,.3,1) both; cursor:default;
}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--kc,var(--accent))}
.kpi .lbl{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.3px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.kpi .val{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-top:6px;line-height:1}
.kpi .foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px;font-size:11.5px}
.kpi .delta{font-weight:700;display:inline-flex;align-items:center;gap:3px}
.up{color:var(--good)} .down{color:var(--crit)} .flat{color:var(--muted)}
.kpi .spark{position:absolute;right:8px;bottom:6px;opacity:.5}

/* ── Filter drawer ───────────────────────────────────────── */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(2px);z-index:90;opacity:0;pointer-events:none;transition:.28s}
.scrim.open{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;top:0;right:0;height:100%;width:400px;max-width:92vw;z-index:100;
  background:var(--panel);border-left:1px solid var(--border);box-shadow:-20px 0 60px rgba(0,0,0,.35);
  transform:translateX(100%);transition:transform .3s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column;
}
.drawer.open{transform:none}
.drawer .dhd{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border)}
.drawer .dhd h2{font-size:15px;font-weight:700}
.drawer .body{flex:1;overflow-y:auto;padding:14px 18px 20px}
.drawer .dfoot{display:flex;gap:8px;padding:14px 18px;border-top:1px solid var(--border);background:var(--panel)}
.fgroup{margin-bottom:16px}
.fgroup>label{display:block;font-size:11px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:7px}
.fgroup select,.fgroup input[type=text],.fgroup input[type=number],.fgroup input[type=date]{
  width:100%;padding:9px 11px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--ink);font-size:13px;font-family:inherit;
}
.fgroup select:focus,.fgroup input:focus{outline:none;border-color:var(--accent)}
.presets{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.presets button{padding:8px 6px;border-radius:9px;border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--ink2);transition:.14s;text-align:center}
.presets button:hover{border-color:var(--accent);color:var(--ink)}
.presets button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.frow{display:flex;gap:8px}
.frow>*{flex:1}
.rangewrap{display:flex;align-items:center;gap:8px}
.section-t{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.6px;margin:20px 0 10px;text-transform:uppercase;border-top:1px dashed var(--border);padding-top:14px}
.section-t:first-child{border:none;padding-top:0;margin-top:0}

/* ── Tables ──────────────────────────────────────────────── */
.tblbar{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.tblbar input{padding:7px 11px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--ink);font-size:12.5px;min-width:180px}
.tblscroll{overflow:auto;border-radius:12px;border:1px solid var(--border);max-height:520px}
table.dt{width:100%;border-collapse:collapse;font-size:12.5px}
table.dt th{
  position:sticky;top:0;z-index:2;background:var(--panel);text-align:left;padding:10px 12px;font-weight:700;
  color:var(--ink2);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;
}
table.dt th:hover{color:var(--ink)}
table.dt th.num,table.dt td.num{text-align:right;font-variant-numeric:tabular-nums}
table.dt td{padding:9px 12px;border-bottom:1px solid var(--grid);white-space:nowrap}
table.dt tbody tr:hover{background:var(--accent-soft)}
.heatcell{border-radius:6px;padding:2px 7px;font-weight:600}
.pager{display:flex;gap:8px;align-items:center;justify-content:flex-end;margin-top:10px;font-size:12px;color:var(--muted)}
.pager button{padding:5px 10px;border:1px solid var(--border);border-radius:8px}
.pager button:disabled{opacity:.4}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;border-radius:20px;background:var(--accent-soft);color:var(--accent);font-weight:600}
.tag{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:20px;font-weight:700}

/* ── Legend / misc ───────────────────────────────────────── */
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}
.legend .li{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink2);cursor:pointer}
.legend .sw{width:11px;height:11px;border-radius:3px;flex:none}
.legend .li.off{opacity:.4}
svg{display:block;overflow:visible}
.axis-lbl{fill:var(--muted);font-size:10px}
.grid-line{stroke:var(--grid);stroke-width:1}
.baseline{stroke:var(--axis);stroke-width:1}
.clickable{cursor:pointer;transition:opacity .15s}
.clickable:hover{opacity:.82}
.emptybox{padding:40px;text-align:center;color:var(--muted);font-size:13px}

/* ── Tooltip ─────────────────────────────────────────────── */
#tip{
  position:fixed;z-index:200;pointer-events:none;opacity:0;transition:opacity .1s;
  background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:9px 12px;
  box-shadow:var(--shadow);font-size:12px;max-width:280px;
}
#tip .tt{font-weight:700;margin-bottom:4px}
#tip .tr{display:flex;justify-content:space-between;gap:16px;color:var(--ink2)}
#tip .tr b{color:var(--ink);font-variant-numeric:tabular-nums}

/* ── Skeleton ────────────────────────────────────────────── */
.skwrap{position:fixed;inset:0;z-index:150;background:var(--plane);display:grid;place-items:center;transition:.4s}
.skwrap.hide{opacity:0;pointer-events:none}
.loader{display:flex;flex-direction:column;align-items:center;gap:18px}
.loader .ring{width:52px;height:52px;border-radius:50%;border:4px solid var(--border);border-top-color:var(--accent);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader .txt{font-size:13px;color:var(--muted);font-weight:600}
.sk{background:linear-gradient(90deg,var(--grid) 25%,var(--border) 37%,var(--grid) 63%);background-size:400% 100%;animation:shim 1.4s infinite;border-radius:8px}
@keyframes shim{0%{background-position:100% 0}100%{background-position:-100% 0}}

.banner{display:flex;gap:10px;align-items:center;padding:11px 15px;border-radius:12px;font-size:12.5px;
  background:rgba(250,178,25,.12);border:1px solid rgba(250,178,25,.3);color:var(--ink);margin-bottom:16px}
.banner .bic{font-size:16px}
.pill-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.activef{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:5px 10px;border-radius:20px;background:var(--accent-soft);color:var(--accent);border:1px solid rgba(42,120,214,.2)}
.activef button{color:var(--accent);font-weight:800;font-size:13px;line-height:1}
:fullscreen .wrap{max-width:100%;background:var(--plane)}
:fullscreen{overflow:auto}
@media print{.topbar,.tabrail,.drawer,.scrim,#tip,.tools,.tblbar{display:none!important}.wrap{max-width:100%}.card{break-inside:avoid;box-shadow:none;border:1px solid #ccc}}
/* Global control bar — always-visible date-range + granularity dropdowns */
.controlbar{display:flex;flex-wrap:wrap;align-items:flex-end;gap:12px;margin:2px 0 14px}
.controlbar .ctl{display:flex;flex-direction:column;gap:4px}
.controlbar label{font-size:10px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.4px}
.controlbar select,.controlbar input[type=date]{padding:8px 11px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--ink);font-size:12.5px;font-family:inherit;cursor:pointer}
.controlbar select:focus,.controlbar input:focus{outline:none;border-color:var(--accent)}
.controlbar .cbcustom{flex-direction:row;align-items:flex-end;gap:8px}
</style>
</head>
<body>

<!-- Loading -->
<div class="skwrap" id="skel"><div class="loader"><div class="ring"></div><div class="txt">Building analytics engine…</div></div></div>

<!-- Top bar -->
<header class="topbar">
  <div class="brand">
    <div class="mark">L</div>
    <div><h1>GA4 Analytics Command Center</h1><small>Lucira Jewelry · Google Analytics 4</small></div>
  </div>
  <div class="spacer"></div>
  <div class="livechip" id="livechip" title="Data source status">
    <span class="dot" id="livedot"></span><span id="livetxt">Sample data</span>
  </div>
  <button class="btn primary" id="btnFilters">⛃ Filters<span class="filtcount" id="fcount" style="display:none">0</span></button>
  <button class="iconbtn" id="btnExport" title="Export dashboard">⤓</button>
  <button class="iconbtn" id="btnFull" title="Full screen">⛶</button>
  <button class="iconbtn" id="btnTheme" title="Toggle theme">◐</button>
  <button class="iconbtn" id="btnRefresh" title="Refresh">⟳</button>
</header>

<!-- Tabs -->
<nav class="tabrail" id="tabrail"></nav>

<!-- Active filters row + content -->
<main class="wrap">
  <!-- Always-visible advanced controls: date range + granularity -->
  <div class="controlbar">
    <div class="ctl">
      <label for="cbRange">Date range</label>
      <select id="cbRange">
        <option value="today">Today</option>
        <option value="yesterday">Yesterday</option>
        <option value="7d">Last 7 Days</option>
        <option value="30d">Last 30 Days</option>
        <option value="90d">Last 90 Days</option>
        <option value="thisMonth">This Month</option>
        <option value="lastMonth">Last Month</option>
        <option value="3m">Last 3 Months</option>
        <option value="6m">Last 6 Months</option>
        <option value="thisYear">This Year</option>
        <option value="lastYear">Last Year</option>
        <option value="custom">Custom Range</option>
      </select>
    </div>
    <div class="ctl cbcustom" id="cbCustom" style="display:none">
      <div class="ctl"><label for="cbFrom">From</label><input type="date" id="cbFrom"></div>
      <div class="ctl"><label for="cbTo">To</label><input type="date" id="cbTo"></div>
    </div>
    <div class="ctl">
      <label for="cbGran">Granularity</label>
      <select id="cbGran">
        <option value="day">Daily</option>
        <option value="week">Weekly</option>
        <option value="month">Monthly</option>
        <option value="quarter">Quarterly</option>
        <option value="year">Yearly</option>
      </select>
    </div>
  </div>
  <div class="pill-row" id="activeFilters"></div>
  <div id="view"></div>
</main>

<!-- Filter drawer -->
<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer">
  <div class="dhd"><h2>⛃ Advanced Filters</h2><button class="iconbtn" id="btnCloseDrawer">✕</button></div>
  <div class="body" id="drawerBody"></div>
  <div class="dfoot">
    <button class="btn primary" id="btnApply" style="flex:1">Apply</button>
    <button class="btn" id="btnReset">Reset</button>
    <button class="btn" id="btnExport2">Export</button>
  </div>
</aside>

<div id="tip"></div>

<!-- GA4_CONFIG_INJECT · CI (GitHub Actions) replaces THIS line with an inline <script> that sets window.__GA4_CONFIG__ from GitHub Variables. Left as a plain comment locally, so file:// use is unaffected (no external fetch, no parser-block) and the CONFIG defaults below apply. -->
<script>
"use strict";
/* ══════════════════════════════════════════════════════════════════
   LUCIRA GA4 DASHBOARD — self-contained, vanilla JS.
   Data source: connected GA4 property (via ga4-api Cloud Function).
   Until the API URL is set, a deterministic seeded GA4 sample renders
   so the full experience is visible. Set CONFIG.API_BASE to go live.
   ══════════════════════════════════════════════════════════════════ */
const CONFIG = {
  // Daily-snapshot model (NOT continuous live querying). The dashboard loads ONE
  // snapshot built server-side at 09:00 IST and reuses it all day, refreshing only
  // at the next 09:00 IST boundary. Point SNAPSHOT_URL at the prebuilt daily JSON
  // (a public GCS object written by ga4-bq-api /snapshot). If SNAPSHOT_URL is empty
  // but API_BASE is set, the dashboard instead fetches one wide-window payload from
  // <API_BASE>/data once per day. Both empty = built-in deterministic sample.
  SNAPSHOT_URL: "",
  API_BASE: "",                 // ga4-bq-api base — used by the AI assistant (/ai) and as a /data snapshot fallback
  SNAPSHOT_DAYS: 400,           // history the snapshot covers; the UI filters client-side within it
  REFRESH_HOUR_IST: 9,          // daily refresh hour, IST
  CURRENCY: "INR",
  TODAY: "2026-07-16",          // sample anchor; overwritten by the snapshot's window.to
};
/* Deploy-time overrides: CI injects an inline <script> at the config marker
   above that sets window.__GA4_CONFIG__ from GitHub repo Variables. Merge
   it over the defaults so the live BigQuery backend URL / currency can be set at
   deploy time WITHOUT editing this file. No-op locally (marker stays a comment). */
try { if (window.__GA4_CONFIG__) Object.assign(CONFIG, window.__GA4_CONFIG__); } catch (e) {}

/* ── Palette (validated) ─────────────────────────────────── */
const PAL = {
  light:{surface:'#fcfcfb',ink:'#0b0b0b',ink2:'#52514e',muted:'#898781',grid:'#e1e0d9',axis:'#c3c2b7',
    series:['#2a78d6','#008300','#e87ba4','#eda100','#1baf7a','#eb6834','#4a3aa7','#e34948'],
    seq:'#2a78d6',good:'#0ca30c',warn:'#fab219',serious:'#ec835a',crit:'#d03b3b'},
  dark:{surface:'#1a1a19',ink:'#ffffff',ink2:'#c3c2b7',muted:'#898781',grid:'#2c2c2a',axis:'#383835',
    series:['#3987e5','#008300','#d55181','#c98500','#199e70','#d95926','#9085e9','#e66767'],
    seq:'#3987e5',good:'#0ca30c',warn:'#fab219',serious:'#ec835a',crit:'#d03b3b'},
};

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const pick=(rng,arr)=>arr[Math.floor(rng()*arr.length)];
function wpick(rng,arr){const t=arr.reduce((s,x)=>s+x.w,0);let r=rng()*t;for(const x of arr){if((r-=x.w)<=0)return x;}return arr[arr.length-1];}
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function fmtNum(n){n=+n||0;const a=Math.abs(n);if(a>=1e7)return(n/1e7).toFixed(2)+'Cr';if(a>=1e5)return(n/1e5).toFixed(2)+'L';if(a>=1e3)return(n/1e3).toFixed(1)+'K';return(Math.round(n*10)/10).toLocaleString('en-IN');}
function fmtInt(n){return Math.round(+n||0).toLocaleString('en-IN');}
function fmtMoney(n){n=+n||0;const s=n<0?'-':'';const a=Math.abs(n);if(a>=1e7)return s+'₹'+(a/1e7).toFixed(2)+'Cr';if(a>=1e5)return s+'₹'+(a/1e5).toFixed(2)+'L';if(a>=1e3)return s+'₹'+(a/1e3).toFixed(1)+'K';return s+'₹'+Math.round(a).toLocaleString('en-IN');}
function fmtMoneyFull(n){return '₹'+Math.round(+n||0).toLocaleString('en-IN');}
function fmtPct(n,d=1){return (+n||0).toFixed(d)+'%';}
function fmtDur(s){s=Math.round(+s||0);const m=Math.floor(s/60),ss=s%60;if(m>=60){const h=Math.floor(m/60);return h+'h '+(m%60)+'m';}return m>0?m+'m '+ss+'s':ss+'s';}
const daysBetween=(a,b)=>Math.round((new Date(b)-new Date(a))/864e5);
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x.toISOString().slice(0,10);}

/* seasonality multiplier for a given date */
function seasonal(dstr){
  const d=new Date(dstr),m=d.getMonth(),day=d.getDay();
  let s=1;
  if(m===9||m===10)s*=1.7;                 // Oct-Nov Diwali/wedding
  if(m===3||m===4)s*=1.45;                 // Apr-May Akshaya Tritiya
  if(m===1)s*=1.3;                         // Feb Valentine
  if(m===7)s*=.82;                         // Aug lull (shraddh)
  if(day===0||day===6)s*=1.18;             // weekend uplift
  return s;
}

/* ══════════════════════════════════════════════════════════════════
   SAMPLE GENERATION  (deterministic — seed 20260716)
   Grain = SESSION.  Each row is one GA4 session with full dimensions.
   ══════════════════════════════════════════════════════════════════ */
function buildSample(){
  const rng=mulberry32(20260716);
  const SPAN=400, END=CONFIG.TODAY, START=addDays(END,-(SPAN-1));
  // ---- users ----
  const NUSERS=7200, users=[];
  for(let i=0;i<NUSERS;i++){
    // first-seen date skewed toward recent
    const off=Math.floor(Math.pow(rng(),1.5)*SPAN);
    users.push({id:i,first:addDays(END,-off),ltv:0,orders:0,sessions:0});
  }
  const rows=[];
  let sid=0;
  // Walk each day; volume scales with seasonality + slow growth
  for(let dOff=SPAN-1;dOff>=0;dOff--){
    const date=addDays(END,-dOff);
    const growth=1+(SPAN-1-dOff)/SPAN*0.5;       // +50% over the window
    const base=26*growth*seasonal(date);
    const n=Math.max(6,Math.round(base+(rng()-.5)*8));
    for(let k=0;k<n;k++){
      // choose user: 55% returning (user whose first<=date), else new
      let u;
      if(rng()<0.5){
        // returning: sample an existing user seen before
        for(let tries=0;tries<6;tries++){const cand=users[Math.floor(rng()*NUSERS)];if(cand.first<=date && cand.sessions>0){u=cand;break;}}
      }
      if(!u){
        // pick a user whose first == date (new) if possible else any seen
        for(let tries=0;tries<8;tries++){const cand=users[Math.floor(rng()*NUSERS)];if(cand.first<=date){u=cand;break;}}
        if(!u)u=users[0];
      }
      const isNew = u.sessions===0;              // first session for this user in dataset
      u.sessions++;
      const ch=wpick(rng,CH);
      const s=pick(rng,ch.src);
      const camp = ch.name.includes('Paid')||ch.name.includes('Shopping')||ch.name==='Display'
        ? pick(rng,CAMPAIGNS.slice(0,9)) : (ch.name==='Email'?pick(rng,['Diwali Festive','Bridal Collection','Everyday Gold']):'(organic)');
      const dev=wpick(rng,DEVICES.map(d=>({name:d.name,w:d.w}))).name;
      const br=wpick(rng,BROWSERS[dev].map(x=>({name:x[0],w:x[1]}))).name;
      const os=wpick(rng,OSMAP[dev].map(x=>({name:x[0],w:x[1]}))).name;
      const res=pick(rng,RES[dev]);
      const geo=wpick(rng,GEO.map(g=>({...g,w:g.w})));
      const reg=pick(rng,geo.regions);
      const city=pick(rng,reg.cities);
      const lang=wpick(rng,LANGS.map(l=>({name:l[0],w:l[1]}))).name;
      const platform = dev==='desktop'?'web':(os==='iOS'?'iOS':(os==='Android'?'Android':'web'));
      const host=wpick(rng,[{name:HOSTS[0],w:80},{name:HOSTS[1],w:14},{name:HOSTS[2],w:6}]).name;
      const land=pick(rng, ch.name.includes('Search')?PAGES.slice(0,9):(ch.name.includes('Social')?[PAGES[5],PAGES[6],PAGES[1],PAGES[2],PAGES[11]]:PAGES));
      // engagement
      const engaged = rng() < clamp(0.62*ch.q + (dev==='desktop'?.08:0),0.2,0.94);
      const pv = engaged? 1+Math.floor(rng()*Math.pow(rng(),.4)*9) : (rng()<.5?1:0);
      const engTime = engaged? Math.round((20+rng()*rng()*400)*(dev==='desktop'?1.25:1)) : Math.round(rng()*8);
      // event counts
      const ev={page_view:pv||1,session_start:1,user_engagement:engaged?1+Math.floor(rng()*4):0,scroll:engaged&&rng()<.7?1:0};
      // ecommerce funnel — gated by engagement & channel quality
      const shop = engaged && rng()<clamp(.55*ch.q,.1,.9);
      let viewItem=0,cart=0,checkout=0,payment=0,purchased=0,items=0,rev=0,cat='',brand='',prodName='',coupon='NONE',promo='(none)',refund=0,refAmt=0;
      if(shop){
        viewItem=1+Math.floor(rng()*4); ev.view_item_list=1; ev.view_item=viewItem; ev.select_item=rng()<.6?1:0;
        if(rng()<clamp(.45*ch.q,.1,.75)){
          cart=1+Math.floor(rng()*2); ev.add_to_cart=cart;
          if(rng()<clamp(.55*ch.q,.15,.8)){
            checkout=1; ev.begin_checkout=1; ev.add_shipping_info=rng()<.85?1:0;
            if(rng()<clamp(.62*ch.q,.2,.85)){
              payment=1; ev.add_payment_info=1;
              if(rng()<clamp(.72*ch.q,.3,.92)){
                purchased=1; ev.purchase=1;
                const p=wpick(rng,PRODUCTS.map(pr=>({pr,w: pr[3]>150000?1: pr[3]>60000?3:6})));
                prodName=p.pr[0];cat=p.pr[1];brand=p.pr[2];
                items=1+(rng()<.25?1:0)+(rng()<.08?1:0);
                const seas=seasonal(date);
                rev=Math.round(p.pr[3]*items*(0.88+rng()*0.3)*(seas>1.3?1.05:1));
                coupon=pick(rng,COUPONS);
                promo = camp.includes('Diwali')?'Diwali Festive Offer':camp.includes('Akshaya')?'Akshaya Tritiya Gold':camp.includes('Bridal')?'Bridal Season':pick(rng,PROMOS);
                if(coupon!=='NONE')rev=Math.round(rev*0.92);
                u.orders++; u.ltv+=rev;
                if(rng()<0.035){refund=1;refAmt=Math.round(rev*(rng()<.5?1:0.5));ev.refund=1;}
              }
            }
          }
        }
      }
      if(rng()<.03)ev.search=1;
      if(isNew&&rng()<.12){ev.sign_up=1;}
      if(!isNew&&rng()<.18){ev.login=1;}
      if(promo!=='(none)'){ev.view_promotion=1;ev.select_promotion=rng()<.4?1:0;}
      const evCount=Object.values(ev).reduce((a,b)=>a+b,0);
      // key events = purchase + sign_up + (begin_checkout as micro) — GA4 key events are configurable; use purchase+sign_up+add_to_cart-as-KE off
      const keyEvents=(ev.purchase||0)+(ev.sign_up||0)+(ev.begin_checkout||0);
      const converted = purchased===1;
      rows.push({
        id:sid++, date, uid:u.id, isNew,
        channel:ch.name, source:s[0], medium:s[1], sourceMedium:s[0]+' / '+s[1], campaign:camp,
        device:dev, browser:br, os, screenRes:res, platform,
        country:geo.country, region:reg.region, city, language:lang,
        landingPage:land[0], pageTitle:land[1], pagePath:land[0], contentGroup:land[2], hostname:host,
        engaged:engaged?1:0, engTime, pv,
        ev, evCount, keyEvents, converted:converted?1:0,
        viewItem,cart,checkout,payment,purchased, items, revenue:rev, aov:purchased?rev/items:0,
        category:cat,brand,product:prodName, coupon,promo, refund, refAmt,
        userType: u.orders>0? 'Customer':'Prospect',
        nr: isNew?'New':'Returning',
      });
    }
  }
  // user ref (first date within-dataset already = users[].first)
  const userRef={};
  users.forEach(u=>{userRef[u.id]={first:u.first,ltv:u.ltv,orders:u.orders,sessions:u.sessions};});
  return {rows,userRef,meta:{from:START,to:END,generated:END}};
}

function presetRange(p){
  const T=STATE.meta.to||CONFIG.TODAY;
  const d=new Date(T); const y=d.getFullYear(),m=d.getMonth();
  const first=(yy,mm)=>iso(new Date(yy,mm,1));
  switch(p){
    case 'today':return[T,T];
    case 'yesterday':{const yd=addDays(T,-1);return[yd,yd];}
    case '7d':return[addDays(T,-6),T];
    case '30d':return[addDays(T,-29),T];
    case 'thisMonth':return[first(y,m),T];
    case 'lastMonth':{const lm=new Date(y,m-1,1);return[iso(lm),iso(new Date(y,m,0))];}
    case '3m':return[addDays(T,-89),T];
    case '6m':return[addDays(T,-179),T];
    case '90d':return[addDays(T,-89),T];
    case 'thisYear':return[first(y,0),T];
    case 'lastYear':return[iso(new Date(y-1,0,1)),iso(new Date(y-1,11,31))];
    case 'custom':return[STATE.filters.from||addDays(T,-29),STATE.filters.to||T];
    default:return[addDays(T,-89),T];
  }
}
function activeRange(){const f=STATE.filters;return f.preset==='custom'?[f.from,f.to]:presetRange(f.preset);}

function passRow(r,ignore){
  const f=STATE.filters, ig=ignore||{};
  const [from,to]=activeRange();
  if(from&&r.date<from)return false;
  if(to&&r.date>to)return false;
  const eq=(k,v)=>ig[k]||!f[k]||r[v??k]===f[k];
  if(!eq('channel'))return false;
  if(!eq('source'))return false;
  if(!eq('medium'))return false;
  if(!eq('sourceMedium'))return false;
  if(!eq('campaign'))return false;
  if(!eq('landingPage'))return false;
  if(!eq('device'))return false;
  if(!eq('browser'))return false;
  if(!eq('os'))return false;
  if(!eq('country'))return false;
  if(!eq('region'))return false;
  if(!eq('city'))return false;
  if(!eq('language'))return false;
  if(!eq('platform'))return false;
  if(!eq('nr'))return false;
  if(!eq('pageTitle'))return false;
  if(!eq('pagePath'))return false;
  if(!eq('contentGroup'))return false;
  if(!eq('hostname'))return false;
  if(!eq('screenRes'))return false;
  if(!ig.userType&&f.userType&&r.userType!==f.userType)return false;
  if(!ig.eventName&&f.eventName&&!(r.ev&&r.ev[f.eventName]))return false;
  if(!ig.search&&f.search){const q=f.search.toLowerCase();
    const hay=(r.product+' '+r.channel+' '+r.campaign+' '+r.pageTitle+' '+r.city+' '+r.source+' '+r.category+' '+r.brand).toLowerCase();
    if(!hay.includes(q))return false;}
  // price filter: only constrains purchase revenue rows
  if(!ig.price&&(f.priceMin!=null||f.priceMax!=null)){
    if(r.purchased){
      if(f.priceMin!=null&&r.revenue<f.priceMin)return false;
      if(f.priceMax!=null&&r.revenue>f.priceMax)return false;
    }
  }
  return true;
}
function filtered(ignore){return STATE.rows.filter(r=>passRow(r,ignore));}

/* comparison window = equal-length preceding period */
function prevRange(){const[from,to]=activeRange();const len=daysBetween(from,to)+1;return[addDays(from,-len),addDays(from,-1)];}
function filteredPrev(){
  const[pf,pt]=prevRange();
  return STATE.rows.filter(r=>{
    if(r.date<pf||r.date>pt)return false;
    const save=STATE.filters.preset,sf=STATE.filters.from,st=STATE.filters.to;
    return passRowNoDate(r);
  });
}
function passRowNoDate(r){
  const saved=STATE.filters.preset;const f=STATE.filters;
  // reuse passRow logic w/o date by temporarily bypassing: replicate dimension checks
  const ig={};
  // Build a shallow check ignoring date only
  const keys=['channel','source','medium','sourceMedium','campaign','landingPage','device','browser','os','country','region','city','language','platform','nr','pageTitle','pagePath','contentGroup','hostname','screenRes'];
  for(const k of keys){if(f[k]&&r[k]!==f[k])return false;}
  if(f.userType&&r.userType!==f.userType)return false;
  if(f.eventName&&!(r.ev&&r.ev[f.eventName]))return false;
  if(f.priceMin!=null&&r.purchased&&r.revenue<f.priceMin)return false;
  if(f.priceMax!=null&&r.purchased&&r.revenue>f.priceMax)return false;
  if(f.search){const q=f.search.toLowerCase();const hay=(r.product+' '+r.channel+' '+r.campaign+' '+r.pageTitle+' '+r.city+' '+r.source+' '+r.category+' '+r.brand).toLowerCase();if(!hay.includes(q))return false;}
  return true;
}

/* ══════════════════════════════════════════════════════════════════
   AGGREGATION
   ══════════════════════════════════════════════════════════════════ */
function kpis(rows){
  const users=new Set(),activeUsers=new Set(),newUsers=new Set(),purUsers=new Set();
  let sessions=0,engSessions=0,views=0,evCount=0,keyEvents=0,conversions=0,purchases=0,revenue=0,
      engTime=0,cart=0,checkout=0,items=0,refAmt=0,refCnt=0,viewItem=0,payment=0;
  for(const r of rows){
    users.add(r.uid);
    if(r.engaged)activeUsers.add(r.uid);
    if(r.isNew)newUsers.add(r.uid);
    sessions++; if(r.engaged)engSessions++;
    views+=r.pv; evCount+=r.evCount; keyEvents+=r.keyEvents; conversions+=r.converted;
    purchases+=r.purchased; revenue+=r.revenue; engTime+=r.engTime;
    cart+=r.cart; checkout+=r.checkout; items+=r.items; viewItem+=r.viewItem; payment+=r.payment;
    refAmt+=r.refAmt; refCnt+=r.refund;
    if(r.purchased)purUsers.add(r.uid);
  }
  const U=users.size||1, S=sessions||1;
  return {
    users:users.size, activeUsers:activeUsers.size, newUsers:newUsers.size, returningUsers:users.size-newUsers.size,
    sessions, engSessions, views, evCount, keyEvents, conversions, purchases, revenue,
    aov: purchases?revenue/purchases:0,
    bounceRate:(1-engSessions/S)*100, engagementRate:engSessions/S*100,
    avgEngTime: engTime/(activeUsers.size||1),
    viewsPerUser:views/U, sessionsPerUser:sessions/U, revenuePerUser:revenue/U,
    cart, checkout, items, viewItem, payment,
    refAmt, refCnt,
    purchaseConvRate: purchases/S*100, userConvRate: purUsers.size/U*100,
    purUsers:purUsers.size,
  };
}

function groupBy(rows,keyFn){
  const map=new Map();
  for(const r of rows){
    const k=keyFn(r); if(k==null||k==='')continue;
    let g=map.get(k);
    if(!g){g={name:k,users:new Set(),sessions:0,engSessions:0,views:0,evCount:0,keyEvents:0,conversions:0,purchases:0,revenue:0,engTime:0,cart:0,checkout:0,items:0,refAmt:0,refCnt:0,viewItem:0,newUsers:new Set()};map.set(k,g);}
    g.users.add(r.uid); if(r.isNew)g.newUsers.add(r.uid);
    g.sessions++; if(r.engaged)g.engSessions++;
    g.views+=r.pv; g.evCount+=r.evCount; g.keyEvents+=r.keyEvents; g.conversions+=r.converted;
    g.purchases+=r.purchased; g.revenue+=r.revenue; g.engTime+=r.engTime;
    g.cart+=r.cart; g.checkout+=r.checkout; g.items+=r.items; g.viewItem+=r.viewItem;
    g.refAmt+=r.refAmt; g.refCnt+=r.refund;
  }
  return [...map.values()].map(g=>({
    name:g.name, users:g.users.size, newUsers:g.newUsers.size, sessions:g.sessions, engSessions:g.engSessions,
    engagementRate:g.sessions?g.engSessions/g.sessions*100:0, views:g.views, evCount:g.evCount,
    keyEvents:g.keyEvents, conversions:g.conversions, purchases:g.purchases, revenue:g.revenue,
    aov:g.purchases?g.revenue/g.purchases:0, engTime:g.engTime, avgEng:g.users.size?g.engTime/g.users.size:0,
    cart:g.cart, checkout:g.checkout, items:g.items, refAmt:g.refAmt, refCnt:g.refCnt, viewItem:g.viewItem,
    convRate:g.sessions?g.purchases/g.sessions*100:0,
  }));
}

function eventTotals(rows){
  const m=new Map();
  const users=new Map();
  for(const r of rows){for(const k in r.ev){const c=r.ev[k];if(!c)continue;m.set(k,(m.get(k)||0)+c);
    if(!users.has(k))users.set(k,new Set());users.get(k).add(r.uid);}}
  return [...m.entries()].map(([name,count])=>({name,count,users:users.get(name).size})).sort(byDesc('count'));
}

/* time bucketing */
function bucketKey(date,gran){
  const d=new Date(date);
  if(gran==='day')return date;
  if(gran==='week'){const day=(d.getDay()+6)%7;const mon=addDays(date,-day);return mon;}
  if(gran==='month')return date.slice(0,7);
  if(gran==='quarter')return d.getFullYear()+'-Q'+(Math.floor(d.getMonth()/3)+1);
  if(gran==='year')return date.slice(0,4);
  return date;
}
function timeSeries(rows,gran,fields){
  const map=new Map();
  for(const r of rows){
    const k=bucketKey(r.date,gran);
    let g=map.get(k); if(!g){g={key:k,sessions:0,users:new Set(),newUsers:new Set(),views:0,revenue:0,purchases:0,keyEvents:0,engSessions:0,evCount:0};map.set(k,g);}
    g.sessions++; g.users.add(r.uid); if(r.isNew)g.newUsers.add(r.uid);
    g.views+=r.pv; g.revenue+=r.revenue; g.purchases+=r.purchased; g.keyEvents+=r.keyEvents; if(r.engaged)g.engSessions++; g.evCount+=r.evCount;
  }
  return [...map.values()].map(g=>({key:g.key,label:tsLabel(g.key,gran),sessions:g.sessions,users:g.users.size,newUsers:g.newUsers.size,
    returningUsers:g.users.size-g.newUsers.size,views:g.views,revenue:g.revenue,purchases:g.purchases,keyEvents:g.keyEvents,
    engagementRate:g.sessions?g.engSessions/g.sessions*100:0,evCount:g.evCount,
    aov:g.purchases?g.revenue/g.purchases:0}))
    .sort((a,b)=>a.key<b.key?-1:1);
}
function tsLabel(k,gran){
  if(gran==='day'){const d=new Date(k);return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});}
  if(gran==='week'){const d=new Date(k);return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});}
  if(gran==='month'){const d=new Date(k+'-01');return d.toLocaleDateString('en-IN',{month:'short',year:'2-digit'});}
  return k;
}

function niceMax(v){if(v<=0)return 1;const p=Math.pow(10,Math.floor(Math.log10(v)));const n=v/p;const step=n<=1?1:n<=2?2:n<=5?5:10;return step*p;}

/* LINE / AREA chart. series=[{name,color,data:[{label,v}]}] shared x */
function lineChart(series,opts={}){

  max=niceMax(max||1);const range=max-Math.min(0,min)||1;
  const x=i=>PL+(n<=1?0:(i/(n-1))*(W-PL-PR));
  const y=v=>H-PB-((v-Math.min(0,min))/range)*(H-PT-PB);
  let g='';for(let t=0;t<=4;t++){const v=max*t/4;const yy=y(v);g+=`<line class="grid-line" x1="${PL}" y1="${yy}" x2="${W-PR}" y2="${yy}"/><text class="axis-lbl" x="${PL-8}" y="${yy+3}" text-anchor="end">${opts.money?fmtMoney(v):fmtNum(v)}</text>`;}

  let paths='';

    if(STATE.legendOff[s.name])return;
    let d='',ar='';
    s.data.forEach((pt,i)=>{d+=(i?'L':'M')+x(i).toFixed(1)+' '+y(pt.v).toFixed(1)+' ';});
    if(opts.area){ar=`M${x(0)} ${y(0)} `+s.data.map((pt,i)=>'L'+x(i).toFixed(1)+' '+y(pt.v).toFixed(1)).join(' ')+` L${x(n-1)} ${y(0)} Z`;
      paths+=`<path d="${ar}" fill="${s.color}" opacity="${opts.stack?.9:.13}"/>`;}
    if(!opts.stack)paths+=`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
  });

    series.forEach(s=>{if(!STATE.legendOff[s.name]&&!opts.stack)hov+=`<circle cx="${cx}" cy="${y(s.data[i].v)}" r="2.6" fill="${s.color}"/>`;});
  }
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="max-height:${H}px">${g}${paths}${hov}${xl}<line class="baseline" x1="${PL}" y1="${y(Math.min(0,min))}" x2="${W-PR}" y2="${y(Math.min(0,min))}"/></svg>${legendHtml(series,id)}`;

/* vertical bars: data=[{label,v,color?}] */

/* donut: data=[{label,v}] */

/* heatmap: rows[],cols[],val(r,c) */
function heatmap(rowsL,colsL,valFn,opts={}){

/* treemap (squarified-ish simple slice): data=[{label,v}] */
function treemap(data,opts={}){
  data=data.filter(d=>d.v>0).sort(byDesc('v')).slice(0,opts.max||10);
  const W=opts.w||560,H=opts.h||260,total=sum(data,d=>d.v)||1;
  // simple row-based layout
  let x=0,y=0,rowH=0,out='';const cols=Math.ceil(Math.sqrt(data.length));
  // slice-and-dice by area proportion in a horizontal strip layout
  let acc=[];let i=0;
  // Use simple treemap: split alternating
  function layout(items,x,y,w,h,horiz){
    if(!items.length)return;
    if(items.length===1){out+=cell(items[0],x,y,w,h);return;}
    const tot=sum(items,d=>d.v);let half=0,idx=0,acc=0;
    for(;idx<items.length;idx++){acc+=items[idx].v;if(acc>=tot/2){idx++;break;}}
    const a=items.slice(0,idx),b=items.slice(idx);const af=sum(a,d=>d.v)/tot;
    if(horiz){layout(a,x,y,w*af,h,!horiz);layout(b,x+w*af,y,w*(1-af),h,!horiz);}
    else{layout(a,x,y,w,h*af,!horiz);layout(b,x,y+h*af,w,h*(1-af),!horiz);}
  }
  function cell(d,x,y,w,h){const i=data.indexOf(d);const tt=`<div class='tt'>${esc(d.label)}</div><div class='tr'><span>${opts.money?'Revenue':'Value'}</span><b>${opts.money?fmtMoneyFull(d.v):fmtInt(d.v)}</b></div><div class='tr'><span>Share</span><b>${fmtPct(d.v/total*100)}</b></div>`;
    const show=w>54&&h>26;
    return `<g class="clickable" data-tip="${esc(tt)}" ${d.filter?`data-filter="${esc(d.filter)}"`:''}><rect x="${x+1}" y="${y+1}" width="${Math.max(0,w-2)}" height="${Math.max(0,h-2)}" rx="6" fill="${SC(i)}" opacity="0.9"/>${show?`<text x="${x+8}" y="${y+18}" fill="#fff" font-size="11.5" font-weight="700">${esc(String(d.label).slice(0,Math.floor(w/8)))}</text><text x="${x+8}" y="${y+33}" fill="#fff" font-size="11" opacity=".85">${opts.money?fmtMoney(d.v):fmtNum(d.v)}</text>`:''}</g>`;}
  layout(data,0,0,W,H,true);
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet">${out}</svg>`;
}

/* scatter/bubble: pts=[{x,y,r,label,color}] */
function scatter(pts,opts={}){
  const W=opts.w||560,H=opts.h||300,PL=52,PR=16,PT=14,PB=36;
  const xmax=niceMax(Math.max(1,...pts.map(p=>p.x))),ymax=niceMax(Math.max(1,...pts.map(p=>p.y)));
  const rmax=Math.max(1,...pts.map(p=>p.r||1));
  const X=v=>PL+(v/xmax)*(W-PL-PR),Y=v=>H-PB-(v/ymax)*(H-PT-PB);
  let g='';for(let t=0;t<=4;t++){const yy=PT+(H-PT-PB)*t/4;const xx=PL+(W-PL-PR)*t/4;
    g+=`<line class="grid-line" x1="${PL}" y1="${yy}" x2="${W-PR}" y2="${yy}"/><text class="axis-lbl" x="${PL-8}" y="${yy+3}" text-anchor="end">${opts.yfmt?opts.yfmt(ymax*(4-t)/4):fmtNum(ymax*(4-t)/4)}</text>`;
    g+=`<text class="axis-lbl" x="${xx}" y="${H-10}" text-anchor="middle">${opts.xfmt?opts.xfmt(xmax*t/4):fmtNum(xmax*t/4)}</text>`;}
  let dots='';pts.forEach((p,i)=>{const rr=6+18*Math.sqrt((p.r||1)/rmax);
    const tt=`<div class='tt'>${esc(p.label)}</div><div class='tr'><span>${esc(opts.xl||'X')}</span><b>${opts.xfmt?opts.xfmt(p.x):fmtInt(p.x)}</b></div><div class='tr'><span>${esc(opts.yl||'Y')}</span><b>${opts.yfmt?opts.yfmt(p.y):fmtInt(p.y)}</b></div>${p.r?`<div class='tr'><span>${esc(opts.rl||'Size')}</span><b>${opts.rfmt?opts.rfmt(p.r):fmtInt(p.r)}</b></div>`:''}`;
    dots+=`<circle class="clickable" cx="${X(p.x)}" cy="${Y(p.y)}" r="${rr}" fill="${p.color||SC(i)}" opacity=".62" stroke="${p.color||SC(i)}" stroke-width="1.5" data-tip="${esc(tt)}" ${p.filter?`data-filter="${esc(p.filter)}"`:''}/>`;
    if(opts.labels&&rr>10)dots+=`<text x="${X(p.x)}" y="${Y(p.y)+3}" text-anchor="middle" fill="#fff" font-size="9.5" font-weight="700">${esc(String(p.label).slice(0,8))}</text>`;});
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet">${g}${dots}<line class="baseline" x1="${PL}" y1="${H-PB}" x2="${W-PR}" y2="${H-PB}"/><line class="baseline" x1="${PL}" y1="${PT}" x2="${PL}" y2="${H-PB}"/>${opts.xl?`<text class="axis-lbl" x="${(W)/2}" y="${H-1}" text-anchor="middle">${esc(opts.xl)}</text>`:''}</svg>`;
}

function kpiCard(k){
  const arrow=k.delta>0.5?'▲':k.delta<-0.5?'▼':'▬';
  const cls=k.delta>0.5?(k.invert?'down':'up'):k.delta<-0.5?(k.invert?'up':'down'):'flat';
  return `<div class="kpi" style="--kc:${k.color||'var(--accent)'}">
    <div class="lbl">${k.icon?k.icon+' ':''}${esc(k.label)}</div>
    <div class="val tnum">${k.value}</div>
    <div class="foot"><span class="delta ${cls}">${arrow} ${Math.abs(k.delta||0).toFixed(1)}%</span><span style="color:var(--muted)">vs prev</span></div>
  </div>`;
}
function pctDelta(cur,prev){if(!prev)return 0;return (cur-prev)/prev*100;}

function card(title,sub,bodyHtml,opts={}){
  const id='card'+(++CID);
  return `<div class="card ${opts.cls||''}" id="${id}">
    <div class="hd"><div><h3>${opts.icon?opts.icon+' ':''}${esc(title)}</h3>${sub?`<div class="sub">${esc(sub)}</div>`:''}</div>
    <div class="tools">${opts.tools||''}<button class="minibtn" data-full="${id}" title="Full screen">⛶</button></div></div>
    <div class="cbody">${bodyHtml}</div></div>`;
}
function tabToggle(name,cur,vals){return `<div class="seg" data-toggle="${name}">${vals.map(v=>`<button data-val="${v[0]}" class="${cur===v[0]?'on':''}">${v[1]}</button>`).join('')}</div>`;}

/* Data table component */
const TBL={};
function dataTable(id,cols,rows,opts={}){
  TBL[id]={cols,rows,sort:opts.sort||0,dir:opts.dir||'desc',page:0,per:opts.per||12,q:'',all:rows};
  return `<div id="dt-${id}">${renderTable(id)}</div>`;
}
function renderTable(id){
  const t=TBL[id];let rows=t.all;
  if(t.q){const q=t.q.toLowerCase();rows=rows.filter(r=>t.cols.some(c=>String(r[c.k]).toLowerCase().includes(q)));}
  const sc=t.cols[t.sort];
  rows=[...rows].sort((a,b)=>{let av=a[sc.k],bv=b[sc.k];if(typeof av==='number'&&typeof bv==='number')return t.dir==='desc'?bv-av:av-bv;av=String(av);bv=String(bv);return t.dir==='desc'?bv.localeCompare(av):av.localeCompare(bv);});
  t.filtered=rows;
  const pages=Math.max(1,Math.ceil(rows.length/t.per));t.page=clamp(t.page,0,pages-1);
  const view=rows.slice(t.page*t.per,(t.page+1)*t.per);
  const head=t.cols.map((c,i)=>`<th class="${c.num?'num':''}" data-sort="${id}|${i}">${esc(c.label)}${t.sort===i?(t.dir==='desc'?' ↓':' ↑'):''}</th>`).join('');
  const body=view.map(r=>`<tr>${t.cols.map(c=>{let v=r[c.k];let disp=c.fmt?c.fmt(v,r):esc(v);
    let style='';if(c.heat){const mx=Math.max(...rows.map(x=>x[c.k]))||1;const op=(v/mx);style=`background:rgba(57,135,229,${(0.08+op*0.5).toFixed(2)});border-radius:6px`;}
    if(c.tag){disp=`<span class="tag" style="background:${c.tag(v,r).bg};color:${c.tag(v,r).fg}">${esc(c.tag(v,r).t)}</span>`;}
    return `<td class="${c.num?'num':''}" style="${style}">${disp}</td>`;}).join('')}</tr>`).join('')||`<tr><td colspan="${t.cols.length}" class="emptybox">No rows</td></tr>`;
  return `<div class="tblbar">
      <input placeholder="🔍 Search…" value="${esc(t.q)}" oninput="tblSearch('${id}',this.value)">
      <span class="chip">${fmtInt(rows.length)} rows</span>
      <div class="spacer" style="flex:1"></div>
      <button class="minibtn" onclick="tblExport('${id}','csv')">⤓ CSV</button>
      <button class="minibtn" onclick="tblExport('${id}','xls')">⤓ Excel</button>
    </div>
    <div class="tblscroll"><table class="dt"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>
    <div class="pager"><button onclick="tblPage('${id}',-1)" ${t.page===0?'disabled':''}>‹ Prev</button>
      <span>Page ${t.page+1} / ${pages}</span>
      <button onclick="tblPage('${id}',1)" ${t.page>=pages-1?'disabled':''}>Next ›</button></div>`;
}
window.tblSearch=(id,v)=>{TBL[id].q=v;TBL[id].page=0;document.getElementById('dt-'+id).innerHTML=renderTable(id);};
window.tblPage=(id,d)=>{TBL[id].page+=d;document.getElementById('dt-'+id).innerHTML=renderTable(id);};
window.tblSort=(id,i)=>{const t=TBL[id];if(t.sort===i)t.dir=t.dir==='desc'?'asc':'desc';else{t.sort=i;t.dir='desc';}document.getElementById('dt-'+id).innerHTML=renderTable(id);};
window.tblExport=(id,fmt)=>{const t=TBL[id];const rows=t.filtered||t.all;const cols=t.cols;
  const data=[cols.map(c=>c.label)].concat(rows.map(r=>cols.map(c=>{const v=r[c.k];return c.raw?c.raw(v,r):v;})));
  if(fmt==='csv'){const csv=data.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n');dl(new Blob([csv],{type:'text/csv'}),id+'.csv');}
  else{let h='<?xml version="1.0"?><?mso-application progid="Excel.Sheet"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"><Worksheet ss:Name="'+id+'"><Table>';
    data.forEach((r,ri)=>{h+='<Row>'+r.map(c=>{const num=ri>0&&typeof c==='number';return `<Cell><Data ss:Type="${num?'Number':'String'}">${String(c).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}</Data></Cell>`;}).join('')+'</Row>';});
    h+='</Table></Worksheet></Workbook>';dl(new Blob([h],{type:'application/vnd.ms-excel'}),id+'.xls');}};
function dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1500);}

function renderActiveFilters(){
  const f=STATE.filters;const box=document.getElementById('activeFilters');const chips=[];

  chips.push(`<span class="activef">📅 ${presetLabel(f.preset)} · ${from} → ${to}</span>`);

  if(f.eventName)chips.push(`<span class="activef">Event: ${esc(f.eventName)} <button data-clear="eventName">✕</button></span>`);
  if(f.priceMin!=null||f.priceMax!=null)chips.push(`<span class="activef">Price: ${f.priceMin!=null?fmtMoney(f.priceMin):'0'}–${f.priceMax!=null?fmtMoney(f.priceMax):'∞'} <button data-clear="price">✕</button></span>`);

  ];

      ${card('New vs Returning','Share of users',donut([{label:'New',v:k.newUsers},{label:'Returning',v:k.returningUsers}],{centerLbl:'Users',center:fmtInt(k.users)}),{icon:'☺'})}
    </div>
    <div class="grid g2" style="margin-bottom:16px">
      ${card('Weekly Retention Cohort','% of a week\'s new users returning in later weeks',cohortGrid(cohort),{cls:'span2',icon:'▦'})}

function buildCohort(R){
  // group users by their first-week; track return weeks within the filtered window
  const byUser=new Map();
  for(const r of R){const u=r.uid;const first=STATE.userRef[u]?STATE.userRef[u].first:r.date;
    const cohortWeek=bucketKey(first,'week');const actWeek=bucketKey(r.date,'week');
    if(!byUser.has(u))byUser.set(u,{cohort:cohortWeek,weeks:new Set()});byUser.get(u).weeks.add(actWeek);}
  const cohorts=new Map();
  for(const[,v]of byUser){if(!cohorts.has(v.cohort))cohorts.set(v.cohort,[]);cohorts.get(v.cohort).push(v);}
  const sorted=[...cohorts.keys()].sort().slice(-8);
  return sorted.map(cw=>{const members=cohorts.get(cw);const size=members.length;
    const ret=[];for(let w=0;w<8;w++){const wk=bucketKey(addDays(cw,w*7),'week');const c=members.filter(m=>m.weeks.has(wk)).length;ret.push(size?c/size*100:0);}
    return {cohort:cw,size,ret};});
}
function cohortGrid(cohort){
  if(!cohort.length)return `<div class="emptybox">Not enough data for cohorts</div>`;
  const cw=44,ch=30,PL=110,PT=24;const W=PL+8*cw+8,H=PT+cohort.length*ch+8;
  let out='';for(let w=0;w<8;w++)out+=`<text class="axis-lbl" x="${PL+w*cw+cw/2}" y="${PT-8}" text-anchor="middle">W${w}</text>`;
  cohort.forEach((c,ri)=>{const d=new Date(c.cohort);out+=`<text class="axis-lbl" x="4" y="${PT+ri*ch+ch/2+3}">${d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})} · ${c.size}</text>`;
    c.ret.forEach((v,ci)=>{const op=0.1+0.9*(v/100);const tt=`<div class='tt'>Cohort ${d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})} · Week ${ci}</div><div class='tr'><span>Retention</span><b>${fmtPct(v)}</b></div>`;
      out+=`<rect x="${PL+ci*cw+1}" y="${PT+ri*ch+1}" width="${cw-2}" height="${ch-2}" rx="4" fill="${SC(0)}" fill-opacity="${op.toFixed(2)}" data-tip="${esc(tt)}"/><text x="${PL+ci*cw+cw/2}" y="${PT+ri*ch+ch/2+3}" text-anchor="middle" fill="${op>.55?'#fff':'var(--ink2)'}" font-size="9.5" font-weight="600">${v<1&&ci>0?'':Math.round(v)}</text>`;});});
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMinYMin meet">${out}</svg>`;
}
function ltvChart(ltvs){
  if(!ltvs.length)return `<div class="emptybox">No paying customers in view</div>`;
  const bands=[[0,25000,'<₹25K'],[25000,50000,'₹25K–50K'],[50000,100000,'₹50K–1L'],[100000,200000,'₹1L–2L'],[200000,1e9,'₹2L+']];
  const data=bands.map(b=>({label:b[2],v:ltvs.filter(x=>x>=b[0]&&x<b[1]).length}));
  return barChart(data,{h:240,metric:'Customers'});
}

/* ══════════════════════════════════════════════════════════════════
   LIVE DATA (GA4 API) — optional
   ══════════════════════════════════════════════════════════════════ */
/* ── Daily-snapshot model ──────────────────────────────────────────
   No continuous BigQuery querying. The dashboard loads ONE snapshot (built
   server-side at 09:00 IST), caches it in localStorage, and reuses it all day.
   It re-fetches only when the next 09:00 IST boundary passes (a single scheduled
   timer, not polling). Changing the date filter re-slices the loaded snapshot
   client-side — it never triggers a new query. */
const IST_OFFSET_MS = 5.5*3600*1000;
function _istNow(){ return new Date(Date.now()+IST_OFFSET_MS); }   // Date whose UTC fields read as IST wall-clock
function snapshotKey(){                                            // yyyy-mm-dd of the most recent 09:00 IST boundary
  const d=_istNow(); if(d.getUTCHours()<CONFIG.REFRESH_HOUR_IST) d.setUTCDate(d.getUTCDate()-1);
  return d.toISOString().slice(0,10);
}
function msUntilNextRefresh(){
  const d=_istNow(), t=new Date(d); t.setUTCHours(CONFIG.REFRESH_HOUR_IST,0,0,0);
  if(t.getTime()<=d.getTime()) t.setUTCDate(t.getUTCDate()+1);
  return (t.getTime()-d.getTime())+15000;                         // +15s cushion past the boundary
}
function snapshotUrl(){
  if(CONFIG.SNAPSHOT_URL) return CONFIG.SNAPSHOT_URL;             // prebuilt static daily JSON
  if(CONFIG.API_BASE){ const b=CONFIG.API_BASE.replace(/\/(data|ga4-data)\/?$/i,'').replace(/\/$/,'');
    return b+'/data?days='+(CONFIG.SNAPSHOT_DAYS||400); }         // one wide-window pull/day
  return '';
}
async function loadSnapshot(force){
  const url=snapshotUrl(), key=snapshotKey();
  if(!url){ setLiveChip(false,'Sample data · configure daily snapshot to go live'); return false; }
  if(!force){                                                     // reuse today's cached snapshot — no network
    try{ const c=JSON.parse(localStorage.getItem('ga4_snapshot')||'null');
      if(c&&c.key===key&&c.payload){ ingestLive(c.payload); STATE.source='snapshot';
        setLiveChip(true,'Snapshot · '+((c.payload.window||{}).to||key)+' · 09:00 IST'); return true; } }catch(e){}
  }
  try{
    const res=await fetch(url+(url.includes('?')?'&':'?')+'d='+key);   // per-day cache-bust
    const j=await res.json();
    if(j.error)throw new Error(j.detail||j.error);
    ingestLive(j); STATE.source='snapshot';
    try{ localStorage.setItem('ga4_snapshot',JSON.stringify({key,at:Date.now(),payload:j})); }catch(e){}
    setLiveChip(true,'Snapshot · '+((j.window||{}).to||key)+' · 09:00 IST');
    return true;
  }catch(e){
    setLiveChip(false,'Sample data (snapshot unavailable)');
    console.warn('GA4 snapshot load failed, using sample:',e.message);
    return false;
  }
}
function scheduleDailyRefresh(){
  clearTimeout(window._ga4RefreshT);
  window._ga4RefreshT=setTimeout(async()=>{ const ok=await loadSnapshot(true); if(ok)render(); scheduleDailyRefresh(); },
    msUntilNextRefresh());
}
/* The live API returns pre-aggregated arrays. GA4 (unlike raw BigQuery export)
   cannot hand us joined session-level rows, so we synthesise a session fact
   table whose *marginal* distributions match each returned breakdown. Result:
   totals, daily trends and every single-dimension chart/table are accurate;
   multi-dimension cross-filters are modelled (independent draw per dimension).
   For fully-joined live data, back this with the GA4→BigQuery export.
   Any dimension the API doesn't return simply stays "(not set)". */
function ingestLive(j){
  CONFIG.TODAY=j.window?j.window.to:CONFIG.TODAY;
  const rows=[];let id=0,uid=0;
  const daily=j.daily||[];
  const rng=mulberry32(7);
  const shares=arr=>(arr||[]).filter(x=>x&&x.sessions>0).map(x=>({name:x.name,w:x.sessions,rev:x.revenue||0}));
  const S={
    channel:shares(j.channels), sourceMedium:shares(j.sourceMedium), source:shares(j.sources),
    medium:shares(j.mediums), campaign:shares(j.campaigns), landingPage:shares(j.landingPages),
    device:shares(j.devices), browser:shares(j.browsers), os:shares(j.operatingSystems),
    screenRes:shares(j.screenResolutions), platform:shares(j.platforms), country:shares(j.countries),
    region:shares(j.regions), city:shares(j.cities), language:shares(j.languages),
    contentGroup:shares(j.contentGroups), hostname:shares(j.hostnames), nr:shares(j.newReturning),
  };
  const draw=k=>S[k]&&S[k].length?wpick(rng,S[k]).name:'(not set)';
  const evAll=(j.events||[]);
  for(const d of daily){
    const n=Math.round(d.sessions);
    const engN=Math.round(d.engagedSessions|| d.sessions*(d.engagementRate?d.engagementRate/100:0.6));
    const newN=Math.round(d.newUsers||0);
    const purN=Math.round(d.purchases||0);
    for(let i=0;i<n;i++){
      const isPur=i<purN;
      const rev=isPur&&purN?d.revenue/purN:0;
      const isNew=i<newN;
      rows.push({id:id++,date:d.date,uid:uid++,isNew,
        channel:draw('channel'),source:draw('source'),medium:draw('medium'),sourceMedium:draw('sourceMedium'),
        campaign:draw('campaign'),device:draw('device'),browser:draw('browser'),os:draw('os'),
        screenRes:draw('screenRes'),platform:draw('platform'),country:draw('country'),region:draw('region'),
        city:draw('city'),language:draw('language'),landingPage:draw('landingPage'),
        pageTitle:draw('landingPage'),pagePath:draw('landingPage'),contentGroup:draw('contentGroup'),hostname:draw('hostname'),
        engaged:i<engN?1:0,engTime:60,pv:Math.round((d.pageViews||d.sessions)/Math.max(1,n)),
        ev:{page_view:1,purchase:isPur?1:0},evCount:Math.max(1,Math.round((d.eventCount||d.sessions)/Math.max(1,n))),
        keyEvents:Math.round((d.keyEvents||0)/Math.max(1,n)),converted:isPur?1:0,
        viewItem:isPur?1:0,cart:0,checkout:0,payment:0,purchased:isPur?1:0,items:isPur?1:0,revenue:rev,aov:rev,
        category:'(not set)',brand:'(not set)',product:'(not set)',coupon:'NONE',promo:'(none)',refund:0,refAmt:0,
        userType:isNew?'Prospect':'Customer',nr:S.nr.length?draw('nr'):(isNew?'New':'Returning')});
    }
  }
  STATE.rows=rows;STATE.userRef={};
  const dates=daily.map(d=>d.date);
  STATE.meta={from:dates[0],to:dates[dates.length-1],generated:j.generated_at};
  STATE._liveEvents=evAll; STATE._liveItems=(j.items||[]); STATE._liveFunnel=(j.funnel||[]);
}

/* ══════════════════════════════════════════════════════════════════
   ASK-AI ASSISTANT
   Local rule-based Q&A grounded on the CURRENTLY FILTERED data (works on
   the static page with no backend). When CONFIG.API_BASE points at the
   ga4-bq-api Cloud Run backend, questions are sent to its Gemini-backed
   /ai endpoint for generative answers, falling back to local on any error.
   ══════════════════════════════════════════════════════════════════ */
function _aiEsc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function _aiTotals(R){let rev=0,pur=0;const u=new Set(),b=new Set();
  R.forEach(r=>{rev+=(+r.revenue||0);pur+=(+r.purchased||0);u.add(r.uid);if(r.purchased)b.add(r.uid);});
  const s=R.length;return{sessions:s,users:u.size,buyers:b.size,revenue:rev,orders:pur,
    aov:pur?rev/pur:0,conv:s?pur/s*100:0,rpu:u.size?rev/u.size:0};}
function _aiTop(R,keyFn,metric){try{const g=groupBy(R,keyFn);g.sort(byDesc(metric));return g;}catch(e){return[];}}
function _aiRow(label,val){return `<div class="ai-row"><span>${_aiEsc(label)}</span><b>${val}</b></div>`;}
function localAnswer(q){
  const R=(typeof filtered==='function')?filtered():(STATE.rows||[]);
  if(!R.length)return 'No data in the current filter selection.';
  const q0=q.toLowerCase(), t=_aiTotals(R);
  const pct=n=>(n||0).toFixed(1)+'%';
  const scope='<div class="ai-scope">Scope: current filters · '+fmtInt(t.sessions)+' sessions</div>';
  const wrap=(h)=>scope+h;
  const wants=(...w)=>w.some(x=>q0.includes(x));
  // recommendations / actions
  if(wants('recommend','action','do today','suggest','grow','opportunit','priorit')){
    const ch=_aiTop(R,r=>r.channel,'revenue')[0];
    const cities=_aiTop(R,r=>r.city,'sessions').filter(c=>c.sessions>=Math.max(20,t.sessions*0.02));
    const worstCity=cities.slice().sort((a,b)=>(a.purchases/a.sessions)-(b.purchases/b.sessions))[0];
    const prod=_aiTop(R,r=>r.product,'views').filter(p=>p.name&&p.name!=='(not set)');
    const hiViewLoConv=prod.slice(0,15).sort((a,b)=>(a.purchases/(a.views||1))-(b.purchases/(b.views||1)))[0];
    let h='<b>Priority actions (from current data):</b><ol class="ai-list">';
    if(ch)h+=`<li><b>Scale ${_aiEsc(ch.name)}</b> — top channel at ${fmtMoney(ch.revenue)} (${pct(ch.revenue/(t.revenue||1)*100)} of revenue). Shift budget toward it.</li>`;
    if(worstCity)h+=`<li><b>Fix conversion in ${_aiEsc(worstCity.name)}</b> — ${pct(worstCity.purchases/worstCity.sessions*100)} vs ${pct(t.conv)} overall on ${fmtInt(worstCity.sessions)} sessions.</li>`;
    if(hiViewLoConv)h+=`<li><b>Promote / improve “${_aiEsc(hiViewLoConv.name)}”</b> — high views (${fmtInt(hiViewLoConv.views)}) but weak purchase rate. Better images/price/reviews.</li>`;
    h+=`<li><b>Recover carts</b> — overall session→purchase is ${pct(t.conv)}; a checkout/WhatsApp recovery flow lifts it fastest.</li>`;
    h+='</ol>';return wrap(h);
  }
  if(wants('funnel','checkout','cart','drop')){
    return wrap(`Overall session→purchase conversion is <b>${pct(t.conv)}</b> (${fmtInt(t.orders)} orders / ${fmtInt(t.sessions)} sessions). Open the E-commerce tab for the full view→cart→checkout→purchase drop-off.`);
  }
  if(wants('revenue','sales','gmv','turnover')){
    let h=_aiRow('Revenue',fmtMoneyFull(t.revenue))+_aiRow('Orders',fmtInt(t.orders))+_aiRow('AOV',fmtMoneyFull(t.aov))+_aiRow('Revenue / user',fmtMoneyFull(t.rpu));
    const ch=_aiTop(R,r=>r.channel,'revenue').slice(0,3).map(c=>`${_aiEsc(c.name)} (${fmtMoney(c.revenue)})`).join(', ');
    return wrap(h+`<div class="ai-note">Top revenue channels: ${ch}.</div>`);
  }
  if(wants('convert','conversion','cvr','purchaser')){
    return wrap(_aiRow('Conversion rate',pct(t.conv))+_aiRow('Buyers',fmtInt(t.buyers))+_aiRow('Purchaser rate',pct(t.users?t.buyers/t.users*100:0)));
  }
  if(wants('channel','traffic source','acquisition')){
    const g=_aiTop(R,r=>r.channel,'revenue').slice(0,6);
    return wrap('<b>Channels by revenue</b>'+g.map(c=>_aiRow(c.name,fmtMoney(c.revenue)+' · '+fmtInt(c.sessions)+' sess')).join(''));
  }
  if(wants('campaign')){
    const g=_aiTop(R,r=>r.campaign,'revenue').filter(c=>c.name&&c.name!=='(not set)'&&c.name!=='(organic)');
    if(!g.length)return wrap('No named campaigns in the current selection.');
    let h='<b>Best campaign:</b> '+_aiEsc(g[0].name)+' — '+fmtMoney(g[0].revenue)+'<br><b>Weakest (by conv):</b> ';
    const w=g.filter(c=>c.sessions>=20).slice().sort((a,b)=>(a.purchases/a.sessions)-(b.purchases/b.sessions))[0];
    h+=w?(_aiEsc(w.name)+' — '+pct(w.purchases/w.sessions*100)):'n/a';
    return wrap(h);
  }
  if(wants('city','cities')){
    const g=_aiTop(R,r=>r.city, wants('conver','lowest','worst')?'sessions':'revenue');
    if(wants('lowest','worst','weak')){
      const w=g.filter(c=>c.sessions>=Math.max(20,t.sessions*0.02)).sort((a,b)=>(a.purchases/a.sessions)-(b.purchases/b.sessions)).slice(0,5);
      return wrap('<b>Lowest-conversion cities</b>'+w.map(c=>_aiRow(c.name,pct(c.purchases/c.sessions*100)+' · '+fmtInt(c.sessions)+' sess')).join(''));
    }
    return wrap('<b>Top cities by revenue</b>'+g.slice(0,6).map(c=>_aiRow(c.name,fmtMoney(c.revenue))).join(''));
  }
  if(wants('country','countries','geo')){
    const g=_aiTop(R,r=>r.country,'revenue').slice(0,6);
    return wrap('<b>Countries by revenue</b>'+g.map(c=>_aiRow(c.name,fmtMoney(c.revenue))).join(''));
  }
  if(wants('device','mobile','desktop')){
    const g=_aiTop(R,r=>r.device,'sessions').slice(0,5);
    return wrap('<b>Devices</b>'+g.map(c=>_aiRow(c.name,fmtInt(c.sessions)+' sess · '+fmtMoney(c.revenue))).join(''));
  }
  if(wants('source')){
    const g=_aiTop(R,r=>r.source,'sessions').slice(0,6);
    return wrap('<b>Top sources</b>'+g.map(c=>_aiRow(c.name,fmtInt(c.sessions)+' sess')).join(''));
  }
  if(wants('product','sku','item','best sell','top sell')){
    const g=_aiTop(R,r=>r.product,'revenue').filter(p=>p.name&&p.name!=='(not set)').slice(0,6);
    return wrap('<b>Top products by revenue</b>'+g.map(c=>_aiRow(c.name,fmtMoney(c.revenue))).join(''));
  }
  if(wants('new','returning','repeat','loyal')){
    let nw=0;R.forEach(r=>{if(r.newUser||r.userType==='new')nw++;});
    return wrap(_aiRow('Sessions',fmtInt(t.sessions))+_aiRow('Unique users',fmtInt(t.users))+_aiRow('Buyers',fmtInt(t.buyers))+'<div class="ai-note">Use the Users tab for the full new-vs-returning cohort + LTV view.</div>');
  }
  // default summary
  const ch=_aiTop(R,r=>r.channel,'revenue')[0], city=_aiTop(R,r=>r.city,'revenue')[0];
  return wrap(_aiRow('Revenue',fmtMoneyFull(t.revenue))+_aiRow('Orders',fmtInt(t.orders))+_aiRow('Conversion',pct(t.conv))+_aiRow('AOV',fmtMoneyFull(t.aov))
    +`<div class="ai-note">Top channel: ${ch?_aiEsc(ch.name):'—'} · Top city: ${city?_aiEsc(city.name):'—'}. Ask about revenue, channels, campaigns, cities, products, conversion, or “top actions”.</div>`);
}
/* ── Generative AI (Google Gemini), browser-direct ─────────────────
   Advanced Q&A without a backend: the user pastes their own Gemini API key
   (stored only in their browser's localStorage) and the assistant calls the
   Gemini API directly, grounded on a compact snapshot of the CURRENT filtered
   data. Falls back to the backend /ai, then to the local rule-based answer. */
function _gemGet(k,def){try{return localStorage.getItem(k)||def;}catch(e){return def;}}
function _aiCtx(){
  const R=(typeof filtered==='function')?filtered():(STATE.rows||[]);
  const t=_aiTotals(R);
  let vi=0,atc=0,chk=0,pay=0;
  R.forEach(r=>{if(r.ev){vi+=r.ev.view_item||0;atc+=r.ev.add_to_cart||0;chk+=r.ev.begin_checkout||0;pay+=r.ev.add_payment_info||0;}});
  const top=(fn,n)=>_aiTop(R,fn,'revenue').slice(0,n).map(g=>({name:g.name,sessions:g.sessions,orders:g.purchases,revenue:Math.round(g.revenue||0)}));
  const [from,to]=activeRange();
  let daily=[];
  try{daily=timeSeries(R,'day').slice(-30).map(d=>({d:d.label,sessions:d.sessions,revenue:Math.round(d.revenue||0)}));}catch(e){}
  return {brand:'Lucira Jewelry (India D2C fine jewellery)',currency:CONFIG.CURRENCY,dateRange:[from,to],
    totals:{sessions:t.sessions,users:t.users,buyers:t.buyers,orders:t.orders,revenue:Math.round(t.revenue),
      aov:Math.round(t.aov),conversionRatePct:+t.conv.toFixed(2),revenuePerUser:Math.round(t.rpu)},
    funnel:{view_item:vi,add_to_cart:atc,begin_checkout:chk,add_payment_info:pay,purchase:t.orders},
    topChannels:top(r=>r.channel,8),topCampaigns:top(r=>r.campaign,8),topCities:top(r=>r.city,10),
    topDevices:top(r=>r.device,5),topProducts:top(r=>r.product,10),dailyTrend:daily};
}
function _mdLite(s){let h=_aiEsc(s);
  h=h.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>').replace(/\*([^*]+)\*/g,'<i>$1</i>')
     .replace(/^\s*#{1,6}\s*(.*)$/gm,'<b>$1</b>').replace(/^\s*[-*]\s+/gm,'• ');
  return h.replace(/\n/g,'<br>');}
async function _callGemini(key,model,system,user){
  const url='https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+encodeURIComponent(key);
  const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({system_instruction:{parts:[{text:system}]},contents:[{role:'user',parts:[{text:user}]}],
      generationConfig:{temperature:0.4,maxOutputTokens:1200}})});
  if(!res.ok){let d='';try{d=(await res.json()).error.message;}catch(e){}throw new Error('Gemini '+res.status+(d?': '+d:''));}
  const j=await res.json();
  const cand=(j.candidates||[])[0]||{};const parts=((cand.content||{}).parts)||[];
  const txt=parts.map(p=>p.text||'').join('').trim();
  if(!txt)throw new Error('empty response'+(cand.finishReason?' ('+cand.finishReason+')':''));
  return txt;
}
const AI_SYSTEM='You are the analytics co-pilot for Lucira Jewelry, an Indian D2C fine-jewellery brand. '+
  'Answer ONLY from the JSON data provided (all revenue is in the given currency). Be concrete and cite the numbers. '+
  'For "actions"/"grow"/"what to do" questions, give prioritized, quantified recommendations — each with expected impact, '+
  'a rough revenue effect, and who should own it. For audience/targeting questions, name the specific channels, cities, '+
  'devices and products from the data. Never invent data you were not given. Keep it tight and skimmable.';
async function askAI(q){
  const key=_gemGet('ga4_gemini_key',''), model=_gemGet('ga4_gemini_model','gemini-2.0-flash');
  if(key){
    try{
      const txt=await _callGemini(key,model,AI_SYSTEM,'DATA (JSON):\n'+JSON.stringify(_aiCtx())+'\n\nQUESTION: '+q);
      return{html:_mdLite(txt),src:'Gemini · '+model};
    }catch(e){
      if(!CONFIG.API_BASE)return{html:'<div class="ai-note">⚠ '+_aiEsc(e.message)+' — showing the built-in answer instead.</div>'+localAnswer(q),src:'local (Gemini error)'};
    }
  }
  if(CONFIG.API_BASE){
    try{
      const base=CONFIG.API_BASE.replace(/\/(data|ga4-data)\/?$/i,'').replace(/\/$/,'');
      const res=await fetch(base+'/ai',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({question:q,days:90})});
      if(res.ok){const j=await res.json();if(j&&j.answer)return{html:_mdLite(j.answer),src:'Gemini AI'};}
    }catch(e){}
  }
  return{html:localAnswer(q),src:'local'};
}

  const p=document.createElement('div');p.id='askPanel';
  p.innerHTML=`<div class="hd">✨ Ask AI <small id="askMode"></small><button id="askCfg" title="AI settings (Gemini key)">⚙</button></div>
    <div id="askCfgRow" style="display:none">
      <div style="opacity:.75">Paste your Google <b>Gemini API key</b> for advanced generative answers. It is stored <b>only in this browser</b> and sent directly to Google.</div>
      <input id="askKey" type="password" placeholder="Gemini API key (AIza…)" autocomplete="off">
