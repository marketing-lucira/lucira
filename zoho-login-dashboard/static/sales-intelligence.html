  const mvDonut=donut(Object.keys(movementCount).map((k,i)=>({label:k,value:movementCount[k],color:['#12b886','#4d96ff','#f2b13a','#ef5350'][i]})),{center:fmtInt(mv.length),centerSub:'STYLES',fmt:fmtInt});
  // ABC
  const sorted=rank(withNet,'net'); const tot=sum(sorted,s=>s.net)||1; let cum=0; const abc={A:0,B:0,C:0},abcNet={A:0,B:0,C:0};
  sorted.forEach(s=>{ cum+=s.net; const p=cum/tot; const cls=p<=0.8?'A':p<=0.95?'B':'C'; s.abc=cls; abc[cls]++; abcNet[cls]+=s.net; });
  const abcTable=`<table class="dt"><thead><tr><th>Class</th><th class="num">Styles</th><th class="num">Revenue</th><th class="num">Rev Share</th><th class="num">Style Share</th></tr></thead><tbody>`+
    ['A','B','C'].map(c=>`<tr><td><span class="pill ${c==='A'?'ok':c==='B'?'warn':'bad'}">Class ${c}</span></td><td class="num">${fmtInt(abc[c])}</td><td class="num">${money(abcNet[c])}</td><td class="num">${pctStr(abcNet[c]/tot*100)}</td><td class="num">${pctStr(abc[c]/sorted.length*100)}</td></tr>`).join('')+`</tbody></table>`;
  // dimensional performance
  const dimCard=(title,arr,click)=>card(title,hbars(rank(arr,'net').slice(0,7).map(x=>({label:x.key,value:x.net,key:x.key,color:click==='metal'?metalColor(x.key):undefined})),{click}),{});
  // cross-sell (category co-occurrence within a document)
  const docCats=new Map(); STATE.items.forEach(i=>{ if(!docCats.has(i.document_no))docCats.set(i.document_no,new Set()); docCats.get(i.document_no).add(i.category); });
  const pair=new Map(); docCats.forEach(set=>{ const a=[...set]; for(let i=0;i<a.length;i++)for(let j=i+1;j<a.length;j++){ const k=[a[i],a[j]].sort().join(' + '); pair.set(k,(pair.get(k)||0)+1); } });
  const fbt=rank([...pair.entries()].map(([k,v])=>({key:k,value:v})),'value').slice(0,7);
  const fbtCard=card('Frequently Bought Together',fbt.length?hbars(fbt.map(f=>({label:f.key,value:f.value})),{fmt:fmtInt}):`<div class="empty">Mostly single-category baskets</div>`,{hint:'category pairs per invoice'});
  const topTable=(title,data)=>card(title,`<table class="dt"><thead><tr><th>Style</th><th>Category</th><th class="num">Revenue</th><th class="num">Units</th><th>Movement</th></tr></thead><tbody>`+
    data.map(s=>`<tr><td>${esc(s.style)}</td><td>${esc(s.category)}</td><td class="num">${money(s.net)}</td><td class="num">${fmtInt(s.units)}</td><td><span class="pill ${s.cls==='Fast'?'ok':s.cls==='Dead'?'bad':s.cls==='Slow'?'warn':''}">${s.cls}</span></td></tr>`).join('')+`</tbody></table>`,{});
  // ── ALL-STYLES fulfillment ledger + type rollup (respects active filters + date range) ──
  const stMap=new Map(); const typesSeen=new Set();
  const stype=i=>CONFIG.SALE_TYPES.includes(i.sale_type)?i.sale_type:'Other';
  STATE.items.forEach(i=>{ const key=i.half_sku||i.style||'—'; let g=stMap.get(key);
    if(!g){ g={half_sku:key,category:i.category,net:0,tOrd:{},store:new Set(),online:new Set()}; stMap.set(key,g); }
    g.net+=i.net;                                    // kept for sorting only (not shown)
    const t=stype(i); (g.tOrd[t]||(g.tOrd[t]=new Set())).add(i.document_no); typesSeen.add(t);
    (i.channel==='Online'?g.online:g.store).add(i.document_no); });
  const styleRows=[...stMap.values()].map(g=>{ const o={half_sku:g.half_sku,category:g.category,net:g.net,store:g.store.size,online:g.online.size};
    Object.keys(g.tOrd).forEach(t=>o['c_'+t]=g.tOrd[t].size); return o; }).sort((a,b)=>b.net-a.net);
  const fTypes=CONFIG.SALE_TYPES.filter(t=>typesSeen.has(t));
  const cCell=v=>v?fmtInt(v):'<span style="color:var(--muted)">—</span>';
  const styleLedger=card('All Half-SKUs — Orders by Fulfillment & Channel',
    `<div class="scroll-x" style="max-height:460px;overflow-y:auto"><table class="dt"><thead><tr><th>Half SKU</th><th>Category</th>`+
     fTypes.map(t=>`<th class="num" style="color:${saleColor(t)}">${esc(t)}</th>`).join('')+`<th class="num">Store</th><th class="num">Online</th></tr></thead><tbody>`+
     styleRows.map(s=>`<tr><td>${esc(s.half_sku)}</td><td>${esc(s.category||'—')}</td>`+
       fTypes.map(t=>`<td class="num">${cCell(s['c_'+t])}</td>`).join('')+`<td class="num">${cCell(s.store)}</td><td class="num">${cCell(s.online)}</td></tr>`).join('')+
     `</tbody></table></div>`,{hint:fmtInt(styleRows.length)+' half-SKUs · order counts by fulfillment type & channel'});
  const ful=fTypes.map(t=>{ const its=STATE.items.filter(i=>stype(i)===t);
    return {t,styles:new Set(its.map(i=>i.half_sku)).size,orders:distinct(its,i=>i.document_no),
      store:distinct(its.filter(i=>i.channel!=='Online'),i=>i.document_no),
      online:distinct(its.filter(i=>i.channel==='Online'),i=>i.document_no)}; });
  const fulTot=sum(ful,r=>r.orders)||1;
  const fulTable=card('Fulfillment Type Summary',
    `<table class="dt"><thead><tr><th>Type</th><th class="num">Half SKUs</th><th class="num">Orders</th><th class="num">Store</th><th class="num">Online</th><th class="num">Share</th></tr></thead><tbody>`+
     rank(ful,'orders').map(r=>`<tr><td><span class="pill" style="background:${saleColor(r.t)}22;color:${saleColor(r.t)}">${esc(r.t)}</span></td><td class="num">${fmtInt(r.styles)}</td><td class="num"><b>${fmtInt(r.orders)}</b></td><td class="num">${fmtInt(r.store)}</td><td class="num">${fmtInt(r.online)}</td><td class="num">${pctStr(r.orders/fulTot*100)}</td></tr>`).join('')+
     `<tr style="border-top:2px solid var(--hair);font-weight:700"><td>Total</td><td class="num">${fmtInt(styleRows.length)}</td><td class="num">${fmtInt(sum(ful,r=>r.orders))}</td><td class="num">${fmtInt(sum(ful,r=>r.store))}</td><td class="num">${fmtInt(sum(ful,r=>r.online))}</td><td class="num">100%</td></tr>`+
     `</tbody></table>`,{hint:'order counts by fulfillment type & channel · current selection'});
  const deadNote=STATE.caps.inventory?'':`<div class="banner">ⓘ Movement is velocity-based (units sold & days since last sale). True dead-stock / overstock / sell-through activate when the reporting layer joins an inventory stock column.</div>`;
  return secHead('Merchandising','Product Intelligence','Top & bottom sellers, movement, ABC/Pareto, collection & cross-sell')+
    deadNote+
    `<div class="grid g-2" style="margin-bottom:16px">${card('Movement Mix',mvDonut,{hint:'fast/steady/slow/dead'})}${card('ABC / Pareto Analysis',abcTable,{hint:'80/15/5 revenue rule'})}</div>`+
    `<div class="grid g-2" style="margin-bottom:16px">${topTable('Top 10 Styles',top)}${topTable('Bottom 10 Styles',bottom)}</div>`+
    `<div style="margin-bottom:16px">${styleLedger}</div>`+
    `<div style="margin-bottom:16px">${fulTable}</div>`+
    `<div class="grid g-3" style="margin-bottom:16px">${dimCard('Category Performance',STATE.byCat,'category')}${dimCard('Collection Performance',STATE.byColl,'collection')}${dimCard('Metal Performance',groupAgg(STATE.items,i=>i.metal),'metal')}</div>`+
    `<div class="grid g-2">${dimCard('Price-Band Performance',groupAgg(STATE.items,i=>i.price_band),'band')}${fbtCard}</div>`;
};

      `<div class="card"><div class="pad" style="text-align:center;padding:50px 20px">

function teamBody(people){
  if(!people.length) return '';
  const cr=STATE.custRef;
  const rows=people.map(p=>{ const pi=STATE.items.filter(i=>i.salesperson===p);
    const net=sum(pi,i=>i.net); const orders=distinct(pi,i=>i.document_no); const custIds=new Set(pi.map(i=>i.customer_id));
    let repeat=0; custIds.forEach(id=>{ const r=cr.get(id); if(r&&r.lifetime_orders>1)repeat++; });
    const pg=groupAgg(pi,i=>i.sale_type); const sv=t=>{const x=pg.find(y=>y.key===t);return x?x.net:0;};
    const ret=pi.filter(i=>i.sale_type==='Return').length;
    return {p,net,orders,customers:custIds.size,repPct:custIds.size?repeat/custIds.size*100:0,aov:orders?net/orders:0,
      mto:net?sv('MTO')/net*100:0,retPct:orders?ret/orders*100:0}; }).sort((a,b)=>b.net-a.net);
  const mx=Math.max(1,...rows.map(r=>r.net));
  rows.forEach(r=>r.score=Math.round(clamp((r.net/mx)*50+clamp(r.repPct,0,60)/60*30+(100-clamp(r.retPct*6,0,100))/100*20,0,100)));
  const board=`<div class="grid g-3" style="margin-bottom:16px">`+rows.slice(0,3).map((r,i)=>
    `<div class="card"><div class="pad"><div style="display:flex;justify-content:space-between;align-items:center"><span class="rank r${i+1}" style="width:34px;height:34px;font-size:15px">${i+1}</span><span class="pill g">Score ${r.score}</span></div>
    <h3 style="margin:12px 0 2px;font-size:18px">${esc(r.p)}</h3><div style="font-family:var(--serif);font-size:24px;color:var(--gold)">${money(r.net)}</div>
    <div style="font-size:11.5px;color:var(--ink-2);margin-top:6px">${fmtInt(r.orders)} orders · ${money(r.aov)} AOV · ${pctStr(r.repPct)} repeat</div></div></div>`).join('')+`</div>`;
  const tbl=card('Sales Executive Leaderboard',`<div class="scroll-x"><table class="dt"><thead><tr><th>#</th><th>Executive</th><th class="num">Revenue</th><th class="num">Orders</th><th class="num">Customers</th><th class="num">AOV</th><th class="num">Repeat %</th><th class="num">MTO %</th><th class="num">Return %</th><th class="num">Score</th></tr></thead><tbody>`+
    rows.map((r,i)=>`<tr><td><span class="rank ${i<3?'r'+(i+1):''}">${i+1}</span></td><td>${esc(r.p)}</td><td class="num">${money(r.net)}</td><td class="num">${fmtInt(r.orders)}</td><td class="num">${fmtInt(r.customers)}</td><td class="num">${money(r.aov)}</td><td class="num">${pctStr(r.repPct)}</td><td class="num">${pctStr(r.mto)}</td><td class="num">${pctStr(r.retPct)}</td><td class="num"><b>${r.score}</b></td></tr>`).join('')+`</tbody></table></div>`,{});
  const coach=rows.filter(r=>r.score<55).slice(0,3);
  const coachCard=coach.length?card('✦ Coaching Flags',coach.map(r=>`<div class="alert warn"><div class="ic">◎</div><div><h4>${esc(r.p)}</h4><p>Score ${r.score}/100 — ${r.repPct<20?'low repeat rate, focus on relationship selling':r.retPct>6?'elevated returns, review expectation-setting':'below-peer revenue, pair with a top performer'}.</p></div></div>`).join(''),{}):'';
  return board+tbl+ (coach.length?`<div style="margin-top:16px">${coachCard}</div>`:'');
}
/* ═══════════════════════════════════════════════════════════════════════
   AI · local grounded answer engine  (knowledge-base flavoured)
   ═══════════════════════════════════════════════════════════════════════ */
function localAnswer(q){
  q=(q||'').toLowerCase(); const M=STATE.M,PM=STATE.PM; const g=growth(M.revenue,PM.revenue);
  const movers=topMovers(); const stores=storeStats(); const mv=styleMovement();
  const wrap=(t)=>`<div>${t}</div>`;
  const cl=COMPARE_LABEL[STATE.compare].toLowerCase();
  if(/(down|drop|declin|why.*sales|fall)/.test(q)&&/(sale|revenue)/.test(q)){
    const dn=[...movers].reverse().filter(m=>m.g<0)[0]; const ws=stores.filter(s=>s.g<0)[0];
    return wrap(`Net revenue is <b class="k">${money(M.revenue)}</b>, ${g>=0?'up':'down'} <b class="k">${pctStr(Math.abs(g))}</b> vs ${cl}. ${dn?`The biggest drag is <b class="k">${esc(dn.key)}</b> (${dn.g.toFixed(0)}%).`:''} ${ws?`<b class="k">${esc(ws.key)}</b> is the softest store (${ws.g.toFixed(0)}%).`:''} Discount is ${pctStr(M.discountPct)} of gross and returns ${pctStr(M.returnPct)} — both worth checking as margin/volume leaks.`);
  }
  if(/(up|increase|grew|why.*revenue|spike)/.test(q)&&/(sale|revenue|up)/.test(q)){
    const up=movers.filter(m=>m.g>0)[0];
    return wrap(`Revenue moved ${g>=0?'up':'down'} <b class="k">${pctStr(Math.abs(g))}</b> vs ${cl}. ${up?`<b class="k">${esc(up.key)}</b> led the gain (+${up.g.toFixed(0)}%).`:''} AOV is ${money(M.aov)} and ${fmtInt(M.newCustomers)} new customers were acquired — a mix of basket size and acquisition.`);
  }
  if(/store.*(attention|help|worst|focus|drop)/.test(q)||/which store/.test(q)){
    const w=stores.filter(s=>s.score<60).slice(0,3);
    return wrap(`Stores needing attention (lowest performance score): ${w.length?w.map(s=>`<b class="k">${esc(s.key)}</b> (${s.score}/100, ${s.g>=0?'+':''}${s.g.toFixed(0)}%)`).join(', '):'none — all above 60/100'}. Best performer: <b class="k">${esc(stores[0].key)}</b> (${stores[0].score}/100).`);
  }
  if(/promot|which product.*(sell|push)|best product/.test(q)){
    const fast=rank(mv.filter(s=>s.cls==='Fast'&&s.net>0),'net').slice(0,3);
    return wrap(`Promote your fast-movers with healthy revenue: ${fast.map(s=>`<b class="k">${esc(s.style)}</b> (${esc(s.category)}, ${money(s.net)})`).join(', ')}. Category momentum favours <b class="k">${esc(movers[0].key)}</b>.`);
  }
  if(/discontinu|dead|slow.*product|stop selling/.test(q)){
    const dead=rank(mv.filter(s=>s.cls==='Dead'),'recency',1).slice(0,4);
    return wrap(`Candidates to discontinue / clear (no sale in ${CONFIG.MOVEMENT.deadDays}+ days): ${dead.length?dead.map(s=>`<b class="k">${esc(s.style)}</b> (${s.recency}d, ${esc(s.category)})`).join(', '):'none flagged dead in this window'}. Bundle or mark down before capital ages further.`);
  }
  if(/(which )?customer.*(contact|call|reach|risk)/.test(q)||/win.?back/.test(q)){
    const risk=rank([...STATE.custStats.values()].filter(c=>c.seg==='At Risk'||c.seg==='VIP'),'monetary').slice(0,4);
    return wrap(`Prioritise these high-value / at-risk customers for a concierge call: ${risk.map(c=>`<b class="k">${esc(c.name)}</b> (${c.seg}, ${money(c.monetary)}, ${c.recency}d)`).join(', ')}.`);
  }
  if(/salesperson|executive.*coach|team.*coach/.test(q)){
    if(!STATE.caps.salesperson&&STATE.source!=='sample') return wrap(`Salesperson data isn't in Sales_overview_table, so per-executive coaching can't be computed live. Add a sales-executive column to the reporting layer to unlock it.`);
    return wrap(`See the <b class="k">Sales Team</b> tab — executives below a 55 performance score are flagged for coaching, with the specific gap (repeat rate, returns or revenue) called out.`);
  }
  if(/increase|grow.*(sale|revenue|next month)|how.*more/.test(q)){
    return wrap(`Three highest-leverage moves right now: (1) lift repeat rate from <b class="k">${pctStr(M.repeatPct)}</b> with 30/90-day re-engagement, (2) push <b class="k">${esc(movers[0].key)}</b> where momentum is strongest, (3) protect margin by trimming discount from <b class="k">${pctStr(M.discountPct)}</b>. Combined upside modelled at ~${money(M.revenue*0.08)}.`);
  }
  if(/inventory|stock|which store.*inventory/.test(q)){
    return wrap(`On velocity, route fast-movers toward the highest-demand city (<b class="k">${esc(STATE.byCity[0]?.key||'—')}</b>) and top store (<b class="k">${esc(stores[0].key)}</b>). True stock-level allocation activates once the reporting layer joins an inventory column.`);
  }
  if(/city.*(opportunity|highest|best)/.test(q)){
    return wrap(`<b class="k">${esc(STATE.byCity[0]?.key||'—')}</b> has the highest revenue (${money(STATE.byCity[0]?.net||0)}). Top 3: ${STATE.byCity.slice(0,3).map(c=>esc(c.key)).join(', ')}.`);
  }
  if(/return.*(reduce|lower|fix)|reduce return/.test(q)){
    const wc=rank(groupAgg(STATE.items,i=>i.category).map(s=>({...s,rr:s.orders?s.ret/s.orders*100:0})),'rr')[0];
    return wrap(`Return rate is <b class="k">${pctStr(M.returnPct)}</b> (${money(M.refundAmt)} refunded). ${wc&&wc.rr>3?`<b class="k">${esc(wc.key)}</b> returns most.`:''} Tighten pre-dispatch QC, add packing photos and clearer PDP sizing, and convert refunds to easy exchanges. See the <b class="k">Returns</b> tab for the full plan.`);
  }
  if(/repeat|loyal|retention/.test(q)){
    return wrap(`Repeat rate is <b class="k">${pctStr(M.repeatPct)}</b> and retention <b class="k">${pctStr(M.retentionPct)}</b>. Nurture the ${fmtInt(M.newCustomers)} new buyers with a structured 30/90-day journey and reward the ${fmtInt(M.repeatCustomers)} repeat customers with early access to new collections.`);
  }
  if(/marketing|spend|where.*invest|budget/.test(q)){
    return wrap(`Concentrate spend where return-on-attention is proven: <b class="k">${esc(STATE.byCity[0]?.key||'—')}</b> and <b class="k">${esc(movers[0].key)}</b>. Defend the base with retention (repeat ${pctStr(M.repeatPct)}) before buying new acquisition.`);
  }
  if(/brief|summary|today|overview/.test(q)) return wrap(ceoBriefing());
  // default
  return wrap(`I can answer on revenue drivers, stores needing attention, products to promote or discontinue, customers to contact, returns, retention, city opportunity and marketing focus — grounded on your current filters (${money(M.revenue)} net, ${fmtInt(M.orders)} orders). Try one of the suggestions below.`);
}

let TBL={page:0,size:50,sort:'date',dir:-1,q:''};
function detailRows(){ let r=STATE.items; if(TBL.q){ const q=TBL.q.toLowerCase();
  r=r.filter(i=>(i.customer_name||'').toLowerCase().includes(q)||(i.document_no||'').toLowerCase().includes(q)||(i.sku||'').toLowerCase().includes(q)||(i.style||'').toLowerCase().includes(q)||(i.category||'').toLowerCase().includes(q)); }
  return [...r].sort((a,b)=>{ const x=a[TBL.sort],y=b[TBL.sort]; const c=(x<y?-1:x>y?1:0); return c*TBL.dir; }); }
VIEW.reports=function(){
  const exp=`<div style="display:flex;flex-wrap:wrap;gap:9px;margin-bottom:16px">
    <button class="btn gold" data-act="expCSV">⬇ CSV</button>

  const V=STATE.validation; const M=STATE.M;
  // reconciliation across granularities
  const granTot=(g)=>{ const kf=bucketKeyFn(g); const m=new Map(); STATE.items.forEach(i=>m.set(kf(i.date),(m.get(kf(i.date))||0)+i.gross)); return sum([...m.values()]); };
  const grand=sum(STATE.items,i=>i.gross);
  const GRAIN_LABEL={day:'Daily',week:'Weekly',month:'Monthly',quarter:'Quarterly',year:'Yearly'};
  const recon=['day','week','month','quarter','year'].map(g=>{ const t=granTot(g); const ok=Math.abs(t-grand)<=Math.max(1,Math.abs(grand)*1e-6);

  const stRecon=CONFIG.SALE_TYPES.map(t=>{ const v=sum(STATE.items.filter(i=>i.sale_type===t),i=>i.gross); return `<tr><td><span class="dot" style="background:${saleColor(t)}"></span> ${t}</td><td class="num">${moneyFull(v)}</td></tr>`; }).join('');
  const valCard=card('Data Validation &amp; Reconciliation',`
    <div class="stat-row" style="margin-bottom:14px">
      <div class="mini"><div class="l">Raw Rows</div><div class="v">${fmtInt(V.raw_rows)}</div></div>
      <div class="mini"><div class="l">Records Loaded</div><div class="v">${fmtInt(V.total_rows||V.deduped_rows)}</div><div class="d">all records included · ${fmtInt(V.duplicate_rows||0)} exact-duplicate rows kept</div></div>

      <div class="mini"><div class="l">Net = Gross ÷ ${GST}</div><div class="v">${money(V.returned_gross/GST)}</div></div>
    </div>
    <div class="grid g-2">
      <div><div class="ct"><h3 style="font-size:14px">Granularity Reconciliation</h3></div><table class="dt"><thead><tr><th>Grain</th><th class="num">Σ Gross</th><th>Status</th></tr></thead><tbody>${recon}</tbody></table><p style="font-size:10.5px;color:var(--muted);margin-top:8px">Every grain must sum to the grand total ${moneyFull(grand)}.</p></div>
      <div><div class="ct"><h3 style="font-size:14px">Sale-Type Reconciliation</h3></div><table class="dt"><thead><tr><th>Type</th><th class="num">Σ Gross</th></tr></thead><tbody>${stRecon}</tbody></table><p style="font-size:10.5px;color:var(--muted);margin-top:8px">No dedup — every record included as-is. Match key: ${esc(V.dedup_key)}. Returns are negative gross.</p></div>
    </div>`,{hint:'single source of truth: Sales_overview_table'});
  // detail table
  const rows=detailRows(); const total=rows.length; const pages=Math.max(1,Math.ceil(total/TBL.size));
  TBL.page=clamp(TBL.page,0,pages-1); const slice=rows.slice(TBL.page*TBL.size,(TBL.page+1)*TBL.size);
  const cols=[['date','Date'],['document_no','Invoice'],['customer_name','Customer'],['category','Category'],['style','Style'],['sale_type','Type'],['qty','Qty',1],['gross','Gross',1],['net','Net',1],['discount','Discount',1],['net_weight','Net Wt',1],['store','Store']];
  const head=cols.map(c=>`<th class="${c[2]?'num':''}" data-sortcol="${c[0]}">${esc(c[1])}${TBL.sort===c[0]?(TBL.dir<0?' ▼':' ▲'):''}</th>`).join('');
  const body=slice.map(i=>`<tr>
    <td>${i.date}</td><td>${esc(i.document_no)}</td><td>${esc(trunc(i.customer_name,18))}</td><td>${esc(i.category)}</td><td>${esc(i.style)}</td>
    <td><span class="pill" style="color:${saleColor(i.sale_type)}">${i.sale_type}</span></td>
    <td class="num">${fmtNum(i.qty,0)}</td><td class="num">${moneyFull(i.gross)}</td><td class="num">${moneyFull(i.net)}</td>
    <td class="num">${moneyFull(i.discount)}</td><td class="num">${grams(i.net_weight)}</td><td>${esc(i.store)}</td></tr>`).join('');
  const tblCard=card('Detailed Sales',`
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
      <input class="inp" id="tblSearch" placeholder="Search invoice, customer, style…" value="${esc(TBL.q)}" style="flex:1;min-width:180px">
      <span style="font-size:11.5px;color:var(--muted)">${fmtInt(total)} rows</span></div>
    <div class="scroll-x"><table class="dt"><thead><tr>${head}</tr></thead><tbody>${body||`<tr><td colspan="12" class="empty">No rows</td></tr>`}</tbody></table></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px">
      <button class="btn" data-act="pgPrev" ${TBL.page===0?'disabled style="opacity:.4"':''}>← Prev</button>
      <span style="font-size:12px;color:var(--muted)">Page ${TBL.page+1} / ${pages}</span>
      <button class="btn" data-act="pgNext" ${TBL.page>=pages-1?'disabled style="opacity:.4"':''}>Next →</button></div>`,{head:`<button class="btn" data-act="expCSV" style="padding:5px 11px">⬇ CSV</button>`});
  return secHead('Reports','Reports &amp; Data','Branded exports, the detailed order-line table, and full reconciliation')+
    exp+valCard+`<div style="margin-top:16px">${tblCard}</div>`;

function dl(name,content,mime){ const b=new Blob([content],{type:mime}); const u=URL.createObjectURL(b);
  const a=document.createElement('a'); a.href=u; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(u),1500); toast('Exported '+name); }
function csvEsc(v){ v=String(v==null?'':v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function exportCSV(){ const cols=['date','document_no','customer_id','customer_name','city','state','category','collection','metal','price_band','sale_type','qty','gross','net','discount','net_weight','store','channel'];
  const lines=[cols.join(',')]; STATE.items.forEach(i=>lines.push(cols.map(c=>csvEsc(i[c])).join(',')));
  dl('lucira-sales_'+STATE.curWin.from+'_'+STATE.curWin.to+'.csv',lines.join('\n'),'text/csv'); }
function exportXLS(){ const cols=['Date','Invoice','Customer','Category','Collection','Metal','Type','Qty','Gross','Net','Discount','Net Wt','Store'];
  const rowsH=cols.map(c=>`<Cell><Data ss:Type="String">${esc(c)}</Data></Cell>`).join('');
  const body=STATE.items.map(i=>`<Row>${[['String',i.date],['String',i.document_no],['String',i.customer_name],['String',i.category],['String',i.collection],['String',i.metal],['String',i.sale_type],['Number',i.qty],['Number',i.gross],['Number',Math.round(i.net)],['Number',i.discount],['Number',i.net_weight],['String',i.store]].map(([t,v])=>`<Cell><Data ss:Type="${t}">${esc(v)}</Data></Cell>`).join('')}</Row>`).join('');
  const xml=`<?xml version="1.0"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"><Worksheet ss:Name="Lucira Sales"><Table><Row>${rowsH}</Row>${body}</Table></Worksheet></Workbook>`;
  dl('lucira-sales_'+STATE.curWin.from+'_'+STATE.curWin.to+'.xls',xml,'application/vnd.ms-excel'); }
function exportGeneric(name,cols,data){ const lines=[cols.map(c=>c[1]).join(',')];
  data.forEach(r=>lines.push(cols.map(c=>csvEsc(typeof c[2]==='function'?c[2](r):r[c[0]])).join(','))); dl(name,lines.join('\n'),'text/csv'); }
function exportDeck(){
  const M=STATE.M,PM=STATE.PM; const g=growth(M.revenue,PM.revenue); const movers=topMovers(); const acts=generateActions();
  const slide=(inner)=>`<section style="width:960px;min-height:540px;margin:0 auto 24px;padding:48px 56px;box-sizing:border-box;background:#0d0d10;color:#f4f1ea;border-radius:14px;border:1px solid rgba(212,175,55,.25);page-break-after:always;font-family:Georgia,serif">${inner}</section>`;
  const kpi=(l,v,d)=>`<div style="display:inline-block;width:30%;margin:0 1% 18px;vertical-align:top"><div style="font-size:13px;color:#8a8272;letter-spacing:1px;text-transform:uppercase">${l}</div><div style="font-size:30px;color:#d4af37;margin-top:4px">${v}</div><div style="font-size:12px;color:#b9b6ad">${d||''}</div></div>`;
  const html=`<!doctype html><html><head><meta charset="utf-8"><title>Lucira Board Deck</title></head><body style="margin:0;background:#08080a;padding:24px 0;font-family:Georgia,serif">`+
    slide(`<div style="font-size:12px;letter-spacing:4px;color:#d4af37;text-transform:uppercase">Lucira Jewelry</div><h1 style="font-size:46px;margin:80px 0 8px">Sales Intelligence<br>Executive Briefing</h1><div style="color:#b9b6ad;font-size:16px">${STATE.curWin.from} → ${STATE.curWin.to} · vs ${COMPARE_LABEL[STATE.compare]}</div><div style="position:absolute"></div>`)+
    slide(`<h2 style="color:#d4af37;font-size:30px;margin-bottom:24px">Performance Snapshot</h2>${kpi('Net Revenue',money(M.revenue),(g>=0?'▲ ':'▼ ')+pctStr(Math.abs(g)))}${kpi('Orders',fmtInt(M.orders))}${kpi('AOV',money(M.aov))}${kpi('Customers',fmtInt(M.customers),fmtInt(M.newCustomers)+' new')}${kpi('Repeat Rate',pctStr(M.repeatPct))}${kpi('Return Rate',pctStr(M.returnPct))}${kpi('MTO / RTS',pctStr(M.mtoPct)+' / '+pctStr(M.rtsPct))}${kpi('CLV',money(M.clv))}${kpi('Refunds',money(M.refundAmt))}`)+
    slide(`<h2 style="color:#d4af37;font-size:30px;margin-bottom:24px">What Moved</h2><ul style="font-size:20px;line-height:1.9">`+movers.slice(0,5).map(m=>`<li><b>${esc(m.key)}</b> — ${money(m.net)} (${m.g>=0?'+':''}${m.g.toFixed(0)}%)</li>`).join('')+`</ul>`)+
    slide(`<h2 style="color:#d4af37;font-size:30px;margin-bottom:24px">Recommended Actions</h2><ol style="font-size:17px;line-height:1.7">`+acts.map(a=>`<li style="margin-bottom:12px"><b>${esc(a.issue)}</b><br><span style="color:#b9b6ad;font-size:15px">${esc(a.rec)} — ${esc(a.owner)}, ROI ${esc(a.roi)}</span></li>`).join('')+`</ol>`)+
    `</body></html>`;
  dl('lucira-board-deck_'+STATE.asOf+'.html',html,'text/html');
}

    ${sel('f_ctype','Customer Type',STATE.dims.ctype,f.ctype)}
    ${sel('f_state','State',STATE.dims.state,f.state)}
    <div class="fld"><label>Global Search</label><input class="inp" id="f_search" placeholder="customer / invoice / style / sku" value="${esc(f.search)}"></div>`;
  document.getElementById('f_range').addEventListener('change',e=>{ document.getElementById('customWrap').style.display=e.target.value==='custom'?'grid':'none'; });
}
function syncDrawer(){ buildDrawer(); }
function readDrawer(){ const g=id=>document.getElementById(id); const f=STATE.filters;
  f.range=g('f_range').value; f.from=g('f_from')?g('f_from').value:f.from; f.to=g('f_to')?g('f_to').value:f.to;
  STATE.compare=g('f_compare').value;
  f.category=g('f_category').value; f.collection=g('f_collection').value; f.metal=g('f_metal').value;
  f.band=g('f_band').value; f.saletype=g('f_saletype').value; f.store=g('f_store').value;
  f.channel=g('f_channel').value; f.ctype=g('f_ctype').value; f.state=g('f_state').value; f.search=g('f_search').value.trim();
}
function openDrawer(){ buildDrawer(); document.getElementById('drawer').classList.add('on'); document.getElementById('scrim').classList.add('on'); }
function closeDrawer(){ document.getElementById('drawer').classList.remove('on'); document.getElementById('scrim').classList.remove('on'); }
function resetFilters(){ STATE.filters={range:'7d',from:null,to:null,category:'',collection:'',metal:'',band:'',saletype:'',store:'',ctype:'',channel:'',state:'',search:''}; STATE.compare='prev'; STATE.drill=null; buildDrawer(); render(); }

/* ═══════════════════════════════════════════════════════════════════════
   SORT + TOAST + THEME + CLOCK
   ═══════════════════════════════════════════════════════════════════════ */
function sortTable(th){ const c=th.getAttribute('data-sortcol'); if(TBL.sort===c)TBL.dir*=-1; else{TBL.sort=c;TBL.dir=-1;} TBL.page=0; render(); }

/* ── Generic: EVERY .dt table is click-to-sort + each card gets a ⋮ export menu ── */
function _numSort(t){ t=(t||'').replace(/[₹,\s]/g,''); const m=t.match(/^(-?[\d.]+)(cr|l|k|%)?$/i); if(!m) return null; let v=parseFloat(m[1]); if(isNaN(v)) return null; const s=(m[2]||'').toLowerCase(); if(s==='cr')v*=1e7; else if(s==='l')v*=1e5; else if(s==='k')v*=1e3; return v; }
function sortDt(th){
  const table=th.closest('table.dt'); if(!table) return; const tbody=table.querySelector('tbody'); if(!tbody) return;
  const ths=[...th.parentNode.children], idx=ths.indexOf(th);
  const dir=(table.__sc===idx)?-(table.__sd||1):1; table.__sc=idx; table.__sd=dir;
  ths.forEach(h=>h.setAttribute('data-sa','')); th.setAttribute('data-sa',dir>0?'▲':'▼');
  const rows=[...tbody.querySelectorAll(':scope>tr')].filter(r=>!r.querySelector('[colspan]'));
  rows.sort((a,b)=>{ const A=a.children[idx],B=b.children[idx]; if(!A||!B) return 0;
    const at=A.textContent.trim(), bt=B.textContent.trim(), an=_numSort(at), bn=_numSort(bt);
    if(an!=null&&bn!=null) return (an-bn)*dir; return at.localeCompare(bt)*dir; });
  rows.forEach(r=>tbody.appendChild(r));
}
function _tableRows(t){ return [...t.querySelectorAll('tr')].map(tr=>[...tr.children].map(c=>c.textContent.replace(/\s+/g,' ').trim())); }
function _csvCell(v){ return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function cardExportCSV(card,name){ const t=card&&card.querySelector('table.dt'); if(!t){toast('No table to export');return;} dl(name+'.csv',_tableRows(t).map(r=>r.map(_csvCell).join(',')).join('\n'),'text/csv'); }
function cardExportXLS(card,name){ const t=card&&card.querySelector('table.dt'); if(!t){toast('No table to export');return;}
  const cell=v=>{ const clean=v.replace(/[₹,]/g,''); const num=clean!==''&&/^-?[\d.]+$/.test(clean); return `<Cell><Data ss:Type="${num?'Number':'String'}">${esc(num?clean:v)}</Data></Cell>`; };
  const xml=`<?xml version="1.0"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"><Worksheet ss:Name="Export"><Table>`+_tableRows(t).map(r=>`<Row>${r.map(cell).join('')}</Row>`).join('')+`</Table></Worksheet></Workbook>`;
  dl(name+'.xls',xml,'application/vnd.ms-excel'); }
function cardExportSVG(card,name){ const s=card&&card.querySelector('svg'); if(!s){toast('No chart to export');return;} dl(name+'.svg','<?xml version="1.0" encoding="UTF-8"?>\n'+new XMLSerializer().serializeToString(s),'image/svg+xml'); }
let _menuCard=null;
function openCardMenu(btn){
  const card=btn.closest('.card'); _menuCard=card;
  const h=card.querySelector('.ct h3'); const title=((h&&h.textContent)||'card').replace(/[^\w]+/g,'-').replace(/^-|-$/g,'').toLowerCase().slice(0,40)||'export';
  const hasT=!!card.querySelector('table.dt'), hasS=!!card.querySelector('svg');
  let m=document.getElementById('cardMenu'); if(!m){ m=document.createElement('div'); m.id='cardMenu'; m.className='cmenu'; document.body.appendChild(m); }
  m.dataset.name='lucira-'+title;
  m.innerHTML=(hasT?`<button data-cm="xls">⬇ Export to Excel</button><button data-cm="csv">⬇ Export to CSV</button>`:'')+(hasS?`<button data-cm="svg">⬇ Download chart (SVG)</button>`:'');
  const r=btn.getBoundingClientRect(); m.style.top=(r.bottom+6)+'px'; m.style.left=Math.max(8,Math.min(r.right-184,window.innerWidth-192))+'px'; m.classList.add('on');
}
function closeCardMenu(){ const m=document.getElementById('cardMenu'); if(m)m.classList.remove('on'); }
let toastT; function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('on'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('on'),2200); }
function setTheme(t){ document.documentElement.setAttribute('data-theme',t); try{localStorage.setItem('lucira_theme',t);}catch(e){} refreshThemeColors(); if(STATE.items.length)render(); }
function tickClock(){ const d=new Date();
  document.getElementById('clkDate').textContent=d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
  document.getElementById('clkTime').textContent=d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})+' · IST'; }

/* ═══════════════════════════════════════════════════════════════════════
   BOOT
   ═══════════════════════════════════════════════════════════════════════ */
function cycleCompare(){ const ks=Object.keys(COMPARE_LABEL); STATE.compare=ks[(ks.indexOf(STATE.compare)+1)%ks.length]; toast('Compare: '+COMPARE_LABEL[STATE.compare]); render(); }
function bindEvents(){
  document.getElementById('btnFilter').onclick=openDrawer;
  document.getElementById('btnDrawerClose').onclick=closeDrawer;
  document.getElementById('scrim').onclick=closeDrawer;
  document.getElementById('btnApply').onclick=()=>{ readDrawer(); closeDrawer(); render(); };
  document.getElementById('btnReset').onclick=resetFilters;
  document.getElementById('btnTheme').onclick=()=>setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
  document.getElementById('btnCompare').onclick=cycleCompare;
  // Persistent header date-range dropdown — applies across EVERY tab (mirrors the drawer's f_range)
  const hr=document.getElementById('hdrRange');
  if(hr){ hr.innerHTML=RANGES.map(r=>`<option value="${r[0]}">${esc(r[1])}</option>`).join(''); hr.value=STATE.filters.range;
    hr.onchange=()=>{ STATE.filters.range=hr.value; if(hr.value==='custom')openDrawer(); render(); }; }
  document.getElementById('btnFull').onclick=()=>{ if(!document.fullscreenElement)document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen(); else document.exitFullscreen&&document.exitFullscreen(); };
  document.getElementById('fab').onclick=()=>{ const c=document.getElementById('copilot'); c.classList.toggle('on'); if(c.classList.contains('on')&&!c.dataset.init){ initCopilot(); c.dataset.init=1; } };
  document.getElementById('cpClose').onclick=()=>document.getElementById('copilot').classList.remove('on');
  const send=()=>{ const inp=document.getElementById('cpInput'); const q=inp.value.trim(); if(!q)return; inp.value=''; cpAsk(q); };
  document.getElementById('cpSend').onclick=send;
  document.getElementById('cpInput').addEventListener('keydown',e=>{ if(e.key==='Enter')send(); });
  // delegated dynamic controls
  document.getElementById('main').addEventListener('click',e=>{
    const ask=e.target.closest('[data-ask]'); if(ask){ const out=document.getElementById('aiOut'); if(out)out.querySelector('.pad').firstChild.innerHTML=localAnswer(ask.getAttribute('data-ask')); return; }
    const rep=e.target.closest('[data-report]'); if(rep){ const kind=rep.getAttribute('data-report'); const out=document.getElementById('aiOut');
      if(out){ out.querySelector('.pad').firstChild.innerHTML=reportText(kind==='brief'?'Daily CEO Briefing':kind); out.scrollIntoView({behavior:'smooth',block:'center'}); toast('Generated: '+(kind==='brief'?'Daily CEO Briefing':kind)); } return; }
    const cmp=e.target.closest('[data-cmp]'); if(cmp){ STATE.compare=cmp.getAttribute('data-cmp'); render(); return; }
  });
  document.getElementById('main').addEventListener('input',e=>{
    if(e.target.id==='tblSearch'){ TBL.q=e.target.value; TBL.page=0; const cur=e.target.selectionStart; render();
      const s=document.getElementById('tblSearch'); if(s){ s.focus(); s.setSelectionRange(cur,cur); } } });
  document.querySelectorAll('#tabs').forEach(n=>n.addEventListener('click',e=>{ const t=e.target.closest('[data-tab]'); if(t)setTab(t.getAttribute('data-tab')); }));
  // generic table sort (any .dt header) + per-card ⋮ export menu
  document.getElementById('main').addEventListener('click',e=>{
    const cmb=e.target.closest('[data-cmenu]'); if(cmb){ e.stopPropagation(); openCardMenu(cmb); return; }
    const th=e.target.closest('table.dt th'); if(th && !th.hasAttribute('data-sortcol')){ sortDt(th); }
  });
  document.addEventListener('click',e=>{
    const opt=e.target.closest('#cardMenu [data-cm]');
    if(opt){ const m=document.getElementById('cardMenu'); const nm=(m&&m.dataset.name)||'lucira-export'; const a=opt.getAttribute('data-cm');
      if(a==='xls')cardExportXLS(_menuCard,nm); else if(a==='csv')cardExportCSV(_menuCard,nm); else if(a==='svg')cardExportSVG(_menuCard,nm); closeCardMenu(); return; }
    if(!e.target.closest('#cardMenu')&&!e.target.closest('[data-cmenu]')) closeCardMenu();
  });
  window.addEventListener('hashchange',()=>{ const h=location.hash.slice(1); if(h&&TABS.find(t=>t.id===h)&&h!==STATE.tab){ STATE.tab=h; render(); } });
  document.addEventListener('keydown',e=>{ if(e.target.matches('input,select,textarea'))return;
    if(e.key==='f'){ e.preventDefault(); openDrawer(); } else if(e.key==='t'){ setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'); }
    else if(e.key==='c'){ cycleCompare(); } else if(e.key==='Escape'){ closeDrawer(); document.getElementById('copilot').classList.remove('on'); }
    else if(/^[1-9]$/.test(e.key)){ const t=TABS[+e.key-1]; if(t)setTab(t.id); } });
}
async function boot(){
  try{ const t=localStorage.getItem('lucira_theme'); if(t)document.documentElement.setAttribute('data-theme',t); }catch(e){}
  refreshThemeColors(); tickClock(); setInterval(tickClock,1000*30);
  const h=location.hash.slice(1); if(h&&TABS.find(t=>t.id===h))STATE.tab=h;
  await loadData();
  bindEvents(); render();
  document.getElementById('app').classList.add('ready');
  setTimeout(()=>document.getElementById('loader').classList.add('done'),600);
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot); else boot();

</script>
