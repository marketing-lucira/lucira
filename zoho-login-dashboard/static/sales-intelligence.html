<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Lucira · Sales Intelligence Command Center</title>
<meta name="description" content="Executive Sales Intelligence Platform for Lucira Jewelry — CEO command center reading the daily Sales_overview reporting layer.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23f4d78b'/%3E%3Cstop offset='1' stop-color='%23b8860b'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='%230b0b0d'/%3E%3Ctext x='50' y='70' font-family='Georgia,serif' font-size='58' font-weight='700' text-anchor='middle' fill='url(%23g)'%3EL%3C/text%3E%3C/svg%3E">
<style>
/* ═══════════════════════════════════════════════════════════════════════
   LUCIRA SALES INTELLIGENCE — premium luxury jewellery command center
   Two themes (Luxury Dark / Premium Light) via [data-theme] on <html>.
   ═══════════════════════════════════════════════════════════════════════ */
:root{
  --gold:#d4af37; --gold-2:#f2d888; --gold-deep:#b8860b; --gold-soft:rgba(212,175,55,.14);
  --emerald:#12b886; --royal:#8b5cf6; --navy:#3b5bdb; --rose:#e0a899; --platinum:#c7cdd4;
  --good:#12b886; --warn:#f2b13a; --crit:#ef5350; --info:#4d96ff;
  --r-lg:20px; --r-md:14px; --r-sm:10px;
  --shadow:0 18px 50px -20px rgba(0,0,0,.65);
  --ease:cubic-bezier(.22,.61,.36,1);
  --serif:"Cormorant Garamond","Playfair Display",Georgia,"Times New Roman",serif;
  --sans:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
html[data-theme=dark]{
  --bg:#08080a; --bg-2:#0d0d10; --surface:#141418; --surface-2:#1b1b21; --surface-3:#22222a;
  --glass:rgba(26,26,32,.62); --glass-brd:rgba(212,175,55,.16); --hair:rgba(255,255,255,.07);
  --ink:#f4f1ea; --ink-2:#b9b6ad; --muted:#7d7a72; --grid:rgba(255,255,255,.06); --axis:rgba(255,255,255,.14);
  --sheen:radial-gradient(120% 120% at 0% 0%,rgba(212,175,55,.10),transparent 46%),radial-gradient(120% 120% at 100% 0%,rgba(139,92,246,.08),transparent 50%);
  --card-grad:linear-gradient(158deg,rgba(255,255,255,.045),rgba(255,255,255,.008));
}
html[data-theme=light]{
  --bg:#efece5; --bg-2:#f6f4ef; --surface:#ffffff; --surface-2:#faf8f3; --surface-3:#f1ede3;
  --glass:rgba(255,255,255,.72); --glass-brd:rgba(184,134,11,.22); --hair:rgba(20,15,5,.09);
  --ink:#20180c; --ink-2:#5c5346; --muted:#8a8272; --grid:rgba(20,15,5,.08); --axis:rgba(20,15,5,.2);
  --gold:#b8860b; --gold-2:#c99a26;
  --sheen:radial-gradient(120% 120% at 0% 0%,rgba(184,134,11,.10),transparent 46%),radial-gradient(120% 120% at 100% 0%,rgba(139,92,246,.06),transparent 50%);
  --card-grad:linear-gradient(158deg,rgba(255,255,255,.9),rgba(250,247,240,.55));
  --shadow:0 18px 44px -22px rgba(80,60,10,.28);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans); background:var(--bg); color:var(--ink);
  font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;
  background-image:var(--sheen); background-attachment:fixed;
  overflow-x:hidden;
}
::selection{background:var(--gold-soft);color:var(--ink)}
h1,h2,h3,h4{font-family:var(--serif);font-weight:600;letter-spacing:.2px;line-height:1.15}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:20px;border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:var(--gold-deep);background-clip:content-box}

/* ── Loading screen ─────────────────────────────────────────── */
#loader{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:26px;transition:opacity .7s var(--ease),visibility .7s}
#loader.done{opacity:0;visibility:hidden}
.load-mark{width:112px;height:112px;position:relative;display:grid;place-items:center}
.load-mark svg{width:100%;height:100%}
.load-ring{position:absolute;inset:-14px;border-radius:50%;border:1.5px solid var(--glass-brd);
  border-top-color:var(--gold);animation:spin 1.15s linear infinite}
.load-ring.r2{inset:-26px;border-top-color:transparent;border-right-color:var(--royal);opacity:.5;animation-duration:2.1s;animation-direction:reverse}
@keyframes spin{to{transform:rotate(360deg)}}
.load-word{font-family:var(--serif);font-size:34px;letter-spacing:8px;
  background:linear-gradient(100deg,var(--gold-2),var(--gold),var(--gold-deep));-webkit-background-clip:text;background-clip:text;color:transparent;
  text-transform:uppercase;padding-left:8px}
.load-sub{font-size:11px;letter-spacing:5px;color:var(--muted);text-transform:uppercase}
.load-bar{width:190px;height:2px;background:var(--hair);border-radius:2px;overflow:hidden}
.load-bar i{display:block;height:100%;width:40%;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:load 1.1s var(--ease) infinite}
@keyframes load{0%{transform:translateX(-120%)}100%{transform:translateX(320%)}}

/* ── Brand mark ─────────────────────────────────────────────── */
.brand{display:flex;align-items:center;gap:12px}
.brand .mono{width:38px;height:38px;border-radius:11px;flex:0 0 auto;
  background:linear-gradient(150deg,#1c1c22,#0c0c0e);border:1px solid var(--glass-brd);display:grid;place-items:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
.brand .mono svg{width:24px;height:24px}
.brand .wm{display:flex;flex-direction:column;line-height:1}
.brand .wm b{font-family:var(--serif);font-size:19px;font-weight:600;letter-spacing:3px;
  background:linear-gradient(100deg,var(--gold-2),var(--gold-deep));-webkit-background-clip:text;background-clip:text;color:transparent}
.brand .wm span{font-size:8.5px;letter-spacing:3.4px;text-transform:uppercase;margin-top:3px;font-weight:600;
  background:linear-gradient(100deg,var(--gold-2),var(--gold-deep));-webkit-background-clip:text;background-clip:text;color:transparent}

/* ── App layout ─────────────────────────────────────────────── */
#app{opacity:0;transition:opacity .6s var(--ease)}
#app.ready{opacity:1}
header.top{position:relative;z-index:60;backdrop-filter:blur(18px) saturate(1.3);
  background:linear-gradient(180deg,var(--glass),transparent);border-bottom:1px solid var(--hair);
  padding:11px clamp(14px,3vw,30px);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.top .spacer{flex:1}
.clock{font-variant-numeric:tabular-nums;font-size:12px;color:var(--ink-2);text-align:right;line-height:1.35}
.clock b{color:var(--gold);font-weight:600;letter-spacing:.5px}
.src-dot{display:inline-flex;align-items:center;gap:7px;font-size:11px;color:var(--ink-2);
  padding:5px 11px;border:1px solid var(--hair);border-radius:20px;background:var(--surface-2)}
.src-dot i{width:7px;height:7px;border-radius:50%;background:var(--warn);box-shadow:0 0 8px var(--warn)}
.src-dot.live i{background:var(--good);box-shadow:0 0 8px var(--good)}
.iconbtn{width:38px;height:38px;border-radius:11px;border:1px solid var(--hair);background:var(--surface-2);
  display:grid;place-items:center;color:var(--ink-2);transition:.2s var(--ease);font-size:16px}
.iconbtn:hover{color:var(--gold);border-color:var(--glass-brd);transform:translateY(-1px)}
.btn{padding:8px 15px;border-radius:11px;border:1px solid var(--hair);background:var(--surface-2);
  color:var(--ink);font-size:12.5px;font-weight:500;display:inline-flex;align-items:center;gap:7px;transition:.2s var(--ease)}
.btn:hover{border-color:var(--glass-brd);transform:translateY(-1px)}
.btn.gold{background:linear-gradient(120deg,var(--gold),var(--gold-deep));color:#160f00;border:none;font-weight:600;box-shadow:0 8px 20px -8px var(--gold-deep)}
.btn.gold:hover{filter:brightness(1.06)}

/* nav */
nav.tabs{position:relative;z-index:55;display:flex;gap:3px;overflow-x:auto;scrollbar-width:none;
  padding:9px clamp(14px,3vw,30px);backdrop-filter:blur(18px);background:linear-gradient(180deg,var(--glass),transparent);
  border-bottom:1px solid var(--hair)}
nav.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 15px;border-radius:10px;font-size:12.5px;font-weight:500;color:var(--ink-2);white-space:nowrap;
  display:inline-flex;align-items:center;gap:7px;transition:.18s var(--ease);border:1px solid transparent}
.tab:hover{color:var(--ink);background:var(--surface-2)}
.tab.active{color:var(--gold);background:var(--gold-soft);border-color:var(--glass-brd)}
.tab .ic{font-size:14px;opacity:.85}

main{padding:clamp(16px,3vw,30px);max-width:1560px;margin:0 auto}
.view{display:none;animation:fade .5s var(--ease)}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* section chrome */
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin:6px 0 16px}
.sec-head h2{font-size:clamp(21px,2.6vw,29px)}
.sec-head .sub{color:var(--muted);font-size:12.5px;margin-top:3px}
.eyebrow{font-size:10.5px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:600}

/* card / glass */
.card{background:var(--card-grad),var(--glass);border:1px solid var(--glass-brd);border-radius:var(--r-lg);
  backdrop-filter:blur(14px);box-shadow:var(--shadow);position:relative;overflow:hidden}
.card>.pad{padding:18px}
.card .ct{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.card .ct h3{font-size:16px;letter-spacing:.3px}
.card .ct .ct-r{display:flex;align-items:center;gap:10px;flex:0 0 auto}
.card .ct .hint{font-size:11px;color:var(--muted)}
.grid{display:grid;gap:16px}
.g-2{grid-template-columns:repeat(2,1fr)}.g-3{grid-template-columns:repeat(3,1fr)}
.g-4{grid-template-columns:repeat(4,1fr)}.g-6{grid-template-columns:repeat(6,1fr)}
@media(max-width:1120px){.g-4,.g-6{grid-template-columns:repeat(3,1fr)}.g-3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:760px){.g-2,.g-3,.g-4,.g-6{grid-template-columns:1fr}}

/* KPI card */
.kpi{background:var(--card-grad),var(--glass);border:1px solid var(--glass-brd);border-radius:var(--r-md);
  padding:15px 16px 13px;position:relative;overflow:hidden;transition:.25s var(--ease);cursor:default}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);opacity:.75}
.kpi:hover{transform:translateY(-3px);border-color:var(--glass-brd);box-shadow:0 22px 44px -24px rgba(0,0,0,.7)}
.kpi.pos::before{background:var(--good)}.kpi.neg::before{background:var(--crit)}.kpi.neu::before{background:var(--muted)}
.kpi .lab{font-size:11px;color:var(--ink-2);letter-spacing:.4px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.kpi .val{font-family:var(--serif);font-size:26px;font-weight:600;margin:5px 0 2px;letter-spacing:.3px;line-height:1}
.kpi .row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:8px}
.kpi .delta{font-size:11.5px;font-weight:600;display:inline-flex;align-items:center;gap:3px}
.kpi .delta.up{color:var(--good)}.kpi .delta.down{color:var(--crit)}.kpi .delta.flat{color:var(--muted)}
.kpi .prev{font-size:10.5px;color:var(--muted)}
.kpi .spark{margin-top:9px;height:30px;width:100%}
.kpi .ai{margin-top:9px;font-size:10.8px;color:var(--ink-2);border-top:1px dashed var(--hair);padding-top:8px;
  display:flex;gap:6px;line-height:1.4}
.kpi .ai b{color:var(--gold);font-weight:600}
.kpi .ai .sp{flex:0 0 auto}

/* pills / tags / chips */
.pill{font-size:10.5px;padding:3px 9px;border-radius:20px;border:1px solid var(--hair);background:var(--surface-2);color:var(--ink-2);white-space:nowrap}
.pill.g{color:var(--gold);border-color:var(--glass-brd);background:var(--gold-soft)}
.pill.ok{color:var(--good);border-color:rgba(18,184,134,.3);background:rgba(18,184,134,.1)}
.pill.bad{color:var(--crit);border-color:rgba(239,83,80,.3);background:rgba(239,83,80,.1)}
.pill.warn{color:var(--warn);border-color:rgba(242,177,58,.3);background:rgba(242,177,58,.1)}
.seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--hair);border-radius:10px;padding:3px;gap:2px}
.seg button{padding:5px 11px;border-radius:7px;font-size:11.5px;color:var(--ink-2);transition:.15s}
.seg button.on{background:var(--gold-soft);color:var(--gold)}
select.inp,input.inp{background:var(--surface-2);border:1px solid var(--hair);border-radius:9px;color:var(--ink);
  padding:7px 10px;font-size:12px;outline:none;transition:.15s}
select.inp:focus,input.inp:focus{border-color:var(--gold)}

/* tables */
table.dt{width:100%;border-collapse:collapse;font-size:12.5px}
table.dt th{text-align:left;padding:9px 11px;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;
  letter-spacing:.5px;border-bottom:1px solid var(--hair);cursor:pointer;white-space:nowrap;position:sticky;top:0;background:var(--surface)}
table.dt th.num,table.dt td.num{text-align:right;font-variant-numeric:tabular-nums}
table.dt td{padding:9px 11px;border-bottom:1px solid var(--hair)}
table.dt tbody tr{transition:.12s}
table.dt tbody tr:hover{background:var(--surface-2)}
table.dt th:hover{color:var(--ink-2)}
table.dt th[data-sa]:not([data-sa=""])::after{content:" " attr(data-sa);color:var(--gold);font-size:9px;font-weight:700}
/* card ⋮ export menu */
.cmenu-btn{width:26px;height:26px;border-radius:8px;border:1px solid var(--hair);background:var(--surface-2);color:var(--ink-2);font-size:17px;line-height:1;display:grid;place-items:center;cursor:pointer;transition:.15s}
.cmenu-btn:hover{color:var(--gold);border-color:var(--glass-brd);transform:translateY(-1px)}
.cmenu{position:fixed;z-index:200;background:var(--surface);border:1px solid var(--glass-brd);border-radius:12px;box-shadow:var(--shadow);padding:6px;min-width:180px;display:none}
.cmenu.on{display:block}
.cmenu button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;padding:9px 11px;border-radius:8px;background:none;border:none;color:var(--ink);font-size:12.5px;font-weight:500;cursor:pointer}
.cmenu button:hover{background:var(--surface-2);color:var(--gold)}
.rank{width:24px;height:24px;border-radius:7px;display:inline-grid;place-items:center;font-size:11px;font-weight:700;
  background:var(--surface-3);color:var(--ink-2)}
.rank.r1{background:linear-gradient(135deg,var(--gold-2),var(--gold-deep));color:#160f00}
.rank.r2{background:linear-gradient(135deg,#e6e6ea,#a9adb5);color:#161616}
.rank.r3{background:linear-gradient(135deg,var(--rose),#b06a52);color:#160f00}
.bar-cell{position:relative;background:linear-gradient(90deg,var(--gold-soft) var(--w,0%),transparent 0)}

/* charts */
.chart{width:100%;height:auto;display:block;overflow:visible}
.ttip{position:fixed;z-index:200;background:var(--surface-3);border:1px solid var(--glass-brd);border-radius:9px;
  padding:8px 11px;font-size:11.5px;color:var(--ink);pointer-events:none;opacity:0;transition:opacity .12s;
  box-shadow:var(--shadow);max-width:260px;line-height:1.5}
.tip.on{opacity:1}
/* info (ⓘ) button + explainer popover */
.info-btn{display:inline-grid;place-items:center;width:18px;height:18px;border-radius:50%;flex:0 0 auto;
  border:1px solid var(--hair);background:var(--surface-2);color:var(--muted);font-size:11px;font-style:normal;
  font-family:Georgia,'Times New Roman',serif;line-height:1;cursor:pointer;user-select:none;transition:.16s;vertical-align:middle}
.info-btn:hover,.info-btn:focus-visible{color:var(--gold);border-color:var(--gold);transform:scale(1.14);outline:none;
  box-shadow:0 0 0 3px color-mix(in srgb,var(--gold) 22%,transparent)}
.info-btn.active{background:var(--gold);color:#17140a;border-color:var(--gold);transform:scale(1.1);
  box-shadow:0 0 0 3px color-mix(in srgb,var(--gold) 26%,transparent)}
.kpi{position:relative}
.kpi>.info-btn{position:absolute;top:10px;right:10px}
.mini{position:relative}
.mini>.info-btn{position:absolute;top:9px;right:9px;width:16px;height:16px;font-size:10px}
.info-pop{position:fixed;z-index:240;width:min(378px,92vw);max-height:min(72vh,540px);overflow-y:auto;overflow-x:hidden;
  background:var(--surface,#141418);background-color:var(--surface,#141418);backdrop-filter:blur(8px);
  border:1px solid var(--glass-brd);border-radius:15px;box-shadow:0 20px 55px rgba(0,0,0,.55);
  padding:16px 17px;opacity:0;transform:translateY(7px) scale(.985);pointer-events:none;
  transition:opacity .19s cubic-bezier(.2,.8,.2,1),transform .19s cubic-bezier(.2,.8,.2,1)}
.info-pop.on{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.info-pop h4{font-family:var(--serif);font-size:15px;line-height:1.25;margin:0 0 2px}
.info-pop .ip-sub{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
.info-pop section{margin-bottom:10px}
.info-pop section .k{font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--gold);font-weight:700;margin-bottom:3px}
.info-pop section .t{font-size:12px;color:var(--ink-2);line-height:1.55}
.info-pop .gb{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-pop .gb>div{border-radius:9px;padding:7px 9px;font-size:11px;color:var(--ink-2);line-height:1.45}
.info-pop .gb .good{border:1px solid rgba(18,184,134,.32);background:rgba(18,184,134,.08)}
.info-pop .gb .bad{border:1px solid rgba(239,83,80,.32);background:rgba(239,83,80,.08)}
.info-pop .gb b{display:block;font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.info-pop .gb .good b{color:#12b886}.info-pop .gb .bad b{color:#ef5350}
.info-pop .meta{display:flex;gap:14px;flex-wrap:wrap;border-top:1px solid var(--hair);padding-top:10px;margin-top:6px;font-size:10.5px;color:var(--muted)}
.info-pop .meta span{display:inline-flex;gap:5px;align-items:baseline}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;font-size:11.5px;color:var(--ink-2)}
.legend span{display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:.15s}
.legend span.off{opacity:.35;text-decoration:line-through}
.legend i{width:10px;height:10px;border-radius:3px;flex:0 0 auto}

/* alerts / actions */
.alert{display:flex;gap:12px;padding:13px 15px;border-radius:var(--r-md);border:1px solid var(--hair);
  background:var(--surface-2);align-items:flex-start;transition:.2s}
.alert:hover{border-color:var(--glass-brd)}
.alert .ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto;font-size:16px}
.alert.crit .ic{background:rgba(239,83,80,.14);color:var(--crit)}
.alert.warn .ic{background:rgba(242,177,58,.14);color:var(--warn)}
.alert.good .ic{background:rgba(18,184,134,.14);color:var(--good)}
.alert.info .ic{background:rgba(77,150,255,.14);color:var(--info)}
.alert h4{font-family:var(--sans);font-size:13px;font-weight:600;margin-bottom:2px}
.alert p{font-size:11.8px;color:var(--ink-2)}
.alert .meta{font-size:10.5px;color:var(--muted);margin-top:4px}

/* action center rows */
.action{border:1px solid var(--hair);border-radius:var(--r-md);padding:14px 16px;background:var(--card-grad),var(--glass);margin-bottom:12px}
.action .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:9px}
.action .top h4{font-family:var(--sans);font-size:13.5px;font-weight:700;flex:1}
.action .kv{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px 16px;font-size:12px}
.action .kv b{color:var(--muted);font-weight:600;display:block;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}

/* filter drawer */
#drawer{position:fixed;top:0;right:0;bottom:0;width:min(400px,92vw);z-index:120;background:var(--bg-2);
  border-left:1px solid var(--glass-brd);box-shadow:-30px 0 60px -30px rgba(0,0,0,.7);
  transform:translateX(100%);transition:transform .4s var(--ease);display:flex;flex-direction:column}
#drawer.on{transform:none}

  const N=CONFIG.WINDOW_DAYS;
  const styles=[]; const nStyles=280;
  for(let i=0;i<nStyles;i++){
    const cat=CATS[pickW(CATS.map((_,i)=>i),CATS.map(x=>x.w))];
    const prod=pick(cat.prods); const metal=pick(cat.metal); const coll=cat.c==='Others'?'—':pick(COLLECTIONS);
    const netW=Math.max(0.5,gauss((cat.nwt[0]+cat.nwt[1])/2,(cat.nwt[1]-cat.nwt[0])/4));
    styles.push({style:'ST-'+(1000+i),cat:cat.c,prod,metal,coll,rate:cat.rate,coin:!!cat.coin,baseNetW:netW,
      pop:Math.max(.05,gauss(1,.7)),trend:(rnd()*2-1)*0.55,
      invDate:ymd(addDays(today,-Math.floor(rnd()*(N+260))-5)),stock:Math.max(0,Math.round(gauss(9,7)))});
  }
  const customers=[]; const nCust=1600;
  for(let i=0;i<nCust;i++){ const seg=pickW(['one','repeat','vip'],[60,32,8]);
    customers.push({id:'C-'+(40000+i),name:'Customer '+(40000+i),seg,city:null,state:null,region:null,
      firstSeed:ymd(addDays(today,-Math.floor(rnd()*(N+500))))}); }
  const items=[]; const festival={9:1.6,10:2.2,3:1.5,4:1.7,1:1.35}; let docn=100000;
  for(let k=N-1;k>=0;k--){
    const d=addDays(today,-k); const dk=ymd(d); const dow=d.getDay(); const mon=d.getMonth();
    const isWknd=(dow===0||dow===6);
    const growthF=1+0.4*((N-k)/N);          // steady YoY growth
    const seas=(festival[mon]||1)*(isWknd?1.35:1)*(1+0.16*Math.sin(k/34))*growthF;
    const nOrders=Math.max(0,Math.round(gauss(11*seas,3)));
    for(let o=0;o<nOrders;o++){
      docn++; const store=pickW(STORES,[20,14,12,14,13,11,16]); const person=store.s==='Online'?'Online':pick(PEOPLE);
      let cust; if(rnd()<0.44){ const pool=customers.filter(c=>c.seg!=='one'); cust=pool[Math.floor(rnd()*pool.length)]||pick(customers); } else cust=pick(customers);
      if(!cust.city){ cust.city=store.city; cust.state=store.state; cust.region=store.region; }
      const saleType=pickW(CONFIG.SALE_TYPES,[30,55,8,5,2]);
      const doc='INV-'+docn; const nLines=saleType==='Return'?1:pickW([1,2,3,4],[70,20,7,3]);
      for(let l=0;l<nLines;l++){
        const st=pickW(styles,styles.map(s=>s.pop*(1+s.trend*((N-k)/365))));
        const qty=st.coin?pickW([1,2,3,5],[60,20,12,8]):pickW([1,2],[92,8]);
        const netW=Math.max(0.3,st.baseNetW*Math.max(.5,gauss(1,.14)))*qty;
        const grossW=st.coin?netW*(1+rnd()*0.01):netW*(1+0.02+rnd()*0.14);
        const making=st.coin?netW*st.rate*(0.005+rnd()*0.01):netW*st.rate*(0.08+rnd()*0.18);
        const stone=st.cat==='Diamond Jewellery'?netW*st.rate*(0.6+rnd()*1.4):0;
        let gross=Math.round(netW*st.rate+making+stone);
        gross=Math.round(gross*Math.max(.6,gauss(1,.08)));
        let sign=1; if(saleType==='Return') sign=-1;
        gross*=sign;
        const discPct=st.coin?pickW([0,0.005,0.01],[70,20,10]):pickW([0,0.03,0.06,0.1,0.15,0.22],[34,20,18,14,9,5]);
        const discount=Math.round(Math.abs(gross)*discPct);
        items.push({date:dk,document_no:doc,order_id:doc,customer_id:cust.id,customer_name:cust.name,
          city:cust.city,state:cust.state,region:cust.region,sku:st.style+'-'+String.fromCharCode(65+l),
          product_name:st.prod,style:st.style,category:st.cat,sub_category:'',collection:st.coll,metal:st.metal,
          price_band:realBand(gross),customer_type:'',sale_type:saleType,
          qty,gross,net:net(gross),discount,gross_weight:round3(grossW),net_weight:round3(netW),cogs:null,
          store:store.s,salesperson:person,channel:store.s==='Online'?'Online':'Store'});
      }
    }
  }
  // (New/Repeat cohort is derived centrally in ingest() by customer identity;
  //  no per-transaction customer_type override needed here.)
  const dupN=Math.floor(items.length*0.02); const rawLen=items.length;
  for(let i=0;i<dupN;i++){ const src=items[Math.floor(rnd()*rawLen)]; items.push(Object.assign({},src)); }
  const styleRef=new Map(); const firstSale=new Map(),lastSale=new Map(),unitsAll=new Map();
  for(const it of items){ const s=it.style; if(!firstSale.has(s)||it.date<firstSale.get(s))firstSale.set(s,it.date);
    if(!lastSale.has(s)||it.date>lastSale.get(s))lastSale.set(s,it.date); unitsAll.set(s,(unitsAll.get(s)||0)+Math.abs(it.qty)); }
  for(const st of styles){ if(!firstSale.has(st.style)) continue; let invD=st.invDate;
    if(invD>firstSale.get(st.style)) invD=ymd(addDays(parseYmd(firstSale.get(st.style)),-Math.floor(rnd()*40)-2));
    styleRef.set(st.style,{style:st.style,category:st.cat,metal:st.metal,collection:st.coll,
      first_sale_date:firstSale.get(st.style),last_sale_date:lastSale.get(st.style),
      units_all_time:unitsAll.get(st.style)||0,first_inventory_date:invD,stock_qty:st.stock}); }
  const custRef=new Map(); const custFirst=new Map(),custNet=new Map(),custOrders=new Map();
  for(const it of items){ const c=it.customer_id; const fs=custFirst.get(c); if(!fs||it.date<fs)custFirst.set(c,it.date);
    custNet.set(c,(custNet.get(c)||0)+it.net); if(!custOrders.has(c))custOrders.set(c,new Set()); custOrders.get(c).add(it.document_no); }
  for(const c of customers){ if(!custFirst.has(c.id)) continue; let fo=custFirst.get(c.id);
    if(c.firstSeed<fo&&rnd()<0.5) fo=c.firstSeed;
    custRef.set(c.id,{customer_id:c.id,first_order_date:fo,last_order_date:custFirst.get(c.id),
      lifetime_orders:(custOrders.get(c.id)||new Set()).size,lifetime_net:Math.round(custNet.get(c.id)||0)}); }
  return {items,styleRef,custRef,rawLen:items.length};
}

/* ═══════════════════════════════════════════════════════════════════════
   LOAD + DEDUP + INGEST  (reporting-layer snapshot → API fallback → sample)
   ═══════════════════════════════════════════════════════════════════════ */
async function loadData(){
  const url = CONFIG.SNAPSHOT_URL || CONFIG.API_BASE;
  if(url){
    try{ const u=new URL(url); if(CONFIG.API_BASE && !CONFIG.SNAPSHOT_URL) u.searchParams.set('days',CONFIG.WINDOW_DAYS);
      const res=await fetch(u,{cache:'no-store'}); if(!res.ok) throw new Error('HTTP '+res.status);
      const j=await res.json(); if(j.error) throw new Error(j.detail||j.error); ingest(j,'live'); return;
    }catch(e){ console.warn('Reporting-layer load failed, using sample:',e.message); }
  }
  if(!SAMPLE) SAMPLE=buildSample();
  ingest({items:SAMPLE.items,styleRef:[...SAMPLE.styleRef.values()],customerRef:[...SAMPLE.custRef.values()],
    asOf:maxDate(SAMPLE.items),currency:'INR',gst_divisor:GST,
    capabilities:{margin:false,inventory:false,selling_days:false,customer:true,salesperson:false,sale_type:true,weights:true,price_band:true,customer_type:true}},'sample');
}
function maxDate(items){ let m=null; for(const it of items) if(!m||it.date>m) m=it.date; return m; }
function dedupKey(it){ return it.gross+'|'+it.date+'|'+it.document_no+'|'+it.net_weight; }
function dedupe(items){ const seen=new Set(); const out=[]; let removed=0,rawGross=0;
  for(const it of items){ rawGross+=(it.gross||0); const k=dedupKey(it); if(seen.has(k)){ removed++; continue; } seen.add(k); out.push(it); }
  return {out,removed,rawRows:items.length,rawGross}; }
function ingest(j,source){
  let items=(j.items||[]).map(it=>{ it.net=net(it.gross||0); if(it.sale_type==null||it.sale_type==='') it.sale_type='Other';
    if(!it.price_band) it.price_band=realBand(it.gross);
    // half_sku = the design part of Full_sku (LJ-<half_sku>-<metal>[-size]); it is the
    // real source column and is populated even when style_code is NULL. Derived from
    // sku so no snapshot change is needed; falls back to style/sku for non-LJ skus.
    it.half_sku = /^LJ-/.test(it.sku||'') ? (it.sku.split('-')[1]||it.style||it.sku) : (it.style||it.sku||'—');
    return it; });
  // CLIENT REQUEST (2026-07-20): include EVERY sales record as-is — NO dedup.
  // dedupe() runs for STATS ONLY (to count how many exact-duplicate rows exist);
  // we deliberately keep the full `items` array, duplicates included.
  const dd=dedupe(items);
  // Per-transaction COHORT by customer identity's first-ever purchase date.
  // customer_id is mobile-based (distinct mobile = distinct customer), so a
  // customer's first-date lines = New, all later lines = Repeat. Used by the
  // New-vs-Repeat chart & frequency metrics; customer_type stays the ERP type.
  { const cf=new Map();
    for(const it of items){ const c=it.customer_id; const f=cf.get(c); if(f==null||it.date<f)cf.set(c,it.date); }
    for(const it of items){ it.cohort=(it.date===cf.get(it.customer_id))?'New':'Repeat'; } }
  STATE.allItems=items;
  STATE.styleRef=new Map((j.styleRef||[]).map(r=>[r.style,r]));
  STATE.custRef=new Map((j.customerRef||[]).map(r=>[r.customer_id,r]));
  STATE.caps=Object.assign({margin:false,inventory:false,selling_days:false,customer:true,salesperson:false,sale_type:true,weights:true,price_band:true,customer_type:true},j.capabilities||{});
  STATE.source=source; STATE.asOf=j.asOf||maxDate(items); STATE.now=STATE.asOf?parseYmd(STATE.asOf):new Date();
  STATE.days=[...new Set(items.map(i=>i.date))].sort();
  const totalGross=items.reduce((s,i)=>s+(i.gross||0),0);
  // Merge any snapshot-provided validation, then FORCE the no-dedup facts so the
  // Reports panel always reflects "all records included" regardless of source.
  STATE.validation = Object.assign(
    { raw_rows:dd.rawRows, raw_gross:round3(dd.rawGross), gst_divisor:GST,
      dedup_key:'gross + sale_date + document_no + net_weight' },
    (j.validation||{}),
    { deduped_rows:items.length, total_rows:items.length, duplicate_rows:dd.removed,
      removed:0, dedup_applied:false, returned_rows:items.length, returned_gross:round3(totalGross) });
  buildDims(); buildCustStats();
}
function buildDims(){
  const D={category:new Set(),collection:new Set(),metal:new Set(),band:new Set(),saletype:new Set(),
    store:new Set(),channel:new Set(),ctype:new Set(),state:new Set(),person:new Set()};
  for(const it of STATE.allItems){
    if(it.category)D.category.add(it.category); if(it.collection&&it.collection!=='—')D.collection.add(it.collection);
    if(it.metal)D.metal.add(it.metal); if(it.price_band)D.band.add(it.price_band); if(it.sale_type)D.saletype.add(it.sale_type);
    if(it.store)D.store.add(it.store); if(it.channel)D.channel.add(it.channel); if(it.customer_type)D.ctype.add(it.customer_type);
    if(it.state&&it.state!=='—'&&it.state!=='Online')D.state.add(it.state); if(it.salesperson&&it.salesperson!=='Online')D.person.add(it.salesperson);
  }
  STATE.dims={}; for(const k in D){ let a=[...D[k]]; if(k==='band')a.sort((x,y)=>PRICE_BAND_ORDER.indexOf(x)-PRICE_BAND_ORDER.indexOf(y)); else a.sort(); STATE.dims[k]=a; }
}
/* ═══════════════════════════════════════════════════════════════════════
   DATE RANGE, FILTERS, COMPARISON WINDOWS
   ═══════════════════════════════════════════════════════════════════════ */
function monthStart(d){ return new Date(d.getFullYear(),d.getMonth(),1); }
function quarterStart(d){ return new Date(d.getFullYear(),Math.floor(d.getMonth()/3)*3,1); }
function yearStart(d){ return new Date(d.getFullYear(),0,1); }
function weekStart(d){ const x=new Date(d); const dow=(x.getDay()+6)%7; return addDays(x,-dow); }
function dateRange(range){
  const now=new Date(STATE.now); now.setHours(0,0,0,0);
  const f=STATE.filters; let from,to=now;
  switch(range){
    case 'today': from=now; break;
    case 'yesterday': from=to=addDays(now,-1); break;
    case '7d': from=addDays(now,-6); break;
    case '30d': from=addDays(now,-29); break;
    case '90d': from=addDays(now,-89); break;
    case 'thisweek': from=weekStart(now); break;
    case 'mtd': from=monthStart(now); break;
    case 'qtd': from=quarterStart(now); break;
    case 'ytd': from=yearStart(now); break;
    case '12m': from=addDays(now,-364); break;
    case 'all': from=parseYmd(STATE.days[0]||ymd(now)); break;
    case 'custom': from=parseYmd(f.from)||addDays(now,-364); to=parseYmd(f.to)||now; if(to>now)to=now; if(from>now)from=now; break;
    default: from=addDays(now,-364);
  }
  return {from:ymd(from),to:ymd(to)};
}
function comparePrev(cur){
  const from=parseYmd(cur.from),to=parseYmd(cur.to); const len=diffDays(cur.to,cur.from)+1;
  let pf,pt;
  switch(STATE.compare){
    case 'yoy': pf=addDays(from,-365); pt=addDays(to,-365); break;
    case 'mom': pf=addMonths(from,-1); pt=addMonths(to,-1); break;
    case 'wow': pf=addDays(from,-7); pt=addDays(to,-7); break;
    case 'qoq': pf=addMonths(from,-3); pt=addMonths(to,-3); break;
    default: pt=addDays(from,-1); pf=addDays(pt,-(len-1)); // previous period
  }
  return {from:ymd(pf),to:ymd(pt)};
}
const COMPARE_LABEL={prev:'Previous period',yoy:'Year over Year',mom:'Month over Month',wow:'Week over Week',qoq:'Quarter over Quarter'};
function dimPass(it){
  const f=STATE.filters;
  if(f.category&&it.category!==f.category) return false;
  if(f.collection&&it.collection!==f.collection) return false;
  if(f.metal&&it.metal!==f.metal) return false;
  if(f.band&&it.price_band!==f.band) return false;
  if(f.saletype&&it.sale_type!==f.saletype) return false;
  if(f.store&&it.store!==f.store) return false;
  if(f.channel&&it.channel!==f.channel) return false;
  if(f.ctype&&it.customer_type!==f.ctype) return false;
  if(f.state&&it.state!==f.state) return false;
  if(STATE.drill){ const[d,v]=STATE.drill; if((it[d]||'')!==v) return false; }
  if(f.search){ const q=f.search.toLowerCase();
    if(!((it.customer_name||'').toLowerCase().includes(q)||(it.customer_id||'').toLowerCase().includes(q)||
         (it.sku||'').toLowerCase().includes(q)||(it.style||'').toLowerCase().includes(q)||
         (it.document_no||'').toLowerCase().includes(q)||(it.product_name||'').toLowerCase().includes(q))) return false; }
  return true;
}
function windowItems(from,to){ const out=[]; for(const it of STATE.allItems){ if(it.date<from||it.date>to) continue; if(!dimPass(it)) continue; out.push(it); } return out; }
function applyFilters(){
  const cur=dateRange(STATE.filters.range); const prev=comparePrev(cur);
  STATE.curWin=cur; STATE.prevWin=prev;
  STATE.items=windowItems(cur.from,cur.to);
  STATE.prevItems=windowItems(prev.from,prev.to);
}
function anyFilter(){ const f=STATE.filters; return !!(f.category||f.collection||f.metal||f.band||f.saletype||f.store||f.channel||f.ctype||f.state||f.search||STATE.drill); }

/* ═══════════════════════════════════════════════════════════════════════
   PER-CUSTOMER STATS  (RFM, segmentation, CLV) over full history
   ═══════════════════════════════════════════════════════════════════════ */
function buildCustStats(){
  const m=new Map(); const asOf=STATE.asOf;
  for(const it of STATE.allItems){
    const id=it.customer_id; if(!id||id==='-') continue;
    let c=m.get(id); if(!c){ c={id,name:it.customer_name||id,orders:new Set(),net:0,gross:0,units:0,first:it.date,last:it.date,
      cats:{},stores:{},colls:{},returns:0,high:0,low:Infinity}; m.set(id,c); }
    c.orders.add(it.document_no); c.net+=it.net; c.gross+=it.gross; c.units+=Math.abs(it.qty);
    if(it.date<c.first)c.first=it.date; if(it.date>c.last)c.last=it.date;
    if(it.category)c.cats[it.category]=(c.cats[it.category]||0)+it.net;
    if(it.store)c.stores[it.store]=(c.stores[it.store]||0)+it.net;
    if(it.collection&&it.collection!=='—')c.colls[it.collection]=(c.colls[it.collection]||0)+it.net;
    if(it.sale_type==='Return')c.returns++;
    if(it.gross>0){ if(it.gross>c.high)c.high=it.gross; if(it.gross<c.low)c.low=it.gross; }
  }
  const list=[...m.values()];
  for(const c of list){
    c.freq=c.orders.size; c.orders=c.freq; c.monetary=Math.round(c.net);
    c.recency=diffDays(asOf,c.last);
    c.tenure=Math.max(1,diffDays(c.last,c.first));
    c.avgBasket=c.freq?c.net/c.freq:0;
    c.daysBetween=c.freq>1?c.tenure/(c.freq-1):null;
    c.pref=(o)=>{ let bk=null,bv=-1; for(const k in o) if(o[k]>bv){bv=o[k];bk=k;} return bk; };
    c.prefCat=c.pref(c.cats); c.prefStore=c.pref(c.stores); c.prefColl=c.pref(c.colls);
    if(c.low===Infinity)c.low=0;
  }
  // RFM scoring — quintiles
  const q=(arr,rev)=>{ const s=[...arr].sort((a,b)=>a-b); return v=>{ let r=1; for(let i=1;i<=4;i++){ if(v>=s[Math.floor(s.length*i/5)]) r=i+1; } return rev?6-r:r; }; };
  const rScore=q(list.map(c=>c.recency),true);   // lower recency = better → reversed
  const fScore=q(list.map(c=>c.freq),false);
  const mScore=q(list.map(c=>c.monetary),false);
  for(const c of list){ c.R=rScore(c.recency); c.F=fScore(c.freq); c.M=mScore(c.monetary); c.rfm=''+c.R+c.F+c.M;
    c.seg=segmentOf(c); }
  STATE.custStats=m;
}
function segmentOf(c){
  const {R,F,M,recency,monetary,freq}=c;
  if(monetary>=CONFIG.VIP_LTV && freq>=2) return 'VIP';
  if(recency>CONFIG.LOST_DAYS) return 'Lost';
  if(recency>CONFIG.DORMANT_DAYS) return 'Dormant';
  if(M>=4 && F>=3) return 'High Value';
  if(F>=4) return 'Loyal';
  if(F<=1 && R>=4) return 'New';
  if(R<=2 && (F>=2||M>=3)) return 'At Risk';
  return 'Promising';
}

/* ═══════════════════════════════════════════════════════════════════════
   METRIC COMPUTATION  (one pass → every scalar the KPI grid needs)
   ═══════════════════════════════════════════════════════════════════════ */
function computeMetrics(items,win){
  const M={gross:0,net:0,discount:0,salesGross:0,returnGross:0,exchangeGross:0,mtoNet:0,rtsNet:0,tahNet:0,
    units:0,posUnits:0,orderSet:new Set(),returnOrderSet:new Set(),exchOrderSet:new Set(),cancelOrderSet:new Set(),
    custSet:new Set(),cogs:0,hasCogs:false};
  for(const it of items){
    M.gross+=it.gross; M.net+=it.net; M.discount+=it.discount||0;
    M.orderSet.add(it.document_no); if(it.customer_id&&it.customer_id!=='-')M.custSet.add(it.customer_id);
    if(it.cogs!=null){ M.cogs+=it.cogs; M.hasCogs=true; }
    const st=it.sale_type;
    if(st==='Return'){ M.returnGross+=it.gross; M.returnOrderSet.add(it.document_no); }
    else if(st==='Exchange'){ M.exchangeGross+=it.gross; M.exchOrderSet.add(it.document_no); }
    else { M.salesGross+=it.gross; M.units+=Math.abs(it.qty); M.posUnits+=Math.abs(it.qty); }
    if(st==='MTO')M.mtoNet+=it.net; else if(st==='RTS')M.rtsNet+=it.net; else if(st==='TAH')M.tahNet+=it.net;
  }
  const orders=M.orderSet.size, retOrders=M.returnOrderSet.size, exchOrders=M.exchOrderSet.size;
  const active=[...M.custSet]; const cr=STATE.custRef;
  let newC=0,returningC=0,repeatC=0,clvSum=0,clvN=0,newOrd=0,repeatOrd=0;
  for(const id of active){ const ref=cr.get(id);
    const first=ref?ref.first_order_date:null; const lo=ref?(ref.lifetime_orders||0):0;
    if(win&&first&&first>=win.from&&first<=win.to){ newC++; newOrd+=lo; } else if(win) returningC++;
    if(ref&&ref.lifetime_orders>1){ repeatC++; repeatOrd+=lo; }
    if(ref&&ref.lifetime_net!=null){ clvSum+=ref.lifetime_net; clvN++; } }
  const stores=new Set(items.map(i=>i.store).filter(Boolean)).size;
  const execs=new Set(items.map(i=>i.salesperson).filter(s=>s&&s!=='Online')).size;
  const nc=active.length||1;
  return {
    gross:M.gross, net:M.net, revenue:M.net, salesGross:M.salesGross,
    orders, units:M.units, discount:M.discount,
    aov: orders?M.net/orders:0, asp: M.units?M.net/M.units:0,
    customers: active.length, uniqueCustomers: active.length,
    newCustomers:newC, repeatCustomers:repeatC, returningCustomers:returningC,
    newCustFreq: newC?newOrd/newC:0, repeatCustFreq: repeatC?repeatOrd/repeatC:0,
    retentionPct: active.length?returningC/active.length*100:0,
    repeatPct: active.length?repeatC/active.length*100:0,
    clv: clvN?clvSum/clvN:0,
    mtoRev:M.mtoNet, rtsRev:M.rtsNet, tahRev:M.tahNet,
    mtoPct: M.net?M.mtoNet/M.net*100:0, rtsPct: M.net?M.rtsNet/M.net*100:0,
    returnAmt: Math.abs(M.returnGross)/GST, refundAmt: Math.abs(M.returnGross),
    returnPct: orders?retOrders/orders*100:0, exchangePct: orders?exchOrders/orders*100:0,
    cancellationPct: 0,
    discountPct: M.salesGross?M.discount/M.salesGross*100:0,
    profit: M.hasCogs?M.net-M.cogs:null, margin: (M.hasCogs&&M.net)?(M.net-M.cogs)/M.net*100:null,
    revPerCustomer: M.net/nc, revPerStore: stores?M.net/stores:0, revPerExec: execs?M.net/execs:null,
    stores, execs, retOrders, exchOrders
  };
}
/* granularity buckets for a window (for sparklines + trend charts) */
function autoGran(from,to){ const days=diffDays(to,from)+1; if(days<=31)return'day'; if(days<=120)return'week'; if(days<=550)return'month'; return'quarter'; }
function bucketKeyFn(g){ return g==='day'?(s=>s):g==='week'?weekKey:g==='month'?monthKey:g==='quarter'?quarterKey:yearKey; }
function bucketWin(g,key){ // returns {from,to} for a bucket key
  if(g==='day') return {from:key,to:key};
  if(g==='week'){ return {from:key,to:ymd(addDays(parseYmd(key),6))}; }
  if(g==='month'){ const d=parseYmd(key+'-01'); return {from:ymd(d),to:ymd(addDays(addMonths(d,1),-1))}; }
  if(g==='quarter'){ const[y,q]=key.split('-Q'); const d=new Date(+y,(+q-1)*3,1); return {from:ymd(d),to:ymd(addDays(addMonths(d,3),-1))}; }
  const d=new Date(+key,0,1); return {from:ymd(d),to:ymd(new Date(+key,11,31))};
}
function metricSeries(items,from,to,gran){
  const g=gran||autoGran(from,to); const kf=bucketKeyFn(g);
  const map=new Map();
  for(const it of items){ const k=kf(it.date); if(!map.has(k))map.set(k,[]); map.get(k).push(it); }
  const keys=[...map.keys()].sort();
  return keys.map(k=>({key:k,metrics:computeMetrics(map.get(k),bucketWin(g,k))}));
}

/* ═══════════════════════════════════════════════════════════════════════
   AGGREGATION HELPERS
   ═══════════════════════════════════════════════════════════════════════ */
function groupAgg(items,keyFn){
  const m=new Map();
  for(const it of items){ const k=keyFn(it); if(k==null||k===''||k==='—') continue;
    let g=m.get(k); if(!g){ g={key:k,net:0,gross:0,disc:0,units:0,orders:new Set(),cust:new Set(),ret:0,retNet:0,mto:0,rts:0,weight:0}; m.set(k,g); }
    g.net+=it.net; g.gross+=it.gross; g.disc+=it.discount||0; g.units+=Math.abs(it.qty); g.orders.add(it.document_no);
    if(it.customer_id&&it.customer_id!=='-')g.cust.add(it.customer_id); g.weight+=it.net_weight||0;
    if(it.sale_type==='Return'){ g.ret++; g.retNet+=it.net; } if(it.sale_type==='MTO')g.mto+=it.net; if(it.sale_type==='RTS')g.rts+=it.net;
  }
  return [...m.values()].map(g=>({...g,orders:g.orders.size,customers:g.cust.size,
    aov:g.orders.size?g.net/g.orders.size:0,discPct:g.gross?g.disc/g.gross*100:0,
    retPct:g.orders.size?g.ret/g.orders.size*100:0}));
}
function rank(arr,key,dir){ return [...arr].sort((a,b)=>(dir===1?a[key]-b[key]:b[key]-a[key])); }
function sum(arr,f){ return arr.reduce((s,x)=>s+(f?f(x):x),0); }
function distinct(items,f){ return new Set(items.map(f).filter(Boolean)).size; }

function sparkline(vals,color,h){ h=h||30; const w=120; color=color||'var(--gold)';
  if(!vals.length) return ''; const mn=Math.min(...vals,0),mx=Math.max(...vals,1); const rng=(mx-mn)||1;
  const pts=vals.map((v,i)=>[i/(Math.max(1,vals.length-1))*w, h-4-((v-mn)/rng)*(h-8)]);

  const area=line+` L${w} ${h} L0 ${h} Z`; const last=pts[pts.length-1];
  const id='sg'+Math.floor(rnd()*1e6);

    <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity=".28"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#${id})"/><path d="${line}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.4" fill="${color}"/></svg>`;
}
function lineArea(series,keys,opts){
  opts=opts||{}; const W=760,H=opts.height||240,P={t:16,r:14,b:34,l:56};
  const iw=W-P.l-P.r, ih=H-P.t-P.b; const fmt=opts.fmt||money;

  const nk=keys.length; const xf=i=>P.l+(nk<=1?iw/2:i/(nk-1)*iw); const yf=v=>P.t+ih-((v-mn)/(mx-mn))*ih;
  let g=''; const ticks=4; for(let i=0;i<=ticks;i++){ const val=mn+(mx-mn)*i/ticks; const y=yf(val);
    g+=`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="${C_GRID}"/><text x="${P.l-8}" y="${y+3}" fill="${C_MUTED}" font-size="10" text-anchor="end">${fmt(val)}</text>`; }

  let paths='';

    const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
    if(opts.area!==false&&si===0){ const id='la'+si+Math.floor(rnd()*1e5);
      paths+=`<defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${col}" stop-opacity=".25"/><stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
        <path d="${line} L${xf(nk-1)} ${P.t+ih} L${xf(0)} ${P.t+ih} Z" fill="url(#${id})"/>`; }
    paths+=`<path d="${line}" fill="none" stroke="${col}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>`;
    pts.forEach((p,i)=>{ paths+=`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="8" fill="transparent" data-tip="<b>${esc(keys[i])}</b><br>${esc(s.name)}: ${fmt(s.data[i])}"/><circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.6" fill="${col}"/>`;
      if(opts.valueLabels!==false&&si===0&&(i%lstep===0||i===nk-1)){ const ly=Math.max(P.t+8,p[1]-7);
        paths+=`<text x="${p[0].toFixed(1)}" y="${ly.toFixed(1)}" fill="${C_INK}" font-size="9" font-weight="600" text-anchor="middle">${esc(fmt(s.data[i]))}</text>`; } });
  });

function shortKey(k){ if(/^\d{4}-\d{2}-\d{2}$/.test(k)) return k.slice(5); if(/^\d{4}-\d{2}$/.test(k)){ const[y,m]=k.split('-'); return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]+" '"+y.slice(2); } return k; }

function bars(data,opts){ opts=opts||{}; const W=760,H=opts.height||240,P={t:14,r:12,b:40,l:52};

    g+=`<text x="${(x+bw/2).toFixed(1)}" y="${H-14}" fill="${C_MUTED}" font-size="9.5" text-anchor="middle" transform="rotate(0)">${esc(trunc(d.label,10))}</text>`; });

function stackBars(keys,series,opts){ opts=opts||{}; const W=760,H=opts.height||250,P={t:14,r:12,b:40,l:56};

function donut(data,opts){ opts=opts||{}; const total=sum(data,d=>Math.abs(d.value))||1; const R=88,r=54,cx=100,cy=100;

function recompute(){
  applyFilters();
  STATE.M=computeMetrics(STATE.items,STATE.curWin);
  STATE.PM=computeMetrics(STATE.prevItems,STATE.prevWin);
  STATE.series=metricSeries(STATE.items,STATE.curWin.from,STATE.curWin.to);
  STATE.byCat=rank(groupAgg(STATE.items,i=>i.category),'net');
  STATE.byStore=rank(groupAgg(STATE.items,i=>i.store),'net');
  STATE.byColl=rank(groupAgg(STATE.items,i=>i.collection),'net');
  STATE.byStyle=rank(groupAgg(STATE.items,i=>i.style),'net');
  STATE.byState=rank(groupAgg(STATE.items.filter(i=>i.state&&i.state!=='Online'),i=>i.state),'net');
  STATE.byCity=rank(groupAgg(STATE.items.filter(i=>i.city&&i.city!=='Online'),i=>i.city),'net');
}

function kpiInsight(kpi){
  const M=STATE.M,PM=STATE.PM; const cur=M[kpi.k],prev=PM[kpi.k]; const g=growth(cur,prev);
  const cl=COMPARE_LABEL[STATE.compare].toLowerCase();
  const dir=g>0.5?'up':g<-0.5?'down':'flat';
  const topCat=STATE.byCat[0], topStore=STATE.byStore[0];
  const w=(t)=>({sp:'✦',t});
  switch(kpi.k){
    case 'revenue': case 'net': return dir==='flat'?`Holding steady vs ${cl}.`:`${dir==='up'?'Rising':'Softening'} ${pctStr(Math.abs(g))} ${cl}${topCat?`; ${esc(topCat.key)} leads`:''}.`;
    case 'gross': return `${money(Math.abs(M.returnAmt))} of returns net against gross this period.`;
    case 'orders': return `${dir==='up'?'More':'Fewer'} invoices than ${cl} (${pctStr(Math.abs(g))}).`;
    case 'aov': return dir==='up'?`Basket richer — pricing/mix working.`:`Basket lighter vs ${cl}; watch discounting.`;
    case 'asp': return `Avg piece realises ${money(cur)}.`;
    case 'newCustomers': return `${fmtInt(cur)} first-time buyers acquired.`;
    case 'repeatPct': return cur<25?`Repeat share low — loyalty upside.`:`Healthy repeat base.`;
    case 'retentionPct': return cur<40?`Retention needs attention.`:`Retention solid at ${pctStr(cur)}.`;
    case 'clv': return `Mean lifetime value ${money(cur)}.`;
    case 'mtoPct': return `${pctStr(cur)} of net is made-to-order.`;
    case 'rtsPct': return `${pctStr(cur)} sells from ready stock.`;
    case 'returnPct': return cur>6?`Elevated — investigate top return drivers.`:`Within tolerance.`;
    case 'refundAmt': return cur>0?`${money(cur)} refunded this period.`:`No refunds booked.`;
    case 'discountPct': return cur>10?`Discount leakage — protect margin.`:`Discipline holding.`;
    case 'revPerStore': return topStore?`${esc(topStore.key)} is the top revenue store.`:'—';
    default: return dir==='flat'?`Stable vs ${cl}.`:`${dir==='up'?'Up':'Down'} ${pctStr(Math.abs(g))} vs ${cl}.`;
  }
}

/* ═══════════════════════════════════════════════════════════════════════
   SMART ALERTS  — detect the spec's alert conditions from data
   ═══════════════════════════════════════════════════════════════════════ */
function generateAlerts(){
  const M=STATE.M,PM=STATE.PM,A=[]; const cl=COMPARE_LABEL[STATE.compare].toLowerCase();
  const gRev=growth(M.revenue,PM.revenue);
  if(gRev<=-8) A.push({level:'crit',ic:'▼',title:'Revenue decline detected',text:`Net revenue is down ${pctStr(Math.abs(gRev))} vs ${cl} (${money(M.revenue)} vs ${money(PM.revenue)}).`,meta:'Sales Drop'});
  else if(gRev>=15) A.push({level:'good',ic:'▲',title:'Revenue spike',text:`Net revenue up ${pctStr(gRev)} vs ${cl} — capture the momentum.`,meta:'Revenue Spike'});
  if(M.returnPct>6) A.push({level:'crit',ic:'↩',title:'High return rate',text:`${pctStr(M.returnPct)} of orders returned (${money(M.refundAmt)} refunded). Threshold 6%.`,meta:'High Returns'});
  if(M.refundAmt>0.03*M.salesGross&&M.salesGross>0) A.push({level:'warn',ic:'₹',title:'Refund value elevated',text:`Refunds of ${money(M.refundAmt)} = ${pctStr(M.refundAmt/M.salesGross*100)} of sales gross.`,meta:'High Refunds'});
  if(M.repeatPct<25) A.push({level:'warn',ic:'♺',title:'Low repeat rate',text:`Only ${pctStr(M.repeatPct)} of active customers are repeat buyers — activate loyalty.`,meta:'Low Repeat Rate'});
  if(M.discountPct>12) A.push({level:'warn',ic:'%',title:'High discounting',text:`Discount is ${pctStr(M.discountPct)} of sales gross — protect margin.`,meta:'High Discount'});
  // store performance drop
  const storesCur=groupAgg(STATE.items,i=>i.store), storesPrev=new Map(groupAgg(STATE.prevItems,i=>i.store).map(g=>[g.key,g]));
  storesCur.forEach(s=>{ const p=storesPrev.get(s.key); if(p&&growth(s.net,p.net)<=-20&&s.net>0) A.push({level:'warn',ic:'⌂',title:`${esc(s.key)} store softening`,text:`${esc(s.key)} net down ${pctStr(Math.abs(growth(s.net,p.net)))} vs ${cl}.`,meta:'Store Performance Drop'}); });
  // VIP purchases + large orders
  const vipIds=new Set([...STATE.custStats.values()].filter(c=>c.seg==='VIP').map(c=>c.id));
  const vipActive=distinct(STATE.items.filter(i=>vipIds.has(i.customer_id)),i=>i.customer_id);
  if(vipActive>0) A.push({level:'good',ic:'★',title:`${vipActive} VIP customers active`,text:`${vipActive} VIP customers purchased this period — ensure white-glove follow-up.`,meta:'VIP Customer Purchase'});
  const orderVal=new Map(); STATE.items.forEach(i=>orderVal.set(i.document_no,(orderVal.get(i.document_no)||0)+i.net));
  const big=[...orderVal.entries()].filter(([,v])=>v>=CONFIG.HIGHVAL_LTV).length;
  if(big>0) A.push({level:'info',ic:'◆',title:`${big} large orders`,text:`${big} orders above ${money(CONFIG.HIGHVAL_LTV)} booked this period.`,meta:'Large Order'});
  // trend from sparkline
  const s=sparkFor('revenue'); if(s.length>=3){ const slope=s[s.length-1]-s[0]; A.push(slope>=0?{level:'good',ic:'↗',title:'Positive revenue trend',text:'Trailing trend within the window is upward.',meta:'Positive Trend'}:{level:'warn',ic:'↘',title:'Negative revenue trend',text:'Trailing trend within the window is downward — monitor.',meta:'Negative Trend'}); }
  if(!STATE.caps.margin) A.push({level:'info',ic:'ⓘ',title:'Margin analytics unavailable',text:'Sales_overview_table has no COGS column — Profit, Margin and Margin-Loss alerts activate once a cost column is added.',meta:'Inventory Risk'});
  return A;
}

/* ═══════════════════════════════════════════════════════════════════════
   EXECUTIVE ACTION CENTER  — issue → root cause → recommendation → ROI
   ═══════════════════════════════════════════════════════════════════════ */
function generateActions(){
  const M=STATE.M,PM=STATE.PM,acts=[]; const cl=COMPARE_LABEL[STATE.compare].toLowerCase(); const asOf=STATE.asOf;
  const dl=(d)=>ymd(addDays(parseYmd(asOf),d));
  // 1 returns
  const retCat=rank(groupAgg(STATE.items.filter(i=>i.sale_type==='Return'),i=>i.category),'retNet').filter(x=>x.retNet<0)[0];
  if(M.returnPct>4) acts.push({issue:`Return rate at ${pctStr(M.returnPct)}`,cause:retCat?`${esc(retCat.key)} drives the most returned value`:'Concentrated in a few categories/products',
    rec:'Audit top return SKUs for sizing/quality; add pre-dispatch QC and clearer PDP specs.',priority:'High',impact:`Recover ~${money(M.refundAmt*0.4)} of refunds`,revImpact:money(M.refundAmt*0.4),custImpact:'Fewer dissatisfied buyers',owner:'Retail Ops',deadline:dl(21),status:'Open',roi:'4–6×'});
  // 2 repeat / retention
  if(M.repeatPct<30) acts.push({issue:`Repeat rate only ${pctStr(M.repeatPct)}`,cause:'Weak post-purchase engagement; no structured loyalty nudges',
    rec:'Launch 30/90-day re-engagement (care reminders, exclusive previews) to New & Promising segments.',priority:'High',impact:`+${money(M.revenue*0.06)} if repeat lifts 4pts`,revImpact:money(M.revenue*0.06),custImpact:`${fmtInt(M.newCustomers)} new buyers to nurture`,owner:'CRM / Marketing',deadline:dl(30),status:'Open',roi:'3–5×'});
  // 3 discount leakage
  if(M.discountPct>9) acts.push({issue:`Discounting at ${pctStr(M.discountPct)} of gross`,cause:'Blanket discounts rather than targeted offers',
    rec:'Cap floor-discretion; move to segment-based offers; protect fast-movers from markdown.',priority:'Medium',impact:`~${money(M.salesGross*0.02)} margin protected`,revImpact:money(M.salesGross*0.02),custImpact:'Neutral',owner:'Sales / Finance',deadline:dl(14),status:'Open',roi:'6–10×'});
  // 4 store attention
  const storesPrev=new Map(groupAgg(STATE.prevItems,i=>i.store).map(g=>[g.key,g]));
  const weak=rank(groupAgg(STATE.items,i=>i.store),'net').map(s=>({...s,g:storesPrev.get(s.key)?growth(s.net,storesPrev.get(s.key).net):0})).filter(s=>s.g<-10&&s.net>0)[0];
  if(weak) acts.push({issue:`${esc(weak.key)} down ${pctStr(Math.abs(weak.g))} vs ${cl}`,cause:'Footfall/conversion or staffing gap at store',
    rec:`Deploy floor coaching, refresh visual merchandising, redirect fast-moving inventory to ${esc(weak.key)}.`,priority:'High',impact:`Close ~${money(Math.abs(weak.net*weak.g/100))} gap`,revImpact:money(Math.abs(weak.net*weak.g/100)),custImpact:'Local base retention',owner:'Regional Manager',deadline:dl(21),status:'Open',roi:'3–4×'});
  // 5 growth opportunity — top city
  const topCity=STATE.byCity[0];
  if(topCity) acts.push({issue:`${esc(topCity.key)} is the highest-opportunity city`,cause:`Strong demand concentration (${money(topCity.net)} net)`,
    rec:`Increase inventory depth & targeted marketing spend in ${esc(topCity.key)}; pilot appointment-led selling.`,priority:'Medium',impact:`+${money(topCity.net*0.1)} upside`,revImpact:money(topCity.net*0.1),custImpact:'Deeper share of wallet',owner:'Marketing',deadline:dl(45),status:'Open',roi:'2–4×'});
  return acts;
}

function topMovers(){
  const cur=groupAgg(STATE.items,i=>i.category), prev=new Map(groupAgg(STATE.prevItems,i=>i.category).map(g=>[g.key,g]));
  return rank(cur.map(c=>({key:c.key,net:c.net,g:prev.get(c.key)?growth(c.net,prev.get(c.key).net):100})),'net');
}

function card(title,body,opts){ opts=opts||{}; const slug=opts.info||(title?infoSlug(title):''); return `<div class="card ${opts.cls||''}">${opts.bare?'':`<div class="pad">`}
  ${title?`<div class="ct"><h3>${esc(title)}</h3><div class="ct-r">${opts.hint?`<span class="hint">${opts.hint}</span>`:''}${opts.head||''}${(/<table|<svg/i.test(body))?`<button class="cmenu-btn" data-cmenu title="Export / options">⋮</button>`:''}${infoIcon(slug,title)}</div></div>`:''}
  ${body}${opts.bare?'':`</div>`}</div>`; }
function secHead(eyebrow,title,sub,right){ return `<div class="sec-head"><div><div class="eyebrow">${esc(eyebrow)}</div><h2>${esc(title)}</h2>${sub?`<div class="sub">${sub}</div>`:''}</div>${right?`<div>${right}</div>`:''}</div>`; }
function deltaMeta(cur,prev,good){ const g=growth(cur,prev); const sign=g>0.5?1:g<-0.5?-1:0;
  const cls=(good===0||sign===0)?'flat':(sign===(good>0?1:-1)?'up':'down'); const arw=sign>0?'▲':sign<0?'▼':'▬';
  return {g,sign,cls,arw}; }
function gatedKpi(kpi){ return `<div class="kpi neu">${infoIcon('kpi-'+kpi.k,kpi.label)}<div class="lab">${esc(kpi.label)} <span class="dot" style="background:var(--muted)" data-tip="${esc(kpi.desc)}"></span></div>
  <div class="val" style="color:var(--muted);font-size:18px">Not available</div>
  <div class="ai"><span class="sp">ⓘ</span><span>${esc(kpi.desc)} — activates when the column exists in Sales_overview_table.</span></div></div>`; }
function kpiCard(kpi){
  if(kpi.cap && !STATE.caps[kpi.cap]) return gatedKpi(kpi);
  const M=STATE.M,PM=STATE.PM; const cur=M[kpi.k],prev=PM[kpi.k]; const dm=deltaMeta(cur,prev,kpi.good);
  const diff=cur-prev; const isPct=/Pct$|%$/.test(kpi.k)||/%/.test(kpi.label);
  const spCol=dm.cls==='up'?'var(--good)':dm.cls==='down'?'var(--crit)':'var(--gold)';
  const strip=dm.cls==='up'?'pos':dm.cls==='down'?'neg':'neu';
  const diffStr=isPct?(diff>=0?'+':'')+diff.toFixed(1)+'pp':(diff>=0?'+':'−')+kpi.fmt(Math.abs(diff)).replace('-','');
  return `<div class="kpi ${strip}" data-kpi="${kpi.k}">${infoIcon('kpi-'+kpi.k,kpi.label)}
    <div class="lab">${esc(kpi.label)} <span class="dot" style="background:var(--gold);opacity:.5" data-tip="${esc(kpi.desc)}"></span></div>
    <div class="val">${kpi.fmt(cur)}</div>
    <div class="row"><span class="delta ${dm.cls}">${dm.arw} ${pctStr(Math.abs(dm.g))}</span>
      <span class="prev" data-tip="Difference vs previous: ${diffStr}">vs ${kpi.fmt(prev)}</span></div>
    <div class="spark">${sparkline(sparkFor(kpi.k),spCol,30)}</div>
    <div class="ai"><span class="sp">✦</span><span>${kpiInsight(kpi)}</span></div></div>`;
}

function activeChips(){ const f=STATE.filters; const chips=[];
  const add=(k,lab)=>{ if(f[k])chips.push(`<span class="chip">${esc(lab)}: ${esc(f[k])} <b data-clear="${k}">✕</b></span>`); };

function rangeLabel(r){ return {today:'Today',yesterday:'Yesterday','7d':'Last 7 days','30d':'Last 30 days','90d':'Last 90 days',thisweek:'This week',mtd:'This month',qtd:'This quarter',ytd:'This year','12m':'Last 12 months',all:'All time',custom:'Custom'}[r]||r; }

VIEW.customers=function(){
  const M=STATE.M,PM=STATE.PM; const cs=[...STATE.custStats.values()];
  const segG={}; cs.forEach(c=>{ (segG[c.seg]=segG[c.seg]||{n:0,net:0})&&0; segG[c.seg].n++; segG[c.seg].net+=c.net; });
  const segOrder=['VIP','High Value','Loyal','Promising','New','At Risk','Dormant','Lost'];
  const segData=segOrder.filter(s=>segG[s]).map(s=>({label:s,value:segG[s].n,key:s,color:SEG_COLOR[s]}));
  const mini=miniRow([
    {l:'Active Customers',v:fmtInt(M.customers),d:deltaTxt(M.customers,PM.customers)},
    {l:'New Customers',v:fmtInt(M.newCustomers),d:deltaTxt(M.newCustomers,PM.newCustomers)},
    {l:'Repeat Customers',v:fmtInt(M.repeatCustomers),d:deltaTxt(M.repeatCustomers,PM.repeatCustomers)},
    {l:'New Cust. Frequency',v:M.newCustFreq.toFixed(2)+'×',d:deltaTxt(M.newCustFreq,PM.newCustFreq)},
    {l:'Repeat Cust. Frequency',v:M.repeatCustFreq.toFixed(2)+'×',d:deltaTxt(M.repeatCustFreq,PM.repeatCustFreq),color:'var(--gold)'},
    {l:'Repeat %',v:pctStr(M.repeatPct),d:deltaTxt(M.repeatPct,PM.repeatPct)},
    {l:'Avg Lifetime Value',v:money(M.clv),color:'var(--gold)'}
  ]);
  // new vs repeat trend
  const keys=STATE.series.map(s=>s.key);
  const nvr=stackBars(keys,[
    {name:'New',color:'#20c997',data:STATE.series.map(s=>{ const g=groupAgg(bucketItems(s.key),i=>i.cohort); const x=g.find(y=>y.key==='New'); return x?x.net:0; })},
    {name:'Repeat',color:'#8b5cf6',data:STATE.series.map(s=>{ const g=groupAgg(bucketItems(s.key),i=>i.cohort); const x=g.find(y=>y.key==='Repeat'); return x?x.net:0; })}
  ],{height:230});
  // RFM grid R(x) x F(y)
  const grid=Array.from({length:5},()=>Array.from({length:5},()=>({n:0,m:0})));
  cs.forEach(c=>{ const cell=grid[c.F-1][c.R-1]; cell.n++; cell.m+=c.monetary; });
  const mxN=Math.max(1,...grid.flat().map(c=>c.n));
  let rfm=`<div class="heat" style="grid-template-columns:auto repeat(5,1fr);max-width:420px">`;
  rfm+=`<div></div>`+[1,2,3,4,5].map(r=>`<div style="text-align:center;font-size:10px;color:var(--muted)">R${r}</div>`).join('');
  for(let f=4;f>=0;f--){ rfm+=`<div style="font-size:10px;color:var(--muted);display:grid;place-items:center">F${f+1}</div>`;
    for(let r=0;r<5;r++){ const c=grid[f][r]; const t=c.n/mxN; const col=`rgba(212,175,55,${(0.12+t*0.8).toFixed(2)})`;
      rfm+=`<div class="cell" style="background:${c.n?col:'var(--surface-3)'}" data-tip="R${r+1} F${f+1}<br>${c.n} customers<br>avg LTV ${money(c.n?c.m/c.n:0)}">${c.n||''}</div>`; } }
  rfm+=`</div><div style="font-size:10.5px;color:var(--muted);margin-top:8px">Recency → · Frequency ↑ · shade = customer count</div>`;
  // segment table
  const segRows=segData.map(s=>{ const g=segG[s.key]; const tot=sum(cs,c=>c.net)||1;
    return `<tr><td><span class="dot" style="background:${s.color}"></span> ${esc(s.key)}</td><td class="num">${fmtInt(g.n)}</td><td class="num">${money(g.net)}</td><td class="num">${pctStr(g.net/tot*100)}</td><td class="num">${money(g.net/g.n)}</td></tr>`; }).join('');
  const segTable=card('Customer Segments',`<table class="dt"><thead><tr><th>Segment</th><th class="num">Customers</th><th class="num">Lifetime Net</th><th class="num">Contribution</th><th class="num">Avg LTV</th></tr></thead><tbody>${segRows}</tbody></table>`,{hint:'lifetime basis'});
  // top 100
  const top=rank(cs,'monetary').slice(0,100);
  const topRows=top.slice(0,50).map((c,i)=>`<tr><td><span class="rank ${i<3?'r'+(i+1):''}">${i+1}</span></td><td>${esc(c.name)}</td>
    <td><span class="pill" style="color:${SEG_COLOR[c.seg]};border-color:${SEG_COLOR[c.seg]}44">${esc(c.seg)}</span></td>
    <td class="num">${fmtInt(c.freq)}</td><td class="num">${money(c.monetary)}</td><td class="num">${money(c.avgBasket)}</td>
    <td class="num">${c.recency}d</td><td>${esc(c.prefCat||NA)}</td><td>${esc(c.prefStore||NA)}</td></tr>`).join('');
  const topTable=card('Top Customers',`<div class="scroll-x"><table class="dt" id="topCustTable"><thead><tr><th>#</th><th>Customer</th><th>Segment</th><th class="num">Orders</th><th class="num">Lifetime Value</th><th class="num">Avg Basket</th><th class="num">Recency</th><th>Pref. Category</th><th>Pref. Store</th></tr></thead><tbody>${topRows}</tbody></table></div>`,{hint:'top 50 of 100',head:`<button class="btn" data-act="expCust" style="padding:5px 11px">⬇ Export</button>`});
  // at-risk / lost / vip cohorts
  const cohort=(seg,color)=>{ const l=rank(cs.filter(c=>c.seg===seg),'monetary').slice(0,6);
    return card(seg+' Customers',l.length?l.map(c=>`<div style="display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid var(--hair);font-size:12px"><span>${esc(c.name)}</span><b style="color:${color}">${money(c.monetary)} · ${c.recency}d</b></div>`).join(''):`<div class="empty">None</div>`,{hint:seg==='Lost'?'>365d inactive':seg==='At Risk'?'declining':'≥₹5L LTV'}); };
  return secHead('Customer 360','Customer Intelligence','RFM, lifetime value, segmentation, VIP & churn — lifetime view over all history · unique customer = distinct mobile no.')+
    mini+
    `<div class="grid g-2" style="margin-bottom:16px">${card('Segmentation',donut(segData,{center:fmtInt(cs.length),centerSub:'CUSTOMERS',fmt:fmtInt}),{})}${card('RFM Matrix',rfm,{hint:'5×5 quintiles'})}</div>`+
    `<div class="grid g-2" style="margin-bottom:16px">${card('New vs Repeat Revenue',nvr,{})}${segTable}</div>`+
    `<div class="grid g-3" style="margin-bottom:16px">${cohort('VIP','var(--gold)')}${cohort('At Risk','var(--warn)')}${cohort('Lost','var(--crit)')}</div>`+
    topTable;
};
function bucketItems(key){ const g=autoGran(STATE.curWin.from,STATE.curWin.to); const kf=bucketKeyFn(g);
  return STATE.items.filter(i=>kf(i.date)===key); }

VIEW.mtorts=function(){
  const M=STATE.M,PM=STATE.PM;
  const g=groupAgg(STATE.items,i=>i.sale_type);
  const gv=(t)=>g.find(x=>x.key===t)||{net:0,orders:0,units:0};
  const mto=gv('MTO'),rts=gv('RTS'),tah=gv('TAH');
  const mini=miniRow([
    {l:'MTO Revenue',v:money(M.mtoRev),d:deltaTxt(M.mtoRev,PM.mtoRev),color:saleColor('MTO')},
    {l:'RTS Revenue',v:money(M.rtsRev),d:deltaTxt(M.rtsRev,PM.rtsRev),color:saleColor('RTS')},
    {l:'MTO Share',v:pctStr(M.mtoPct)},
    {l:'RTS Share',v:pctStr(M.rtsPct)},
    {l:'MTO AOV',v:money(mto.aov)},
    {l:'RTS AOV',v:money(rts.aov)}
  ]);
  const keys=STATE.series.map(s=>s.key);
  const trend=stackBars(keys,[
    {name:'MTO',color:saleColor('MTO'),data:STATE.series.map(s=>s.metrics.mtoRev)},
    {name:'RTS',color:saleColor('RTS'),data:STATE.series.map(s=>s.metrics.rtsRev)},
    {name:'TAH',color:saleColor('TAH'),data:STATE.series.map(s=>s.metrics.tahRev)}
  ],{height:250});
  const mix=donut(CONFIG.SALE_TYPES.filter(t=>t!=='Other').map(t=>({label:t,value:Math.abs(gv(t).net),color:saleColor(t)})).filter(d=>d.value>0),{center:money(M.net),centerSub:'NET'});
  // store comparison table
  const stores=STATE.dims.store; const storeRows=stores.map(st=>{ const si=STATE.items.filter(i=>i.store===st);
    const sg=groupAgg(si,i=>i.sale_type); const sv=t=>{const x=sg.find(y=>y.key===t);return x?x.net:0;};
    const tot=sum(si,i=>i.net)||1;
    return {st,mto:sv('MTO'),rts:sv('RTS'),tah:sv('TAH'),tot}; }).sort((a,b)=>b.tot-a.tot);
  const stTable=card('MTO vs RTS by Store',`<table class="dt"><thead><tr><th>Store</th><th class="num">MTO</th><th class="num">RTS</th><th class="num">TAH</th><th class="num">MTO %</th><th class="num">RTS %</th></tr></thead><tbody>`+
    storeRows.map(r=>`<tr><td>${esc(r.st)}</td><td class="num">${money(r.mto)}</td><td class="num">${money(r.rts)}</td><td class="num">${money(r.tah)}</td><td class="num">${pctStr(r.mto/r.tot*100)}</td><td class="num">${pctStr(r.rts/r.tot*100)}</td></tr>`).join('')+`</tbody></table>`,{});
  const contrib=card('Sale-Type Contribution',`<table class="dt"><thead><tr><th>Type</th><th class="num">Net</th><th class="num">Orders</th><th class="num">AOV</th><th class="num">Share</th></tr></thead><tbody>`+
    CONFIG.SALE_TYPES.map(t=>{ const x=gv(t); return `<tr><td><span class="dot" style="background:${saleColor(t)}"></span> ${t}</td><td class="num">${money(x.net)}</td><td class="num">${fmtInt(x.orders)}</td><td class="num">${money(x.aov)}</td><td class="num">${pctStr(M.net?x.net/M.net*100:0)}</td></tr>`; }).join('')+`</tbody></table>`,{});
  const note=`<div class="banner">ⓘ Delivery/production-time & order-aging metrics require dispatch timestamps not present in Sales_overview_table. Revenue, orders, AOV, contribution & trend are exact.</div>`;
  return secHead('Fulfilment','MTO vs RTS Intelligence','Make-to-order vs ready-to-sell — revenue, share, AOV, store split & trend')+
    mini+note+
    `<div class="grid g-2" style="margin-bottom:16px">${card('MTO / RTS / TAH Trend',trend,{})}${card('Fulfilment Mix',mix,{})}</div>`+
    `<div class="grid g-2">${stTable}${contrib}</div>`;
};

VIEW.returns=function(){
  const M=STATE.M,PM=STATE.PM; const rits=STATE.items.filter(i=>i.sale_type==='Return');
  const mini=miniRow([
    {l:'Return Orders',v:fmtInt(M.retOrders),d:deltaTxt(M.retOrders,PM.retOrders,-1),color:'var(--crit)'},
    {l:'Return Rate',v:pctStr(M.returnPct),d:deltaTxt(M.returnPct,PM.returnPct,-1)},
    {l:'Refund Amount',v:money(M.refundAmt),color:'var(--crit)'},
    {l:'Return Net Value',v:money(M.returnAmt)},
    {l:'Exchange %',v:STATE.caps.exchange?pctStr(M.exchangePct):'—',dc:'var(--muted)',d:STATE.caps.exchange?'':'no exchange flag'},
    {l:'Repeat Returners',v:fmtInt([...STATE.custStats.values()].filter(c=>c.returns>1).length)}
  ]);
  const byStore=rank(groupAgg(STATE.items,i=>i.store).map(s=>({...s,rr:s.orders?s.ret/s.orders*100:0})),'rr').filter(s=>s.orders>3);
  const byCat=rank(groupAgg(STATE.items,i=>i.category).map(s=>({...s,rr:s.orders?s.ret/s.orders*100:0})),'rr');
  const byColl=rank(groupAgg(STATE.items,i=>i.collection).map(s=>({...s,rr:s.orders?s.ret/s.orders*100:0})),'rr').slice(0,8);
  const rrBars=(arr,click)=>hbars(arr.slice(0,8).map(s=>({label:s.key,value:s.rr,key:s.key,color:s.rr>6?'#ef5350':s.rr>3?'#f2b13a':'#12b886'})),{fmt:v=>pctStr(v),click});
  // high return customers / products
  const hrc=rank([...STATE.custStats.values()].filter(c=>c.returns>0),'returns').slice(0,8);
  const hrp=rank(groupAgg(rits,i=>i.style),'ret').slice(0,8);
  const hrcCard=card('High-Return Customers',hrc.length?`<table class="dt"><thead><tr><th>Customer</th><th class="num">Returns</th><th class="num">LTV</th></tr></thead><tbody>`+hrc.map(c=>`<tr><td>${esc(c.name)}</td><td class="num">${c.returns}</td><td class="num">${money(c.monetary)}</td></tr>`).join('')+`</tbody></table>`:`<div class="empty">No repeat returns</div>`,{});
  const hrpCard=card('High-Return Products (Style)',hrp.length?`<table class="dt"><thead><tr><th>Style</th><th class="num">Return Lines</th><th class="num">Return Value</th></tr></thead><tbody>`+hrp.map(s=>`<tr><td>${esc(s.key)}</td><td class="num">${s.ret}</td><td class="num">${money(Math.abs(s.retNet))}</td></tr>`).join('')+`</tbody></table>`:`<div class="empty">None</div>`,{});
  // AI recs
  const worstCat=byCat[0]; const recs=[
    worstCat&&worstCat.rr>3?`<b>${esc(worstCat.key)}</b> has the highest return rate (${pctStr(worstCat.rr)}). Audit top SKUs for sizing/finish issues and tighten pre-dispatch QC.`:null,
    M.returnPct>5?`Overall return rate (${pctStr(M.returnPct)}) is above the 5% comfort line — introduce a mandatory quality photo at packing and clearer PDP measurements.`:`Return rate (${pctStr(M.returnPct)}) is within tolerance — maintain QC discipline.`,
    hrc.length?`${hrc.length} customers show repeat returns — flag for a concierge call to understand fit/expectation gaps before they churn.`:null,
    `Model an easy-exchange (not refund) flow: converting even 30% of refunds to exchanges retains ~${money(M.refundAmt*0.3)} of value.`
  ].filter(Boolean);
  const aiCard=card('✦ AI Recommendations to Reduce Returns',`<ol style="margin-left:16px;font-size:12.8px;line-height:1.7;color:var(--ink-2)">`+recs.map(r=>`<li style="margin-bottom:7px">${r}</li>`).join('')+`</ol>`,{});
  const exNote=STATE.caps.exchange?'':`<div class="banner">ⓘ Exchange & return-reason fields are not present in Sales_overview_table. Return orders, value, refund and rate breakdowns are exact; exchange analytics activate when the source exposes them.</div>`;
  // ── Returned Customers Summary — cohort = customers with ≥1 return, filter-aware ──
  const retCustSet=new Set(rits.map(i=>i.customer_id).filter(v=>v!=null&&v!=='-'&&v!==''));
  const cohortItems=STATE.items.filter(i=>retCustSet.has(i.customer_id));
  const docCount=arr=>{ const s=new Set(); for(const i of arr){ if(i.document_no)s.add(i.document_no); } return s.size; };
  const cRTS=cohortItems.filter(i=>i.sale_type==='RTS'), cMTO=cohortItems.filter(i=>i.sale_type==='MTO'), cRET=cohortItems.filter(i=>i.sale_type==='Return');
  const rcCards=[
    {l:'Returned Customers',v:fmtInt(retCustSet.size),s:'unique buyers with ≥1 return',strip:'neu'},
    {l:'RTS Orders',v:fmtInt(docCount(cRTS)),s:'ready-to-sell invoices',strip:'neu'},
    {l:'RTS Amount',v:money(sum(cRTS,i=>i.net)),s:'net RTS revenue kept',strip:'pos'},
    {l:'MTO Orders',v:fmtInt(docCount(cMTO)),s:'made-to-order invoices',strip:'neu'},
    {l:'MTO Amount',v:money(sum(cMTO,i=>i.net)),s:'net MTO revenue kept',strip:'pos'},
    {l:'Returned Orders',v:fmtInt(docCount(cRET)),s:'return invoices',strip:'neg'},
    {l:'Returned Amount',v:money(Math.abs(sum(cRET,i=>i.net))),s:'net value sent back',strip:'neg'}
  ].map(c=>`<div class="kpi ${c.strip}"><div class="lab">${esc(c.l)}</div><div class="val">${c.v}</div><div class="ai"><span class="sp">✦</span><span>${esc(c.s)}</span></div></div>`).join('');
  const rcSection=card('Returned Customers Summary',`<div class="grid g-4" style="gap:14px">${rcCards}</div>`,{hint:retCustSet.size?`${fmtInt(retCustSet.size)} customers · respects all filters`:'no returns in selection'});
  return secHead('Post-Purchase','Return &amp; Exchange Intelligence','Return volume, value, rate and drivers — with AI mitigation')+
    mini+exNote+rcSection+
    `<div class="grid g-3" style="margin-bottom:16px">${card('Return % by Store',rrBars(byStore,'store'),{hint:'click to drill'})}${card('Return % by Category',rrBars(byCat,'category'),{})}${card('Return % by Collection',rrBars(byColl,'collection'),{})}</div>`+
    `<div class="grid g-2" style="margin-bottom:16px">${hrcCard}${hrpCard}</div>`+
    aiCard;
};
/* ═══════════════════════════════════════════════════════════════════════
   VIEW · STORE INTELLIGENCE
   ═══════════════════════════════════════════════════════════════════════ */
function storeStats(){
  const prev=new Map(groupAgg(STATE.prevItems,i=>i.store).map(g=>[g.key,g]));
  const cr=STATE.custRef;
  const rows=groupAgg(STATE.items,i=>i.store).map(s=>{
    const p=prev.get(s.key); const g=p?growth(s.net,p.net):0;
    const custIds=new Set(STATE.items.filter(i=>i.store===s.key).map(i=>i.customer_id));
    let repeat=0; custIds.forEach(id=>{ const r=cr.get(id); if(r&&r.lifetime_orders>1)repeat++; });
    const repPct=custIds.size?repeat/custIds.size*100:0;
    const si=STATE.items.filter(i=>i.store===s.key); const sg=groupAgg(si,i=>i.sale_type);
    const sv=t=>{const x=sg.find(y=>y.key===t);return x?x.net:0;};
    const mtoP=s.net?sv('MTO')/s.net*100:0, rtsP=s.net?sv('RTS')/s.net*100:0;
    const tgtObj=STORES.find(x=>x.s===s.key); const tgt=tgtObj?tgtObj.tgt*(diffDays(STATE.curWin.to,STATE.curWin.from)+1)/365:null;
    const ach=tgt?s.net/tgt*100:null;
    return {...s,g,repPct,mtoP,rtsP,retPct:s.retPct,tgt,ach}; }).sort((a,b)=>b.net-a.net);
  const mxNet=Math.max(1,...rows.map(r=>r.net));
  rows.forEach(r=>{ r.score=Math.round(clamp(
    (r.net/mxNet)*45 + clamp(r.g+20,0,40)/40*20 + clamp(r.repPct,0,60)/60*20 + (100-clamp(r.retPct*5,0,100))/100*15, 0,100)); });
  return rows;
}

    </tr></thead><tbody>`+rows.map((r,i)=>`<tr><td><span class="rank ${i<3?'r'+(i+1):''}">${i+1}</span></td><td data-filter="store|${esc(r.key)}" style="cursor:pointer;color:var(--gold)">${esc(r.key)}</td>

    <td class="num">${fmtInt(r.orders)}</td><td class="num">${fmtInt(r.customers)}</td><td class="num">${pctStr(r.repPct)}</td>
    <td class="num">${pctStr(r.mtoP)}</td><td class="num">${pctStr(r.rtsP)}</td><td class="num" style="color:${r.retPct>6?'var(--crit)':'inherit'}">${pctStr(r.retPct)}</td>
    ${r.ach!=null?`<td class="num">${pctStr(r.ach)}</td>`:''}<td class="num"><b>${r.score}</b></td></tr>`).join('')+`</tbody></table></div>`,{head:`<button class="btn" data-act="expStore" style="padding:5px 11px">⬇ Export</button>`});
  const note=STORES.find(x=>x.s===rows[0].key)?'':`<div class="banner">ⓘ Store targets shown from a configured plan; wire real targets in the reporting layer to activate achievement %.</div>`;

function styleMovement(){
  const asOf=STATE.asOf; const out=[];
  const winStyles=groupAgg(STATE.items,i=>i.style);
  const wmap=new Map(winStyles.map(s=>[s.key,s]));
  STATE.styleRef.forEach(ref=>{ const w=wmap.get(ref.style);
    const recency=ref.last_sale_date?diffDays(asOf,ref.last_sale_date):999;
    const units=w?w.units:0; const net=w?w.net:0;
    let cls=recency>CONFIG.MOVEMENT.deadDays?'Dead':units>=CONFIG.MOVEMENT.fastUnits?'Fast':recency>CONFIG.MOVEMENT.slowDays?'Slow':'Steady';
    out.push({style:ref.style,category:ref.category,metal:ref.metal,collection:ref.collection,net,units,recency,cls,
      stock:ref.stock_qty}); });
  return out;
}
VIEW.products=function(){
  const mv=styleMovement(); const withNet=mv.filter(s=>s.net>0);
